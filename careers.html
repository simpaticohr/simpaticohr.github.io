<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Our Team</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans antialiased text-gray-900">
    
    <!-- Dynamic Header -->
    <header class="bg-white shadow-sm border-b border-gray-200 py-6">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center">
            <div>
                <h1 id="companyName" class="text-2xl font-bold text-gray-900">Careers</h1>
                <p class="text-sm text-gray-500 mt-1">View our open roles and apply today.</p>
            </div>
            <!-- Placeholder for dynamic company logo -->
            <div id="companyLogo" class="h-10 w-auto bg-gray-200 rounded text-transparent">Logo</div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <!-- Search and Filter -->
        <div class="mb-8 flex flex-col sm:flex-row gap-4">
            <input type="text" id="searchJobs" placeholder="Search for roles..." class="flex-1 p-3 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
            <select id="filterDepartment" class="p-3 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 bg-white">
                <option value="">All Departments</option>
            </select>
        </div>

        <!-- Jobs List Container -->
        <div id="jobsContainer" class="space-y-4">
            <!-- Loading Skeleton -->
            <div class="p-6 bg-white rounded-lg shadow-sm border border-gray-100 animate-pulse">
                <div class="h-5 bg-gray-200 rounded w-1/3 mb-4"></div>
                <div class="h-4 bg-gray-200 rounded w-1/4 mb-2"></div>
                <div class="h-4 bg-gray-200 rounded w-1/2"></div>
            </div>
        </div>
        
        <!-- Empty State (Hidden by default) -->
        <div id="emptyState" class="hidden text-center py-12">
            <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
            </svg>
            <h3 class="mt-2 text-sm font-medium text-gray-900">No open positions</h3>
            <p class="mt-1 text-sm text-gray-500">We currently don't have any open roles. Please check back later.</p>
        </div>
    </main>

    <footer class="bg-white border-t border-gray-200 mt-12 py-8">
        <div class="max-w-5xl mx-auto px-4 text-center">
            <p class="text-sm text-gray-500">Powered by <a href="https://simpatico.com" class="text-blue-600 hover:underline">Simpatico HR</a></p>
        </div>
    </footer>

    <!-- Load external JS -->
    <script src="js/careers.js"></script>
</body>
</html>
