<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Report — SimpaticoHR</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg-dark: #07070c;
            --bg-card: #0f0f17;
            --bg-surface: #16162a;
            --bg-elevated: #1e1e38;
            --border: #252540;
            --border-light: #2f2f4a;
            --primary: #6366f1;
            --primary-bright: #818cf8;
            --primary-glow: rgba(99,102,241,.4);
            --accent: #22d3ee;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text: #e8e8f0;
            --text-dim: #8b8ba7;
            --text-muted: #525272;
            --gradient-primary: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
            --gradient-success: linear-gradient(135deg, #10b981, #06b6d4);
            --gradient-danger: linear-gradient(135deg, #ef4444, #f59e0b);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        ::selection { background: var(--primary-glow); color: #fff; }

        /* Ambient */
        .ambient {
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background:
                radial-gradient(ellipse at 20% 0%, rgba(99,102,241,.08), transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(168,85,247,.06), transparent 50%);
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 24px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .topbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 24px;
            background: rgba(15,15,23,.85);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 16px;
            margin-bottom: 24px;
        }
        .tb-left { display: flex; align-items: center; gap: 14px; }
        .logo-icon {
            width: 40px; height: 40px; border-radius: 11px;
            background: var(--gradient-primary);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: #fff;
            box-shadow: 0 4px 20px var(--primary-glow);
        }
        .logo-text {
            font-size: 18px; font-weight: 900;
            background: var(--gradient-primary);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }
        .logo-text span { color: #fcd34d; -webkit-text-fill-color: #fcd34d; }
        .breadcrumb {
            font-size: 12px; color: var(--text-muted);
            display: flex; align-items: center; gap: 8px;
            margin-left: 12px;
            padding-left: 16px;
            border-left: 1px solid var(--border);
        }
        .breadcrumb i { font-size: 9px; }

        .header-actions { display: flex; gap: 8px; }
        .action-btn {
            padding: 9px 16px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 10px;
            font-size: 12px; font-weight: 600;
            cursor: pointer;
            display: flex; align-items: center; gap: 8px;
            transition: all .2s;
            font-family: 'Inter', sans-serif;
        }
        .action-btn:hover {
            background: var(--bg-elevated);
            transform: translateY(-1px);
        }
        .action-btn.primary {
            background: var(--gradient-primary);
            border: none;
            color: #fff;
        }
        .action-btn.primary:hover {
            box-shadow: 0 4px 20px var(--primary-glow);
        }

        /* Hero card */
        .hero-card {
            background: linear-gradient(180deg, var(--bg-card), #0a0a14);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
        }
        .hero-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0;
            height: 4px; background: var(--gradient-primary);
        }
        .hero-row {
            display: flex; align-items: flex-start; justify-content: space-between;
            flex-wrap: wrap; gap: 20px;
        }
        .hero-identity { display: flex; align-items: center; gap: 18px; }
        .avatar {
            width: 72px; height: 72px; border-radius: 18px;
            background: var(--gradient-primary);
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; font-weight: 800; color: #fff;
            box-shadow: 0 8px 24px var(--primary-glow);
            flex-shrink: 0;
        }
        .hero-name {
            font-size: 24px; font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 4px;
        }
        .hero-meta {
            display: flex; gap: 14px; flex-wrap: wrap;
            font-size: 13px; color: var(--text-dim);
            margin-bottom: 10px;
        }
        .hero-meta span { display: flex; align-items: center; gap: 6px; }
        .hero-meta i { color: var(--primary-bright); font-size: 11px; }
        .hero-badges { display: flex; gap: 6px; flex-wrap: wrap; }
        .badge {
            padding: 4px 11px;
            border-radius: 6px;
            font-size: 10px; font-weight: 700;
            letter-spacing: .5px; text-transform: uppercase;
            display: flex; align-items: center; gap: 5px;
        }
        .badge-completed {
            background: rgba(16,185,129,.15);
            color: #6ee7b7;
            border: 1px solid rgba(16,185,129,.25);
        }
        .badge-in-progress {
            background: rgba(245,158,11,.15);
            color: #fcd34d;
            border: 1px solid rgba(245,158,11,.25);
        }
        .badge-pending {
            background: rgba(100,116,139,.15);
            color: var(--text-dim);
            border: 1px solid var(--border);
        }
        .hero-recommendation {
            text-align: right;
        }
        .reco-label {
            font-size: 10px; text-transform: uppercase;
            letter-spacing: 1px; color: var(--text-muted);
            font-weight: 700; margin-bottom: 8px;
        }
        .reco-value {
            font-size: 20px; font-weight: 900;
            display: flex; align-items: center; gap: 10px;
            justify-content: flex-end;
        }
        .reco-icon {
            width: 36px; height: 36px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
        }
        .reco-strong { color: #10b981; }
        .reco-strong .reco-icon { background: rgba(16,185,129,.15); color: #10b981; }
        .reco-moderate { color: #f59e0b; }
        .reco-moderate .reco-icon { background: rgba(245,158,11,.15); color: #f59e0b; }
        .reco-weak { color: #ef4444; }
        .reco-weak .reco-icon { background: rgba(239,68,68,.15); color: #ef4444; }

        /* Score cards grid */
        .score-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .score-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 22px;
            position: relative;
            overflow: hidden;
            transition: all .3s;
        }
        .score-card:hover {
            transform: translateY(-2px);
            border-color: var(--border-light);
            box-shadow: 0 8px 24px rgba(0,0,0,.3);
        }
        .score-card::before {
            content: ''; position: absolute; top: 0; left: 0;
            width: 100%; height: 3px;
        }
        .score-card.overall::before { background: var(--gradient-primary); }
        .score-card.trust::before { background: var(--gradient-success); }
        .score-card.questions::before { background: linear-gradient(135deg, #22d3ee, #0ea5e9); }
        .score-card.duration::before { background: linear-gradient(135deg, #f59e0b, #ec4899); }

        .score-card-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 14px;
        }
        .score-card-icon {
            width: 36px; height: 36px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
        }
        .score-card.overall .score-card-icon { background: rgba(99,102,241,.15); color: var(--primary-bright); }
        .score-card.trust .score-card-icon { background: rgba(16,185,129,.15); color: #6ee7b7; }
        .score-card.questions .score-card-icon { background: rgba(34,211,238,.15); color: #67e8f9; }
        .score-card.duration .score-card-icon { background: rgba(245,158,11,.15); color: #fcd34d; }

        .score-card-trend {
            font-size: 10px; font-weight: 700;
            padding: 3px 8px; border-radius: 5px;
            letter-spacing: .5px;
        }
        .score-card-val {
            font-size: 36px; font-weight: 900;
            letter-spacing: -0.03em; margin-bottom: 4px;
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }
        .score-card-label {
            font-size: 11px; color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: .8px; font-weight: 600;
        }
        .score-card-sub {
            font-size: 11px; color: var(--text-dim);
            margin-top: 8px;
        }

        /* Two column layout */
        .grid-2col {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        /* Section */
        .section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .section-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 14px; font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .8px;
            display: flex; align-items: center; gap: 10px;
        }
        .section-title-icon {
            width: 28px; height: 28px; border-radius: 8px;
            background: rgba(99,102,241,.15);
            color: var(--primary-bright);
            display: flex; align-items: center; justify-content: center;
            font-size: 12px;
        }
        .section-meta {
            font-size: 11px; color: var(--text-muted);
            font-weight: 600;
        }

        /* Skills section */
        .skill-row {
            display: flex; align-items: center; gap: 14px;
            padding: 12px;
            background: var(--bg-surface);
            border-radius: 10px;
            margin-bottom: 8px;
            transition: all .2s;
            border: 1px solid transparent;
        }
        .skill-row:hover {
            border-color: var(--border-light);
            transform: translateX(4px);
        }
        .skill-name {
            min-width: 140px;
            font-size: 13px; font-weight: 600;
            color: var(--text);
        }
        .skill-bar {
            flex: 1; height: 10px;
            background: var(--bg-elevated);
            border-radius: 5px;
            overflow: hidden;
            position: relative;
        }
        .skill-fill {
            height: 100%; border-radius: 5px;
            transition: width 1s cubic-bezier(.4,0,.2,1);
            position: relative;
        }
        .skill-fill::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,.2), transparent);
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .skill-score {
            font-size: 14px; font-weight: 800;
            min-width: 48px; text-align: right;
            font-variant-numeric: tabular-nums;
        }
        .skill-depth {
            font-size: 10px; color: var(--text-muted);
            padding: 2px 8px; border-radius: 5px;
            background: var(--bg-elevated);
            font-weight: 600; letter-spacing: .3px;
        }

        /* Performance summary */
        .perf-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .perf-box {
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        .perf-box.strengths {
            background: linear-gradient(135deg, rgba(16,185,129,.08), rgba(16,185,129,.02));
            border-color: rgba(16,185,129,.2);
        }
        .perf-box.weaknesses {
            background: linear-gradient(135deg, rgba(239,68,68,.08), rgba(239,68,68,.02));
            border-color: rgba(239,68,68,.2);
        }
        .perf-box-title {
            font-size: 11px; font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .8px;
            margin-bottom: 12px;
            display: flex; align-items: center; gap: 8px;
        }
        .perf-box.strengths .perf-box-title { color: #6ee7b7; }
        .perf-box.weaknesses .perf-box-title { color: #fca5a5; }
        .perf-tags {
            display: flex; flex-wrap: wrap; gap: 6px;
        }
        .perf-tag {
            padding: 5px 10px;
            border-radius: 7px;
            font-size: 11px; font-weight: 600;
        }
        .perf-box.strengths .perf-tag {
            background: rgba(16,185,129,.15);
            color: #6ee7b7;
            border: 1px solid rgba(16,185,129,.25);
        }
        .perf-box.weaknesses .perf-tag {
            background: rgba(239,68,68,.15);
            color: #fca5a5;
            border: 1px solid rgba(239,68,68,.25);
        }

        /* Conversation */
        .convo-turn {
            padding: 16px 18px;
            border-radius: 14px;
            margin-bottom: 12px;
            position: relative;
            transition: all .2s;
        }
        .convo-turn:hover {
            transform: translateX(2px);
        }
        .convo-ai {
            background: linear-gradient(135deg, rgba(99,102,241,.08), rgba(99,102,241,.02));
            border: 1px solid rgba(99,102,241,.15);
            border-left: 3px solid var(--primary);
        }
        .convo-user {
            background: linear-gradient(135deg, rgba(16,185,129,.08), rgba(16,185,129,.02));
            border: 1px solid rgba(16,185,129,.15);
            border-left: 3px solid var(--success);
        }
        .convo-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 10px;
            gap: 12px;
        }
        .convo-role {
            font-size: 10px; font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex; align-items: center; gap: 8px;
        }
        .convo-ai .convo-role { color: var(--primary-bright); }
        .convo-user .convo-role { color: #6ee7b7; }
        .convo-role-avatar {
            width: 22px; height: 22px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px;
        }
        .convo-ai .convo-role-avatar {
            background: rgba(99,102,241,.2);
            color: var(--primary-bright);
        }
        .convo-user .convo-role-avatar {
            background: rgba(16,185,129,.2);
            color: #6ee7b7;
        }
        .convo-q-num {
            font-size: 10px;
            padding: 3px 9px;
            border-radius: 5px;
            background: var(--bg-elevated);
            color: var(--text-muted);
            font-weight: 700;
            letter-spacing: .5px;
        }
        .convo-text {
            font-size: 14px;
            line-height: 1.65;
            color: var(--text);
        }
        .convo-meta {
            display: flex; gap: 10px; flex-wrap: wrap;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,.05);
        }
        .convo-meta-tag {
            display: flex; align-items: center; gap: 4px;
            font-size: 10px;
            padding: 3px 8px;
            background: var(--bg-elevated);
            color: var(--text-dim);
            border-radius: 5px;
            font-weight: 600;
            letter-spacing: .3px;
            text-transform: uppercase;
        }
        .convo-meta-tag.score-high {
            background: rgba(16,185,129,.15);
            color: #6ee7b7;
        }
        .convo-meta-tag.score-mid {
            background: rgba(245,158,11,.15);
            color: #fcd34d;
        }
        .convo-meta-tag.score-low {
            background: rgba(239,68,68,.15);
            color: #fca5a5;
        }

        /* Violation log */
        .violation-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 14px;
            background: var(--bg-surface);
            border-radius: 10px;
            margin-bottom: 6px;
            font-size: 12px;
            border: 1px solid var(--border);
            transition: all .2s;
        }
        .violation-item:hover {
            background: var(--bg-elevated);
        }
        .violation-dot {
            width: 10px; height: 10px; border-radius: 50%;
            flex-shrink: 0;
            box-shadow: 0 0 8px currentColor;
        }
        .violation-dot.high { background: var(--danger); color: var(--danger); }
        .violation-dot.medium { background: var(--warning); color: var(--warning); }
        .violation-dot.low { background: var(--text-dim); color: var(--text-dim); }
        .violation-time {
            color: var(--text-muted);
            min-width: 74px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 600;
        }
        .violation-msg {
            color: var(--text);
            flex: 1;
            font-weight: 500;
        }
        .violation-sev {
            font-size: 9px;
            font-weight: 800;
            letter-spacing: .8px;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: 4px;
        }
        .violation-sev.high {
            background: rgba(239,68,68,.15);
            color: #fca5a5;
        }
        .violation-sev.medium {
            background: rgba(245,158,11,.15);
            color: #fcd34d;
        }
        .violation-sev.low {
            background: var(--bg-elevated);
            color: var(--text-dim);
        }

        /* Chart container */
        .chart-container {
            position: relative;
            height: 280px;
            margin-top: 12px;
        }

        /* Code submissions */
        .code-submission {
            background: #0a0a14;
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .code-submission-header {
            padding: 12px 16px;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .code-lang {
            font-size: 11px;
            font-weight: 700;
            padding: 3px 10px;
            background: rgba(99,102,241,.15);
            color: var(--primary-bright);
            border-radius: 5px;
            text-transform: uppercase;
            letter-spacing: .5px;
        }
        .code-time {
            font-size: 11px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }
        .code-content {
            padding: 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            line-height: 1.6;
            color: var(--text);
            white-space: pre;
            overflow-x: auto;
            max-height: 400px;
        }

        /* Loading state */
        .loading-state {
            display: flex; align-items: center; justify-content: center;
            min-height: 400px;
            flex-direction: column; gap: 16px;
        }
        .loading-spinner {
            width: 48px; height: 48px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            font-size: 13px;
            color: var(--text-dim);
            font-weight: 500;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        .empty-state i {
            font-size: 48px;
            color: var(--text-muted);
            margin-bottom: 16px;
        }
        .empty-state h3 {
            font-size: 16px;
            color: var(--text);
            margin-bottom: 8px;
        }
        .empty-state p {
            font-size: 13px;
            color: var(--text-dim);
        }

        /* Filter tabs */
        .tab-bar {
            display: flex; gap: 4px;
            margin-bottom: 16px;
            padding: 4px;
            background: var(--bg-surface);
            border-radius: 10px;
            width: fit-content;
        }
        .tab-btn {
            padding: 7px 14px;
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-size: 11px;
            font-weight: 700;
            border-radius: 7px;
            cursor: pointer;
            transition: all .2s;
            font-family: 'Inter', sans-serif;
            letter-spacing: .3px;
            text-transform: uppercase;
        }
        .tab-btn:hover { color: var(--text); }
        .tab-btn.active {
            background: var(--bg-elevated);
            color: var(--primary-bright);
            box-shadow: 0 2px 8px rgba(0,0,0,.2);
        }

        @media (max-width: 900px) {
            .grid-2col { grid-template-columns: 1fr; }
            .score-grid { grid-template-columns: 1fr 1fr; }
            .perf-grid { grid-template-columns: 1fr; }
            .hero-row { flex-direction: column; }
            .hero-recommendation { text-align: left; }
            .reco-value { justify-content: flex-start; }
        }

        @media print {
            .ambient, .topbar, .action-btn, .tab-bar { display: none !important; }
            body { background: #fff; color: #000; }
            .section, .hero-card, .score-card { page-break-inside: avoid; }
        }
    </style>
</head>
<body>
    <div class="ambient"></div>

    <div class="container">
        <div class="topbar">
            <div class="tb-left">
                <div class="logo-icon"><i class="fas fa-brain"></i></div>
                <div class="logo-text">Simpatico<span>HR</span></div>
                <div class="breadcrumb">
                    <i class="fas fa-chevron-right"></i>
                    <span>Interviews</span>
                    <i class="fas fa-chevron-right"></i>
                    <span style="color: var(--text)">Report</span>
                </div>
            </div>
            <div class="header-actions">
                <button class="action-btn" onclick="window.print()">
                    <i class="fas fa-print"></i> Print
                </button>
                <button class="action-btn" onclick="exportJSON()">
                    <i class="fas fa-download"></i> Export
                </button>
                <button class="action-btn primary" onclick="goBack()">
                    <i class="fas fa-arrow-left"></i> Back
                </button>
            </div>
        </div>

        <div id="content">
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <div class="loading-text">Loading interview report...</div>
            </div>
        </div>
    </div>

<script src="../js/hr-config.js"></script>
<script>
'use strict';

const SB_URL = window.SIMPATICO_CONFIG?.supabaseUrl;
const SB_KEY = window.SIMPATICO_CONFIG?.supabaseAnonKey;

const params = new URLSearchParams(window.location.search);
const interviewToken = params.get('token');
const interviewId = params.get('id');

let interviewData = null;

function goBack() {
    // Page is opened in a new tab via window.open('...', '_blank') from the dashboard,
    // so window.history.back() has nowhere to go. Try closing the tab first.
    if (window.history.length <= 1 || !document.referrer) {
        window.close();
        // window.close() may be blocked by the browser if the tab wasn't opened via script.
        // Fallback: navigate to the HR dashboard.
        setTimeout(() => { window.location.href = '/dashboard/hr.html'; }, 100);
    } else {
        window.history.back();
    }
}

async function load() {
    if (!interviewToken && !interviewId) {
        document.getElementById('content').innerHTML = renderError('No interview ID or token provided.');
        return;
    }

    const filter = interviewId ? `id=eq.${interviewId}` : `token=eq.${encodeURIComponent(interviewToken)}`;

    try {
        const res = await fetch(`${SB_URL}/rest/v1/interviews?${filter}&select=*&limit=1`, {
            headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
        });
        const data = await res.json();
        const interview = data?.[0];

        if (!interview) {
            document.getElementById('content').innerHTML = renderError('Interview not found.');
            return;
        }

        interviewData = interview;
        render(interview);
    } catch (e) {
        console.error('Load error:', e);
        document.getElementById('content').innerHTML = renderError('Failed to load interview data.');
    }
}

function renderError(msg) {
    return `
        <div class="empty-state">
            <i class="fas fa-exclamation-triangle"></i>
            <h3>Unable to Load Report</h3>
            <p>${msg}</p>
        </div>
    `;
}

function scoreColor(s) {
    return s >= 70 ? '#10b981' : s >= 40 ? '#f59e0b' : '#ef4444';
}

function scoreGradient(s) {
    return s >= 70
        ? 'linear-gradient(90deg, #10b981, #06b6d4)'
        : s >= 40
        ? 'linear-gradient(90deg, #f59e0b, #ec4899)'
        : 'linear-gradient(90deg, #ef4444, #b91c1c)';
}

function getRecommendation(score, trust, violations) {
    if (score >= 75 && trust >= 70 && violations < 3) {
        return { type: 'strong', text: 'Strong Hire', icon: 'fa-thumbs-up' };
    } else if (score >= 60 && trust >= 60 && violations < 6) {
        return { type: 'moderate', text: 'Consider', icon: 'fa-balance-scale' };
    } else {
        return { type: 'weak', text: 'Not Recommended', icon: 'fa-thumbs-down' };
    }
}

function getInitials(name) {
    return (name || 'C').split(' ').map(w => w[0]).slice(0,2).join('').toUpperCase();
}

function formatDate(dateStr) {
    if (!dateStr) return '—';
    return new Date(dateStr).toLocaleDateString('en-US', {
        month: 'short', day: 'numeric', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
    });
}

function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render(interview) {
    const score = interview.overall_score || 0;
    const trust = interview.trust_score || 0;
    const violations = interview.violation_count || 0;
    const feedback = interview.feedback || {};
    const convo = interview.conversation_log || [];
    const skillScores = feedback.skill_scores || {};
    const vLogs = interview.violation_log || [];
    const codeSubmissions = feedback.code_submissions || [];

    const duration = interview.started_at && interview.completed_at
        ? Math.round((new Date(interview.completed_at) - new Date(interview.started_at)) / 60000)
        : '—';

    const questionsAsked = feedback.total_questions || convo.filter(c => c.role === 'ai' || c.role === 'assistant').length;
    const recommendation = getRecommendation(score, trust, violations);
    const statusClass = interview.status === 'completed' ? 'badge-completed' :
                       interview.status === 'in_progress' ? 'badge-in-progress' : 'badge-pending';

    let html = `
        <!-- Hero Card -->
        <div class="hero-card">
            <div class="hero-row">
                <div class="hero-identity">
                    <div class="avatar">${getInitials(interview.candidate_name)}</div>
                    <div>
                        <div class="hero-name">${escapeHtml(interview.candidate_name || 'Candidate')}</div>
                        <div class="hero-meta">
                            <span><i class="fas fa-envelope"></i> ${escapeHtml(interview.candidate_email || '—')}</span>
                            <span><i class="fas fa-briefcase"></i> ${escapeHtml(feedback.job_title || interview.job_title || 'Interview')}</span>
                            <span><i class="fas fa-calendar"></i> ${formatDate(interview.completed_at || interview.started_at)}</span>
                        </div>
                        <div class="hero-badges">
                            <span class="badge ${statusClass}">
                                <i class="fas fa-circle" style="font-size:6px"></i>
                                ${(interview.status || 'pending').replace('_', ' ')}
                            </span>
                            ${feedback.level ? `<span class="badge badge-pending"><i class="fas fa-layer-group" style="font-size:9px"></i> ${escapeHtml(feedback.level)}</span>` : ''}
                            ${feedback.phases_covered?.length ? `<span class="badge badge-pending"><i class="fas fa-list-check" style="font-size:9px"></i> ${feedback.phases_covered.length} Phases</span>` : ''}
                        </div>
                    </div>
                </div>
                <div class="hero-recommendation">
                    <div class="reco-label">AI Recommendation</div>
                    <div class="reco-value reco-${recommendation.type}">
                        <div class="reco-icon"><i class="fas ${recommendation.icon}"></i></div>
                        ${recommendation.text}
                    </div>
                </div>
            </div>
        </div>

        <!-- Score Grid -->
        <div class="score-grid">
            <div class="score-card overall">
                <div class="score-card-header">
                    <div class="score-card-icon"><i class="fas fa-chart-line"></i></div>
                </div>
                <div class="score-card-val" style="color:${scoreColor(score)}">${score}<span style="font-size:20px;color:var(--text-muted)">%</span></div>
                <div class="score-card-label">Overall Score</div>
                <div class="score-card-sub">${score >= 70 ? 'Excellent performance' : score >= 40 ? 'Moderate performance' : 'Needs improvement'}</div>
            </div>

            <div class="score-card trust">
                <div class="score-card-header">
                    <div class="score-card-icon"><i class="fas fa-shield-alt"></i></div>
                </div>
                <div class="score-card-val" style="color:${scoreColor(trust)}">${trust}<span style="font-size:20px;color:var(--text-muted)">%</span></div>
                <div class="score-card-label">Trust Score</div>
                <div class="score-card-sub">${violations} violations detected</div>
            </div>

            <div class="score-card questions">
                <div class="score-card-header">
                    <div class="score-card-icon"><i class="fas fa-comments"></i></div>
                </div>
                <div class="score-card-val" style="color:#67e8f9">${questionsAsked}</div>
                <div class="score-card-label">Questions Asked</div>
                <div class="score-card-sub">${convo.filter(c => c.role === 'user').length} responses given</div>
            </div>

            <div class="score-card duration">
                <div class="score-card-header">
                    <div class="score-card-icon"><i class="fas fa-clock"></i></div>
                </div>
                <div class="score-card-val" style="color:#fcd34d">${duration}<span style="font-size:20px;color:var(--text-muted)">m</span></div>
                <div class="score-card-label">Duration</div>
                <div class="score-card-sub">${interview.completed_at ? 'Completed' : 'In progress'}</div>
            </div>
        </div>
    `;

    // Skills + Performance Summary
    if (Object.keys(skillScores).length) {
        html += `
            <div class="grid-2col">
                <div class="section">
                    <div class="section-header">
                        <div class="section-title">
                            <div class="section-title-icon"><i class="fas fa-code"></i></div>
                            Skills Assessment
                        </div>
                        <div class="section-meta">${Object.keys(skillScores).length} skills evaluated</div>
                    </div>
                    <div class="chart-container">
                        <canvas id="skillsChart"></canvas>
                    </div>
                    <div style="margin-top: 20px;">
        `;

        for (const [skill, data] of Object.entries(skillScores)) {
            const avg = typeof data === 'object' ? data.score :
                        Array.isArray(data) ? Math.round(data.reduce((a,b)=>a+b,0)/data.length) : data;
            const depth = data?.depth || 1;
            const depthLabel = depth >= 3 ? 'Deep' : depth >= 2 ? 'Moderate' : 'Basic';

            html += `
                <div class="skill-row">
                    <span class="skill-name">${escapeHtml(skill)}</span>
                    <div class="skill-bar">
                        <div class="skill-fill" style="width:${avg}%;background:${scoreGradient(avg)}"></div>
                    </div>
                    <span class="skill-depth">${depthLabel}</span>
                    <span class="skill-score" style="color:${scoreColor(avg)}">${avg}%</span>
                </div>
            `;
        }

        html += `
                    </div>
                </div>
                <div>
        `;

        // Performance Summary
        if (feedback.strong_areas?.length || feedback.weak_areas?.length) {
            html += `
                <div class="section">
                    <div class="section-header">
                        <div class="section-title">
                            <div class="section-title-icon"><i class="fas fa-chart-pie"></i></div>
                            Performance Summary
                        </div>
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 14px;">
            `;

            if (feedback.strong_areas?.length) {
                html += `
                    <div class="perf-box strengths">
                        <div class="perf-box-title"><i class="fas fa-star"></i> Strengths</div>
                        <div class="perf-tags">
                            ${feedback.strong_areas.map(s => `<span class="perf-tag">${escapeHtml(s)}</span>`).join('')}
                        </div>
                    </div>
                `;
            }

            if (feedback.weak_areas?.length) {
                html += `
                    <div class="perf-box weaknesses">
                        <div class="perf-box-title"><i class="fas fa-exclamation-triangle"></i> Areas to Improve</div>
                        <div class="perf-tags">
                            ${feedback.weak_areas.map(s => `<span class="perf-tag">${escapeHtml(s)}</span>`).join('')}
                        </div>
                    </div>
                `;
            }

            html += `
                    </div>
                </div>
            `;
        }

        // Quick Stats
        html += `
            <div class="section">
                <div class="section-header">
                    <div class="section-title">
                        <div class="section-title-icon"><i class="fas fa-info-circle"></i></div>
                        Quick Stats
                    </div>
                </div>
                <div style="display: flex; flex-direction: column; gap: 10px; font-size: 13px;">
                    <div style="display: flex; justify-content: space-between; padding: 10px; background: var(--bg-surface); border-radius: 8px;">
                        <span style="color: var(--text-dim)">Conversation Turns</span>
                        <span style="font-weight: 700">${feedback.conversation_turns || convo.length}</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; padding: 10px; background: var(--bg-surface); border-radius: 8px;">
                        <span style="color: var(--text-dim)">Avg Words/Response</span>
                        <span style="font-weight: 700">${calcAvgWords(convo)}</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; padding: 10px; background: var(--bg-surface); border-radius: 8px;">
                        <span style="color: var(--text-dim)">Code Submissions</span>
                        <span style="font-weight: 700">${codeSubmissions.length}</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; padding: 10px; background: var(--bg-surface); border-radius: 8px;">
                        <span style="color: var(--text-dim)">Started</span>
                        <span style="font-weight: 700; font-size: 11px">${formatDate(interview.started_at)}</span>
                    </div>
                </div>
            </div>
        `;

        html += `</div></div>`;
    }

    // Conversation
    if (convo.length) {
        html += `
            <div class="section">
                <div class="section-header">
                    <div class="section-title">
                        <div class="section-title-icon"><i class="fas fa-comments"></i></div>
                        Conversation Transcript
                    </div>
                    <div class="section-meta">${convo.length} turns</div>
                </div>
                <div class="tab-bar">
                    <button class="tab-btn active" onclick="filterConvo('all', this)">All</button>
                    <button class="tab-btn" onclick="filterConvo('ai', this)">AI Only</button>
                    <button class="tab-btn" onclick="filterConvo('user', this)">Candidate Only</button>
                </div>
                <div id="convoList">
        `;

        let qNum = 0;
        for (const turn of convo) {
            const isAI = turn.role === 'ai' || turn.role === 'assistant';
            if (isAI) qNum++;
            const score = turn.score;
            const scoreClass = score === undefined ? '' :
                              score >= 70 ? 'score-high' :
                              score >= 40 ? 'score-mid' : 'score-low';

            html += `
                <div class="convo-turn ${isAI ? 'convo-ai' : 'convo-user'}" data-role="${isAI ? 'ai' : 'user'}">
                    <div class="convo-header">
                        <div class="convo-role">
                            <div class="convo-role-avatar">
                                <i class="fas ${isAI ? 'fa-robot' : 'fa-user'}"></i>
                            </div>
                            ${isAI ? 'AI Interviewer' : 'Candidate'}
                        </div>
                        ${isAI ? `<span class="convo-q-num">Q${qNum}</span>` : ''}
                    </div>
                    <div class="convo-text">${escapeHtml(turn.content || '')}</div>
                    <div class="convo-meta">
                        ${turn.phase ? `<span class="convo-meta-tag"><i class="fas fa-tag"></i> ${escapeHtml(turn.phase)}</span>` : ''}
                        ${score !== undefined ? `<span class="convo-meta-tag ${scoreClass}"><i class="fas fa-star"></i> Score: ${score}</span>` : ''}
                        ${turn.content ? `<span class="convo-meta-tag"><i class="fas fa-font"></i> ${turn.content.split(/\s+/).filter(Boolean).length} words</span>` : ''}
                    </div>
                </div>
            `;
        }

        html += `</div></div>`;
    }

    // Code Submissions
    if (codeSubmissions.length) {
        html += `
            <div class="section">
                <div class="section-header">
                    <div class="section-title">
                        <div class="section-title-icon"><i class="fas fa-code"></i></div>
                        Code Submissions
                    </div>
                    <div class="section-meta">${codeSubmissions.length} submission${codeSubmissions.length !== 1 ? 's' : ''}</div>
                </div>
        `;

        for (const sub of codeSubmissions) {
            html += `
                <div class="code-submission">
                    <div class="code-submission-header">
                        <span class="code-lang"><i class="fas fa-code" style="margin-right:4px"></i>${escapeHtml(sub.language || 'Code')}</span>
                        <span class="code-time">${formatDate(sub.timestamp)}</span>
                    </div>
                    <pre class="code-content">${escapeHtml(sub.code || '')}</pre>
                </div>
            `;
        }

        html += `</div>`;
    }

    // Proctoring Violations
    if (vLogs.length) {
        html += `
            <div class="section">
                <div class="section-header">
                    <div class="section-title">
                        <div class="section-title-icon"><i class="fas fa-shield-alt"></i></div>
                        Proctoring Report
                    </div>
                    <div class="section-meta">${violations} violation${violations !== 1 ? 's' : ''} · ${vLogs.length} total events</div>
                </div>
                <div class="tab-bar">
                    <button class="tab-btn active" onclick="filterViolations('all', this)">All</button>
                    <button class="tab-btn" onclick="filterViolations('high', this)">Critical</button>
                    <button class="tab-btn" onclick="filterViolations('medium', this)">Warnings</button>
                </div>
                <div id="violationList">
        `;

        const sortedLogs = [...vLogs].filter(l => l.level !== 'info').sort((a, b) => {
            const sevOrder = { danger: 3, critical: 3, high: 3, warn: 2, medium: 2, low: 1 };
            return (sevOrder[b.level || b.severity] || 0) - (sevOrder[a.level || a.severity] || 0);
        });

        for (const log of sortedLogs.slice(0, 50)) {
            const sev = log.level || log.severity || 'low';
            const isCritical = ['danger', 'critical', 'high'].includes(sev);
            const isWarn = ['warn', 'medium'].includes(sev);
            const dotClass = isCritical ? 'high' : isWarn ? 'medium' : 'low';
            const sevLabel = isCritical ? 'Critical' : isWarn ? 'Warning' : 'Info';

            html += `
                <div class="violation-item" data-severity="${dotClass}">
                    <div class="violation-dot ${dotClass}"></div>
                    <span class="violation-time">${log.time || formatDate(log.timestamp).split(',')[1] || ''}</span>
                    <span class="violation-msg">${escapeHtml(log.msg || log.event_type || 'Unknown event')}</span>
                    <span class="violation-sev ${dotClass}">${sevLabel}</span>
                </div>
            `;
        }

        html += `</div></div>`;
    }

    document.getElementById('content').innerHTML = html;

    // Render skills chart
    if (Object.keys(skillScores).length) {
        setTimeout(() => renderSkillsChart(skillScores), 100);
    }
}

function calcAvgWords(convo) {
    const userTurns = convo.filter(c => c.role === 'user');
    if (!userTurns.length) return 0;
    const total = userTurns.reduce((sum, t) => sum + (t.content || '').split(/\s+/).filter(Boolean).length, 0);
    return Math.round(total / userTurns.length);
}

function renderSkillsChart(skillScores) {
    const ctx = document.getElementById('skillsChart');
    if (!ctx) return;

    const labels = Object.keys(skillScores);
    const data = labels.map(k => {
        const v = skillScores[k];
        return typeof v === 'object' ? v.score : Array.isArray(v) ? Math.round(v.reduce((a,b)=>a+b,0)/v.length) : v;
    });

    new Chart(ctx, {
        type: 'radar',
        data: {
            labels,
            datasets: [{
                label: 'Skill Score',
                data,
                fill: true,
                backgroundColor: 'rgba(99,102,241,.15)',
                borderColor: 'rgba(99,102,241,.8)',
                borderWidth: 2,
                pointBackgroundColor: 'rgba(99,102,241,1)',
                pointBorderColor: '#fff',
                pointBorderWidth: 2,
                pointRadius: 5,
                pointHoverRadius: 7,
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false }
            },
            scales: {
                r: {
                    angleLines: { color: 'rgba(255,255,255,.08)' },
                    grid: { color: 'rgba(255,255,255,.05)' },
                    pointLabels: {
                        color: '#8b8ba7',
                        font: { size: 11, weight: '600', family: 'Inter' }
                    },
                    ticks: {
                        color: '#525272',
                        backdropColor: 'transparent',
                        font: { size: 10, family: 'JetBrains Mono' }
                    },
                    suggestedMin: 0,
                    suggestedMax: 100
                }
            }
        }
    });
}

function filterConvo(type, btn) {
    document.querySelectorAll('#convoList ~ .tab-bar .tab-btn, .tab-bar .tab-btn').forEach(b => {
        if (b.parentElement.nextElementSibling?.id === 'convoList' || b.parentElement.previousElementSibling?.classList?.contains('section-header')) {
            // Only update related tabs
        }
    });
    btn.parentElement.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    document.querySelectorAll('#convoList .convo-turn').forEach(el => {
        if (type === 'all') el.style.display = '';
        else el.style.display = el.dataset.role === type ? '' : 'none';
    });
}

function filterViolations(type, btn) {
    btn.parentElement.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    document.querySelectorAll('#violationList .violation-item').forEach(el => {
        if (type === 'all') el.style.display = '';
        else el.style.display = el.dataset.severity === type ? '' : 'none';
    });
}

function exportJSON() {
    if (!interviewData) return;
    const blob = new Blob([JSON.stringify(interviewData, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `interview-${interviewData.candidate_name?.replace(/\s+/g, '-') || 'report'}-${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
}

load();
</script>
</body>
</html>
