<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Results — SimpaticoHR</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg:#0a0a0f; --card:#12121a; --surface:#1a1a2e; --border:#2a2a3e;
            --primary:#6366f1; --success:#10b981; --warning:#f59e0b; --danger:#ef4444;
            --text:#e2e8f0; --dim:#64748b; --muted:#475569;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:20px}
        .container{max-width:900px;margin:0 auto}
        .header{text-align:center;padding:40px 0 30px}
        .header h1{font-size:28px;font-weight:900;margin-bottom:4px}
        .header h1 span{color:#fcd34d}
        .header p{color:var(--dim);font-size:14px}
        
        .score-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:30px}
        .score-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;text-align:center}
        .score-card .val{font-size:36px;font-weight:900;margin-bottom:4px}
        .score-card .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
        
        .section{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px}
        .section-title{font-size:14px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
        .section-title i{color:var(--primary)}
        
        .skill-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
        .skill-name{min-width:120px;font-size:13px;color:var(--dim)}
        .skill-bar{flex:1;height:8px;background:var(--surface);border-radius:4px;overflow:hidden}
        .skill-fill{height:100%;border-radius:4px;transition:width .8s}
        .skill-score{font-size:13px;font-weight:700;min-width:40px;text-align:right}
        
        .convo-turn{padding:16px;border-radius:12px;margin-bottom:12px}
        .convo-ai{background:rgba(99,102,241,.08);border-left:3px solid var(--primary)}
        .convo-user{background:rgba(16,185,129,.08);border-left:3px solid var(--success)}
        .convo-role{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
        .convo-ai .convo-role{color:var(--primary)}
        .convo-user .convo-role{color:var(--success)}
        .convo-text{font-size:13px;line-height:1.6;color:var(--text)}
        .convo-meta{display:flex;gap:12px;margin-top:8px;font-size:11px;color:var(--muted)}
        .convo-meta span{display:flex;align-items:center;gap:4px}
        
        .violation-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--surface);border-radius:8px;margin-bottom:6px;font-size:12px}
        .violation-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
        .violation-dot.high{background:var(--danger)}
        .violation-dot.medium{background:var(--warning)}
        .violation-dot.low{background:var(--dim)}
        
        .badge{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600}
        .badge-pass{background:rgba(16,185,129,.15);color:#34d399}
        .badge-fail{background:rgba(239,68,68,.15);color:#f87171}
        .badge-warn{background:rgba(245,158,11,.15);color:#fcd34d}
        
        .loading{text-align:center;padding:60px;color:var(--dim)}
        .loading i{font-size:32px;margin-bottom:12px;display:block;animation:spin 1s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        
        @media(max-width:700px){.score-cards{grid-template-columns:1fr 1fr}}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Simpatico<span>HR</span></h1>
            <p>Interview Performance Report</p>
        </div>
        
        <div id="content">
            <div class="loading">
                <i class="fas fa-spinner"></i>
                Loading interview results...
            </div>
        </div>
    </div>

<script>
const SB_URL = 'https://cvkxtsvgnynxexmemfuy.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2a3h0c3ZnbnlueGV4bWVtZnV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc0MjE2NTEsImV4cCI6MjA4Mjk5NzY1MX0.2mys8Cc-ucJ1uLThEGJubeDEg1TvfIAkW-xFsR4ecq4';

const params = new URLSearchParams(window.location.search);
const interviewToken = params.get('token');
const interviewId = params.get('id');

async function load() {
    let filter = interviewId ? `id=eq.${interviewId}` : `token=eq.${encodeURIComponent(interviewToken)}`;
    
    const res = await fetch(`${SB_URL}/rest/v1/interviews?${filter}&select=*&limit=1`, {
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    });
    const data = await res.json();
    const interview = data?.[0];
    
    if (!interview) {
        document.getElementById('content').innerHTML = '<div class="loading">Interview not found.</div>';
        return;
    }

    const score = interview.overall_score || 0;
    const trust = interview.trust_score || 0;
    const violations = interview.violation_count || 0;
    const feedback = interview.feedback || {};
    const convo = interview.conversation_log || [];
    const skillScores = feedback.skill_scores || {};
    
    const scoreColor = s => s >= 70 ? 'var(--success)' : s >= 40 ? 'var(--warning)' : 'var(--danger)';
    const duration = interview.started_at && interview.completed_at 
        ? Math.round((new Date(interview.completed_at) - new Date(interview.started_at)) / 60000) 
        : '—';

    let html = `
        <div style="text-align:center;margin-bottom:24px">
            <div style="font-size:18px;font-weight:700">${interview.candidate_name || 'Candidate'}</div>
            <div style="font-size:13px;color:var(--dim)">${feedback.job_title || 'Interview'} · ${interview.candidate_email || ''}</div>
            <div style="margin-top:8px">
                <span class="badge ${interview.status === 'completed' ? 'badge-pass' : 'badge-warn'}">${interview.status?.toUpperCase()}</span>
            </div>
        </div>

        <div class="score-cards">
            <div class="score-card">
                <div class="val" style="color:${scoreColor(score)}">${score}%</div>
                <div class="label">Overall Score</div>
            </div>
            <div class="score-card">
                <div class="val" style="color:${scoreColor(trust)}">${trust}%</div>
                <div class="label">Trust Score</div>
            </div>
            <div class="score-card">
                <div class="val" style="color:var(--primary)">${feedback.total_questions || convo.filter(c=>c.role==='ai').length || '—'}</div>
                <div class="label">Questions</div>
            </div>
            <div class="score-card">
                <div class="val" style="color:var(--accent)">${duration}m</div>
                <div class="label">Duration</div>
            </div>
        </div>
    `;

    // Skills section
    if (Object.keys(skillScores).length) {
        html += `<div class="section">
            <div class="section-title"><i class="fas fa-code"></i> Skills Assessment</div>`;
        for (const [skill, data] of Object.entries(skillScores)) {
            const avg = typeof data === 'object' ? data.score : (Array.isArray(data) ? Math.round(data.reduce((a,b)=>a+b,0)/data.length) : data);
            html += `
                <div class="skill-row">
                    <span class="skill-name">${skill}</span>
                    <div class="skill-bar"><div class="skill-fill" style="width:${avg}%;background:${scoreColor(avg)}"></div></div>
                    <span class="skill-score" style="color:${scoreColor(avg)}">${avg}%</span>
                </div>`;
        }
        html += '</div>';
    }

    // Strong/Weak areas
    if (feedback.strong_areas?.length || feedback.weak_areas?.length) {
        html += `<div class="section">
            <div class="section-title"><i class="fas fa-chart-line"></i> Performance Summary</div>`;
        if (feedback.strong_areas?.length) {
            html += `<div style="margin-bottom:12px"><span style="color:var(--success);font-weight:700;font-size:12px">✅ Strengths:</span> <span style="font-size:13px;color:var(--dim)">${feedback.strong_areas.join(', ')}</span></div>`;
        }
        if (feedback.weak_areas?.length) {
            html += `<div><span style="color:var(--danger);font-weight:700;font-size:12px">⚠️ Areas for Improvement:</span> <span style="font-size:13px;color:var(--dim)">${feedback.weak_areas.join(', ')}</span></div>`;
        }
        html += '</div>';
    }

    // Conversation log
    if (convo.length) {
        html += `<div class="section">
            <div class="section-title"><i class="fas fa-comments"></i> Conversation Transcript</div>`;
        for (const turn of convo) {
            const isAI = turn.role === 'ai' || turn.role === 'assistant';
            html += `
                <div class="convo-turn ${isAI ? 'convo-ai' : 'convo-user'}">
                    <div class="convo-role">${isAI ? '🤖 AI Interviewer' : '👤 Candidate'}</div>
                    <div class="convo-text">${escapeHtml(turn.content || '')}</div>
                    <div class="convo-meta">
                        ${turn.phase ? `<span><i class="fas fa-tag"></i> ${turn.phase}</span>` : ''}
                        ${turn.score !== undefined ? `<span><i class="fas fa-star"></i> Score: ${turn.score}</span>` : ''}
                    </div>
                </div>`;
        }
        html += '</div>';
    }

    // Violations
    const vLogs = interview.violation_log || [];
    if (vLogs.length) {
        const dangerLogs = vLogs.filter(l => l.level === 'danger' || l.severity === 'high' || l.severity === 'critical');
        html += `<div class="section">
            <div class="section-title"><i class="fas fa-shield-alt"></i> Proctoring Report (${violations} violations)</div>`;
        for (const log of vLogs.filter(l => l.level !== 'info').slice(0, 30)) {
            const sev = log.level || log.severity || 'low';
            const dotClass = ['danger','high','critical'].includes(sev) ? 'high' : sev === 'warn' || sev === 'medium' ? 'medium' : 'low';
            html += `
                <div class="violation-item">
                    <div class="violation-dot ${dotClass}"></div>
                    <span style="color:var(--dim);min-width:70px">${log.time || ''}</span>
                    <span>${log.msg || log.event_type || ''}</span>
                </div>`;
        }
        html += '</div>';
    }

    document.getElementById('content').innerHTML = html;
}

function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

load();
</script>
</body>
</html>
