<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply for Position | Simpatico HR</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #002d5a;
            --tech: #00e5ff;
            --tech-gradient: linear-gradient(135deg, #00e5ff 0%, #0078d4 100%);
            --light: #f4f7fa;
            --border: #e2e8f0;
            --text-dark: #0b1a27;
            --text-gray: #546b81;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--light);
            color: var(--text-dark);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .apply-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 45, 90, 0.05);
            max-width: 600px;
            width: 100%;
            border-top: 4px solid var(--primary);
        }

        .apply-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .apply-header h2 {
            margin: 0 0 10px 0;
            color: var(--primary);
            font-weight: 700;
        }

        .apply-header p {
            color: var(--text-gray);
            margin: 0;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #0078d4;
            box-shadow: 0 0 0 3px rgba(0, 120, 212, 0.1);
            background: #fff;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--tech-gradient);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 120, 212, 0.3);
            filter: brightness(1.05);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        #successState {
            display: none;
            text-align: center;
            padding: 20px 0;
        }

        .success-icon {
            font-size: 4.5rem;
            color: #10b981;
            margin-bottom: 20px;
            animation: scaleIn 0.5s ease-out;
        }

        @keyframes scaleIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }
        }
    </style>
</head>
<body>

    <div class="apply-card">
        <div class="apply-header" id="headerState">
            <h2>Apply Now</h2>
            <p id="jobContext">Loading position details...</p>
        </div>

        <form id="applyForm">
            <div class="form-row">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="firstName" required placeholder="e.g. Diana">
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="lastName" required placeholder="e.g. Prince">
                </div>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="diana@example.com">
            </div>

            <div class="form-group">
                <label>Resume Summary / Skills</label>
                <textarea id="skills" rows="4" required placeholder="List your key skills or paste a short summary of your experience..."></textarea>
                <small style="color: var(--text-gray); font-size: 0.8rem; margin-top: 8px; display: block;">
                    <i class="fas fa-robot"></i> Simpatico AI will analyze these details for an instant match score.
                </small>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                Submit Application <i class="fas fa-paper-plane"></i>
            </button>
        </form>

        <div id="successState">
            <div class="success-icon"><i class="fas fa-check-circle"></i></div>
            <h2 style="color: var(--primary); margin-bottom: 10px;">Application Sent!</h2>
            <p style="color: var(--text-gray); margin-bottom: 30px;">Thank you for applying. Your profile is being processed by our AI screening engine.</p>
            <a href="jobs.html" style="text-decoration: none; color: #0078d4; font-weight: 700; border: 1px solid #0078d4; padding: 10px 20px; border-radius: 8px; transition: 0.2s;">View More Jobs</a>
        </div>
    </div>

    <script>
        // --- DATABASE CONFIGURATION ---
        const SUPABASE_URL = 'https://cvkxtsvgnynxexmemfuy.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2a3h0c3ZnbnlueGV4bWVtZnV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc0MjE2NTEsImV4cCI6MjA4Mjk5NzY1MX0.2mys8Cc-ucJ1uLThEGJubeDEg1TvfIAkW-xFsR4ecq4';
        
        // FIX: Renamed variable to 'supabaseClient' to avoid the naming crash
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- URL LOGIC ---
       // Reads ?role=Title and ?job_id=... from the address bar
        const urlParams = new URLSearchParams(window.location.search);
        const appliedRole = urlParams.get('role') || 'General Application';
        const jobId = urlParams.get('job_id') || null; // <--- ADD THIS LINE
        // Update the UI text,
        document.getElementById('jobContext').innerHTML = `You are applying for the <strong>${appliedRole}</strong> position.`;

        // --- FORM SUBMISSION ---
        document.getElementById('applyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = 'Analyzing with AI... <i class="fas fa-spinner fa-spin"></i>';

            // Gather Data
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const email = document.getElementById('email').value.trim();

            try {
                // Insert into 'applications' table
                const { data, error } = await supabaseClient
                    .from('applications')
                    .insert([
                        {
                            name: `${firstName} ${lastName}`,
                            email: email,
                            status: 'New', 
                            applied_for: appliedRole,
                            job_id: jobId,
                            created_at: new Date().toISOString()
                        }
                    ]);

                if (error) throw error;

                // UI Transition
                document.getElementById('applyForm').style.display = 'none';
                document.getElementById('headerState').style.display = 'none';
                document.getElementById('successState').style.display = 'block';

            } catch (err) {
                alert("Database Error: " + err.message);
                console.error(err);
                btn.disabled = false;
                btn.innerHTML = 'Submit Application <i class="fas fa-paper-plane"></i>';
            }
        });
       
    </script>
</body>
</html>
