<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply for Position | Simpatico HR</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="js/hr-config.js"></script>
<script src="js/shared-utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #002d5a;
            --tech: #00e5ff;
            --tech-gradient: linear-gradient(135deg, #00e5ff 0%, #0078d4 100%);
            --light: #f4f7fa;
            --border: #e2e8f0;
            --text-dark: #0b1a27;
            --text-gray: #546b81;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--light);
            color: var(--text-dark);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .apply-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 45, 90, 0.05);
            max-width: 600px;
            width: 100%;
            border-top: 4px solid var(--primary);
        }

        .apply-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .apply-header h2 {
            margin: 0 0 10px 0;
            color: var(--primary);
            font-weight: 700;
        }

        .apply-header p {
            color: var(--text-gray);
            margin: 0;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #0078d4;
            box-shadow: 0 0 0 3px rgba(0, 120, 212, 0.1);
            background: #fff;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--tech-gradient);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 120, 212, 0.3);
            filter: brightness(1.05);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Resume Upload Styling */
        .file-upload-box {
            border: 2px dashed var(--border);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: #fafbfc;
        }

        .file-upload-box:hover {
            border-color: #0078d4;
            background: #f0f7ff;
        }

        .file-upload-box i {
            font-size: 1.5rem;
            color: var(--text-gray);
            margin-bottom: 8px;
        }

        .file-upload-box p {
            margin: 0;
            font-size: 0.85rem;
            color: var(--text-gray);
        }

        .file-name-display {
            margin-top: 10px;
            font-size: 0.85rem;
            color: var(--primary);
            font-weight: 600;
        }

        #successState {
            display: none;
            text-align: center;
            padding: 20px 0;
        }

        .success-icon {
            font-size: 4.5rem;
            color: #10b981;
            margin-bottom: 20px;
            animation: scaleIn 0.5s ease-out;
        }

        @keyframes scaleIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }
        }
    </style>
</head>
<body>

    <div class="apply-card">
        <div class="apply-header" id="headerState">
            <h2>Apply Now</h2>
            <p id="jobContext">Loading position details...</p>
        </div>

        <form id="applyForm">
            <div class="form-row">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="firstName" required placeholder="e.g. Diana">
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="lastName" required placeholder="e.g. Prince">
                </div>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="diana@example.com">
            </div>

            <div class="form-group">
                <label>Upload Resume (PDF)</label>
                <div class="file-upload-box" onclick="document.getElementById('resumeFile').click()">
                    <i class="fas fa-file-pdf"></i>
                    <p>Click to upload your resume (PDF only, max 5MB)</p>
                    <div id="resumeName" class="file-name-display"></div>
                </div>
                <input type="file" id="resumeFile" accept=".pdf" style="display:none;">
            </div>

            <div class="form-group">
                <label>Resume Summary / Skills</label>
                <textarea id="skills" rows="4" required placeholder="List your key skills or paste a short summary of your experience..."></textarea>
                <small style="color: var(--text-gray); font-size: 0.8rem; margin-top: 8px; display: block;">
                    <i class="fas fa-robot"></i> Simpatico AI will analyze these details for an instant match score.
                </small>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                Submit Application <i class="fas fa-paper-plane"></i>
            </button>
        </form>

        <div id="successState">
            <div class="success-icon"><i class="fas fa-check-circle"></i></div>
            <h2 style="color: var(--primary); margin-bottom: 10px;">Application Sent!</h2>
            <p style="color: var(--text-gray); margin-bottom: 30px;">Thank you for applying. Your profile is being processed by our AI screening engine.</p>
            <a href="jobs.html" style="text-decoration: none; color: #0078d4; font-weight: 700; border: 1px solid #0078d4; padding: 10px 20px; border-radius: 8px; transition: 0.2s;">View More Jobs</a>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const SUPABASE_URL  = window.SIMPATICO_CONFIG?.supabaseUrl;
        const SUPABASE_ANON_KEY = window.SIMPATICO_CONFIG?.supabaseAnonKey;
        const WORKER_URL    = window.SIMPATICO_CONFIG?.workerUrl || 'https://simpatico-hr-ats.simpaticohrconsultancy.workers.dev';
        const TENANT_ID     = window.SIMPATICO_CONFIG?.tenantId  || 'SIMP_PRO_MAIN';

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- URL PARAMS ---
        const urlParams   = new URLSearchParams(window.location.search);
        const appliedRole = urlParams.get('role') || 'General Application';
        const jobId       = urlParams.get('job_id') || null;

        document.getElementById('jobContext').innerHTML =
            `You are applying for the <strong>${appliedRole}</strong> position.`;

        // File name display
        document.getElementById('resumeFile').addEventListener('change', e => {
            document.getElementById('resumeName').textContent = e.target.files[0]?.name || '';
        });

        // --- FORM SUBMISSION ---
        document.getElementById('applyForm').addEventListener('submit', async e => {
            e.preventDefault();

            const btn        = document.getElementById('submitBtn');
            const resumeFile = document.getElementById('resumeFile').files[0];

            if (!resumeFile) { alert('Please upload your resume.'); return; }

            btn.disabled = true;
            btn.innerHTML = 'Uploading Resume... <i class="fas fa-spinner fa-spin"></i>';

            const firstName = document.getElementById('firstName').value.trim();
            const lastName  = document.getElementById('lastName').value.trim();
            const email     = document.getElementById('email').value.trim();
            const skills    = document.getElementById('skills').value.trim();

            try {
                // ── Step 1: Convert to Base64 (Bypass Frontend RLS) ──────
                const base64Resume = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(resumeFile);
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = error => reject(error);
                });
                const filePath = `resumes/${Date.now()}-${Math.random().toString(36).slice(2)}.${resumeFile.name.split('.').pop()}`;

                // ── Step 2: Extract plain text for AI scoring ────────────
                // PDF parsing is server-side; we send the skills summary as resume_text.
                // The Worker AI will score this against the job description.
                const resumeText = skills
                    ? `Skills & Experience:\n${skills}`
                    : 'No resume summary provided.';

                // ── Step 3: POST to Worker ─────────────────────────────────
                //    This triggers: AI scoring → auto-shortlist check → interview scheduling
                btn.innerHTML = '🤖 AI Screening... <i class="fas fa-spinner fa-spin"></i>';

                const workerRes = await fetch(`${WORKER_URL}/recruitment/applications`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Tenant-ID':  TENANT_ID
                    },
                    body: JSON.stringify({
                        candidate_name:  `${firstName} ${lastName}`,
                        candidate_email: email,
                        job_id:          jobId,
                        resume_base64:   base64Resume,
                        resume_filename: filePath,
                        resume_text:     resumeText,
                        skills:          skills,
                        source:          'careers_page',
                        status:          'applied'
                    })
                });

                const result = await workerRes.json();
                if (!workerRes.ok) {
                    throw new Error(result?.error?.message || result?.message || 'Submission failed');
                }

                // ── Step 4: Show contextual success screen ─────────────────
                const autoScheduled = result?.data?.auto_scheduled;
                const matchScore    = result?.data?.match_score;

                document.getElementById('applyForm').style.display = 'none';
                document.getElementById('headerState').style.display = 'none';
                const successEl = document.getElementById('successState');
                successEl.style.display = 'block';

                if (autoScheduled && matchScore >= 75) {
                    successEl.innerHTML = `
                        <div class="success-icon"><i class="fas fa-check-circle"></i></div>
                        <h2 style="color:var(--primary);margin-bottom:10px">Application Sent!</h2>
                        <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:16px;margin-bottom:20px">
                            <p style="color:#166534;font-weight:700;margin:0 0 6px">🎉 AI Match Score: ${matchScore}%</p>
                            <p style="color:#15803d;font-size:.9rem;margin:0">
                                Congratulations! Your profile is a strong match.
                                You've been <strong>automatically invited to an AI proctored interview</strong>.
                                Check your email for the interview link.
                            </p>
                        </div>
                        <a href="jobs.html" style="text-decoration:none;color:#0078d4;font-weight:700;border:1px solid #0078d4;padding:10px 20px;border-radius:8px">View More Jobs</a>`;
                } else {
                    successEl.innerHTML = `
                        <div class="success-icon"><i class="fas fa-check-circle"></i></div>
                        <h2 style="color:var(--primary);margin-bottom:10px">Application Sent!</h2>
                        <p style="color:var(--text-gray);margin-bottom:8px">
                            Your profile is being reviewed by our AI screening engine.
                        </p>
                        ${matchScore !== null && matchScore !== undefined
                            ? `<p style="color:#64748b;font-size:.9rem;margin-bottom:20px">AI Match Score: <strong>${matchScore}%</strong> — Our team will be in touch soon.</p>`
                            : `<p style="color:#64748b;font-size:.9rem;margin-bottom:20px">Our recruiting team will be in touch soon.</p>`}
                        <a href="jobs.html" style="text-decoration:none;color:#0078d4;font-weight:700;border:1px solid #0078d4;padding:10px 20px;border-radius:8px">View More Jobs</a>`;
                }

            } catch (err) {
                console.error('Application error:', err);
                alert('Application Error: ' + err.message);
                btn.disabled = false;
                btn.innerHTML = 'Submit Application <i class="fas fa-paper-plane"></i>';
            }
        });
    </script>
</body>
</html>
