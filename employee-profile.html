<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Profile — Simpatico HR</title>
  <link rel="stylesheet" href="/hr-modules.css">
  <style>
    .profile-hero {
      background: linear-gradient(135deg, var(--hr-bg-card) 0%, rgba(0,196,255,.06) 100%);
      border: 1px solid var(--hr-border); border-radius: var(--hr-radius-xl);
      padding: 32px; display: flex; align-items: flex-start; gap: 28px;
      margin-bottom: 28px; position: relative; overflow: hidden;
    }
    .profile-hero::before {
      content:''; position:absolute; top:-60px; right:-60px;
      width:200px; height:200px;
      background: radial-gradient(circle, rgba(0,196,255,.08) 0%, transparent 70%);
      border-radius: 50%;
    }
    .profile-avatar-lg {
      width:88px; height:88px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-family:var(--hr-font-display); font-size:30px; font-weight:700;
      border:3px solid var(--hr-border-light); flex-shrink:0;
      position:relative; cursor:pointer;
    }
    .profile-avatar-lg .change-photo {
      position:absolute; inset:0; border-radius:50%;
      background:rgba(0,0,0,.6); display:flex; align-items:center;
      justify-content:center; opacity:0; transition:opacity .2s;
      font-size:11px; color:#fff; text-align:center;
    }
    .profile-avatar-lg:hover .change-photo { opacity:1; }
    .profile-info { flex:1; }
    .profile-info h1 { font-family:var(--hr-font-display); font-size:24px; font-weight:700; margin-bottom:4px; }
    .profile-info .role { font-size:14px; color:var(--hr-text-secondary); margin-bottom:12px; }
    .profile-meta { display:flex; gap:20px; flex-wrap:wrap; }
    .profile-meta-item { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--hr-text-muted); }
    .profile-meta-item svg { width:14px; height:14px; }
    .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:24px; }
    .info-field .if-label { font-size:11px; font-weight:600; color:var(--hr-text-muted); text-transform:uppercase; letter-spacing:.06em; margin-bottom:4px; }
    .info-field .if-value { font-size:14px; color:var(--hr-text-primary); font-weight:500; }
    .perf-ring { width:80px; height:80px; position:relative; flex-shrink:0; }
    .perf-ring svg { transform:rotate(-90deg); }
    .perf-ring .score { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:var(--hr-font-display); font-size:20px; font-weight:700; }
  </style>
<script>
// Hide shell when loaded inside dashboard iframe
if (window.self !== window.top) {
  document.addEventListener("DOMContentLoaded", function() {
    var shell = document.querySelector(".hr-shell");
    if (shell) {
      shell.style.gridTemplateColumns = "1fr";
      shell.style.gridTemplateRows = "1fr";
    }
    var topbar = document.querySelector(".hr-topbar");
    if (topbar) topbar.style.display = "none";
    var sidebar = document.querySelector(".hr-sidebar");
    if (sidebar) sidebar.style.display = "none";
    var main = document.querySelector(".hr-main");
    if (main) {
      main.style.gridColumn = "1";
      main.style.padding = "20px";
    }
  });
}
</script></head>
<body class="hr-module">
<div class="hr-shell">
  <header class="hr-topbar">
    <!-- <a href="/dashboard/hr.html" class="hr-topbar-brand">
      <img src="favicon-96x96.png" style="width:32px;height:32px;border-radius:8px;margin-right:8px;vertical-align:middle;">Simpatico<span>HR</span>
    </a> -->
    <div class="hr-topbar-right">
      <a href="/employees.html" class="hr-btn hr-btn-ghost hr-btn-sm">? Back to Employees</a>
      <div class="hr-avatar" id="user-avatar">U</div>
    </div>
  </header>

  <nav class="hr-sidebar">
    <div class="hr-nav-section">Core HR</div>
    <a class="hr-nav-item active" href="/employees.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Employees</a>
    <a class="hr-nav-item" href="/onboarding.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>Onboarding</a>
    <a class="hr-nav-item" href="/training.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>Training</a>
    <a class="hr-nav-item" href="/performance.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Performance</a>
    <div class="hr-nav-section" style="margin-top:8px">Operations</div>
    <a class="hr-nav-item" href="/hr-ops.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/></svg>HR Ops</a>
    <a class="hr-nav-item" href="/payroll.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Payroll</a>
    <div class="hr-nav-section" style="margin-top:8px">Intelligence</div>
    <a class="hr-nav-item" href="/analytics.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Analytics</a>
    <a class="hr-nav-item" href="/ai-assistant.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>AI Assistant</a>
  </nav>

  <main class="hr-main" id="profile-main">
    <div id="profile-loading" style="padding:80px;text-align:center">
      <div class="hr-skeleton" style="width:80px;height:80px;border-radius:50%;margin:0 auto 20px"></div>
      <div class="hr-skeleton" style="height:22px;width:200px;margin:0 auto 8px"></div>
      <div class="hr-skeleton" style="height:14px;width:140px;margin:0 auto"></div>
    </div>
    <div id="profile-content" style="display:none"></div>
  </main>
</div>

<div class="hr-toast-container" id="toasts"></div>
<input type="file" id="photo-upload" accept="image/*" style="display:none" onchange="uploadPhoto(event)">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script src="js/hr-config.js"></script>
  <script src="/employees.js"></script>
</body>
</html>
