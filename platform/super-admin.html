<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin - SimpaticoHR</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:#F3F4F6; }
        .sidebar {
            position:fixed; left:0; top:0; bottom:0; width:260px;
            background:linear-gradient(180deg,#0F172A,#1E293B);
            color:#fff; z-index:100; display:flex; flex-direction:column;
        }
        .sidebar-header { padding:24px 20px 16px; border-bottom:1px solid rgba(255,255,255,.1); }
        .logo-wrap { display:flex; align-items:center; gap:10px; }
        .logo-icon {
            width:38px; height:38px; border-radius:10px;
            background:linear-gradient(135deg,#F59E0B,#EF4444);
            display:flex; align-items:center; justify-content:center;
            font-size:18px; font-weight:900; color:#fff; flex-shrink:0;
            box-shadow:0 4px 12px rgba(245,158,11,.4);
        }
        .logo-text { display:flex; flex-direction:column; }
        .logo-name { font-size:18px; font-weight:800; color:#fff; line-height:1; }
        .logo-name span { color:#F59E0B; }
        .logo-tagline { font-size:10px; color:rgba(255,255,255,.45); margin-top:2px; letter-spacing:.5px; }
        .sidebar-role { font-size:11px; color:#EF4444; text-transform:uppercase; letter-spacing:1px; margin-top:10px; font-weight:700; display:flex; align-items:center; gap:5px; }
        .sidebar-nav { padding:16px 12px; flex:1; }
        .nav-item {
            display:flex; align-items:center; gap:12px; padding:11px 14px;
            border-radius:10px; color:rgba(255,255,255,.7); text-decoration:none;
            font-size:14px; font-weight:500; margin-bottom:2px; cursor:pointer; transition:all 0.2s;
        }
        .nav-item:hover { background:rgba(255,255,255,.08); color:#fff; }
        .nav-item.active { background:rgba(239,68,68,.2); color:#fff; font-weight:600; }
        .nav-item i { width:20px; text-align:center; }
        .nav-divider { height:1px; background:rgba(255,255,255,.08); margin:12px 0; }
        .sidebar-footer { padding:16px 12px; border-top:1px solid rgba(255,255,255,.08); }
        .main { margin-left:260px; min-height:100vh; }
        .topbar {
            background:#fff; padding:16px 30px;
            display:flex; align-items:center; justify-content:space-between;
            border-bottom:1px solid #E5E7EB; position:sticky; top:0; z-index:50;
        }
        .page-title { font-size:20px; font-weight:700; color:#0F172A; }
        .topbar-right { display:flex; align-items:center; gap:12px; font-size:13px; color:#6B7280; }
        .dot-live { width:8px; height:8px; background:#10B981; border-radius:50%; animation:pulse 2s infinite; display:inline-block; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
        .content { padding:24px 30px; }
        .stat-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:16px; margin-bottom:24px; }
        .stat-card {
            background:#fff; border-radius:14px; padding:20px;
            box-shadow:0 1px 3px rgba(0,0,0,.06); text-align:center;
            border:1px solid transparent; transition:all 0.2s;
        }
        .stat-card:hover { border-color:rgba(245,158,11,.3); transform:translateY(-2px); }
        .stat-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:16px; margin:0 auto 10px; }
        .stat-value { font-size:28px; font-weight:800; color:#0F172A; }
        .stat-label { font-size:12px; color:#6B7280; margin-top:4px; font-weight:500; }
        .panel {
            background:#fff; border-radius:14px; padding:24px;
            box-shadow:0 1px 3px rgba(0,0,0,.06); margin-bottom:24px; border:1px solid #F3F4F6;
        }
        .panel-header {
            display:flex; align-items:center; justify-content:space-between;
            margin-bottom:18px; padding-bottom:14px; border-bottom:1px solid #F3F4F6;
        }
        .panel-title { font-size:16px; font-weight:700; color:#0F172A; }
        .panel-badge { font-size:11px; font-weight:600; padding:4px 10px; border-radius:6px; background:#EFF6FF; color:#2563EB; }
        .table-wrap { overflow-x:auto; }
        table { width:100%; border-collapse:collapse; }
        th { text-align:left; font-size:11px; font-weight:600; color:#6B7280; text-transform:uppercase; letter-spacing:.6px; padding:10px 14px; border-bottom:2px solid #F3F4F6; }
        td { padding:14px; font-size:14px; border-bottom:1px solid rgba(243,244,246,.8); vertical-align:middle; }
        tr:last-child td { border-bottom:none; }
        tr:hover td { background:#FAFBFC; }
        .badge { display:inline-flex; align-items:center; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; }
        .badge-active   { background:rgba(16,185,129,.12); color:#059669; border:1px solid rgba(16,185,129,.2); }
        .badge-trial    { background:rgba(245,158,11,.12); color:#B45309; border:1px solid rgba(245,158,11,.2); }
        .badge-inactive { background:rgba(239,68,68,.1);  color:#DC2626; border:1px solid rgba(239,68,68,.15); }
        .badge-premium  { background:rgba(99,102,241,.12); color:#4F46E5; border:1px solid rgba(99,102,241,.2); }
        .btn-create {
            padding:8px 16px; border-radius:10px; font-size:13px; font-weight:700;
            cursor:pointer; border:none; font-family:inherit;
            background:linear-gradient(135deg,#DC2626,#EF4444); color:#fff; transition:all 0.2s;
        }
        .btn-create:hover { transform:translateY(-1px); box-shadow:0 4px 12px rgba(239,68,68,.3); }
        /* Settings */
        .settings-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
        .settings-group { margin-bottom:16px; }
        .settings-group label { display:block; font-size:12px; font-weight:700; color:#374151; text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }
        .hint { font-size:11px; color:#9CA3AF; margin-top:5px; font-style:italic; }
        .settings-input {
            width:100%; padding:10px 14px; border:1.5px solid #E5E7EB;
            border-radius:10px; font-size:14px; font-family:inherit;
            color:#0F172A; background:#F9FAFB; transition:all 0.2s; outline:none;
        }
        .settings-input:focus { border-color:#3B82F6; background:#fff; box-shadow:0 0 0 3px rgba(59,130,246,.1); }
        .secret-wrap { position:relative; }
        .secret-wrap .settings-input { padding-right:40px; font-family:monospace; }
        .secret-wrap .eye-btn { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:#9CA3AF; font-size:14px; }
        .info-row { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:#F9FAFB; border-radius:10px; border:1px solid #F3F4F6; margin-bottom:10px; }
        .info-key { font-size:13px; font-weight:600; color:#374151; }
        .info-val { font-size:13px; color:#6B7280; font-family:monospace; word-break:break-all; max-width:55%; text-align:right; }
        .conn-badge { display:inline-flex; align-items:center; gap:6px; padding:6px 14px; border-radius:8px; font-size:12px; font-weight:600; }
        .conn-ok  { background:rgba(16,185,129,.1); color:#059669; }
        .conn-err { background:rgba(239,68,68,.1); color:#DC2626; }
        .conn-wait{ background:rgba(245,158,11,.1); color:#B45309; }
        .settings-footer { display:flex; align-items:center; justify-content:space-between; margin-top:20px; padding-top:16px; border-top:1px solid #F3F4F6; flex-wrap:wrap; gap:12px; }
        .btn-save { padding:10px 24px; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; border:none; font-family:inherit; background:linear-gradient(135deg,#2563EB,#3B82F6); color:#fff; transition:all 0.2s; display:inline-flex; align-items:center; gap:8px; }
        .btn-save:hover { transform:translateY(-1px); box-shadow:0 4px 12px rgba(37,99,235,.3); }
        .btn-ghost { padding:10px 20px; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; border:1.5px solid #E5E7EB; font-family:inherit; background:#fff; color:#374151; transition:all 0.2s; display:inline-flex; align-items:center; gap:8px; }
        .btn-ghost:hover { background:#F9FAFB; }
        .btn-danger-outline { padding:10px 24px; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; border:1.5px solid #FECACA; font-family:inherit; background:#FEF2F2; color:#DC2626; transition:all 0.2s; display:inline-flex; align-items:center; gap:8px; }
        .btn-danger-outline:hover { background:#FEE2E2; }
        .loader { text-align:center; padding:40px; }
        .loader .spin { width:30px; height:30px; border:3px solid #E5E7EB; border-top-color:#EF4444; border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 12px; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .loader p { color:#9CA3AF; font-size:13px; }
        .access-denied { text-align:center; padding:80px 20px; }
        .access-denied .icon { width:80px; height:80px; border-radius:50%; background:rgba(239,68,68,.1); display:flex; align-items:center; justify-content:center; margin:0 auto 20px; }
        .access-denied .icon i { font-size:32px; color:#EF4444; }
        .access-denied h2 { font-size:22px; font-weight:700; color:#0F172A; margin-bottom:8px; }
        .access-denied p { color:#6B7280; margin-bottom:20px; max-width:400px; margin:0 auto 20px; }
        .access-denied a { display:inline-flex; align-items:center; gap:6px; color:#2563EB; text-decoration:none; font-weight:600; font-size:14px; }
        .toast { position:fixed; top:20px; right:20px; padding:14px 20px; border-radius:10px; font-size:14px; font-weight:600; color:#fff; z-index:10000; max-width:400px; box-shadow:0 10px 30px rgba(0,0,0,.2); animation:toastIn .3s ease; }
        .toast-success { background:#059669; }
        .toast-error   { background:#DC2626; }
        .toast-info    { background:#2563EB; }
        @keyframes toastIn { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }
        .menu-toggle { display:none; background:none; border:none; color:#0F172A; font-size:20px; cursor:pointer; }
        @media(max-width:768px) {
            .sidebar { transform:translateX(-100%); transition:0.3s; }
            .sidebar.open { transform:translateX(0); }
            .main { margin-left:0; }
            .content { padding:16px; }
            .stat-grid { grid-template-columns:repeat(2,1fr); }
            .settings-grid { grid-template-columns:1fr; }
            .menu-toggle { display:block; }
            .topbar { padding:12px 16px; }
        }
    </style>
</head>
<body>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="logo-wrap">
            <div class="logo-icon">S</div>
            <div class="logo-text">
                <div class="logo-name">Simpatico<span>HR</span></div>
                <div class="logo-tagline">HR Management Platform</div>
            </div>
        </div>
        <div class="sidebar-role"><i class="fas fa-shield-alt"></i> Super Admin</div>
    </div>
    <nav class="sidebar-nav">
        <a class="nav-item active" id="navDash" onclick="showSection('dashboard')">
            <i class="fas fa-tachometer-alt"></i> Dashboard
        </a>
        <a class="nav-item" id="navCompanies" onclick="showSection('companies')">
            <i class="fas fa-building"></i> Companies
        </a>
        <a class="nav-item" id="navUsers" onclick="showSection('users')">
            <i class="fas fa-users"></i> All Users
        </a>
        <a class="nav-item" id="navJobs" onclick="showSection('jobs')">
            <i class="fas fa-briefcase"></i> All Jobs
        </a>
        <div class="nav-divider"></div>
        <a class="nav-item" onclick="window.open('../index.html','_blank')">
            <i class="fas fa-external-link-alt"></i> View Website
        </a>
        <a class="nav-item" id="navSettings" onclick="showSection('settings')">
            <i class="fas fa-cog"></i> Settings
        </a>
    </nav>
    <div class="sidebar-footer">
        <a class="nav-item" onclick="signOut()" style="color:rgba(255,100,100,.8)">
            <i class="fas fa-sign-out-alt"></i> Sign Out
        </a>
    </div>
</aside>

<div class="main">
    <div class="topbar">
        <div style="display:flex;align-items:center;gap:12px;">
            <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
                <i class="fas fa-bars"></i>
            </button>
            <div class="page-title" id="pageTitle">Super Admin Dashboard</div>
        </div>
        <div class="topbar-right">
            <span class="dot-live"></span>
            <i class="fas fa-shield-alt" style="color:#EF4444"></i>
            <span id="adminName">Super Admin</span>
        </div>
    </div>
    <div class="content" id="mainContent">
        <div class="loader"><div class="spin"></div><p>Loading dashboard...</p></div>
    </div>
</div>

<script>
const SUPABASE_URL      = "https://api.simpaticohr.in";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2a3h0c3ZnbnlueGV4bWVtZnV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc0MjE2NTEsImV4cCI6MjA4Mjk5NzY1MX0.2mys8Cc-ucJ1uLThEGJubeDEg1TvfIAkW-xFsR4ecq4";

const token = localStorage.getItem('simpatico_token') || sessionStorage.getItem('simpatico_token');
const user  = JSON.parse(localStorage.getItem('simpatico_user') || sessionStorage.getItem('simpatico_user') || '{}');
const sbHeaders = { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
let cachedCompanies = null;

function checkAuth() {
    if (!token) { showAccessDenied('No authentication token found. Please log in first.'); return false; }
    if (user.role && user.role !== 'super_admin') { showAccessDenied(`Your role is "${user.role}". Super admin access required.`); return false; }
    return true;
}
function showAccessDenied(msg) {
    document.getElementById('mainContent').innerHTML = `
        <div class="access-denied">
            <div class="icon"><i class="fas fa-lock"></i></div>
            <h2>Access Denied</h2><p>${msg}</p>
            <a href="login.html"><i class="fas fa-arrow-left"></i> Go to Login</a>
        </div>`;
}
try { document.getElementById('adminName').textContent = user.full_name || user.name || user.email || 'Super Admin'; } catch(e) {}

async function sbQuery(table, params = '') {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, { headers: sbHeaders });
    const data = await res.json();
    if (!res.ok) throw new Error(data?.message || data?.hint || `Failed to query ${table}`);
    return data;
}
async function sbCount(table, filter = '') {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${filter}select=id`, {
        headers: { ...sbHeaders, 'Prefer':'count=exact', 'Range-Unit':'items', 'Range':'0-0' }
    });
    const range = res.headers.get('Content-Range') || '';
    const match = range.match(/\/(\d+)$/);
    return match ? parseInt(match[1]) : 0;
}

function showSection(section) {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const navMap = { dashboard:'navDash', companies:'navCompanies', users:'navUsers', jobs:'navJobs', settings:'navSettings' };
    const el = document.getElementById(navMap[section]);
    if (el) el.classList.add('active');
    document.getElementById('sidebar').classList.remove('open');
    const actions = { dashboard:loadDashboard, companies:loadCompanies, users:loadUsers, jobs:loadJobs, settings:loadSettings };
    if (actions[section]) actions[section]();
}

async function loadDashboard() {
    document.getElementById('pageTitle').textContent = 'Super Admin Dashboard';
    document.getElementById('mainContent').innerHTML = '<div class="loader"><div class="spin"></div><p>Loading stats...</p></div>';
    if (!checkAuth()) return;
    try {
        const [companies, users, jobs, applications, interviews] = await Promise.all([
            sbCount('companies'), sbCount('users'), sbCount('jobs'),
            sbCount('applications').catch(() => 0), sbCount('interviews').catch(() => 0)
        ]);
        document.getElementById('mainContent').innerHTML = `
            <div class="stat-grid">
                <div class="stat-card"><div class="stat-icon" style="background:rgba(59,130,246,.1);color:#3B82F6"><i class="fas fa-building"></i></div><div class="stat-value">${companies}</div><div class="stat-label">Companies</div></div>
                <div class="stat-card"><div class="stat-icon" style="background:rgba(16,185,129,.1);color:#10B981"><i class="fas fa-users"></i></div><div class="stat-value">${users}</div><div class="stat-label">Users</div></div>
                <div class="stat-card"><div class="stat-icon" style="background:rgba(245,158,11,.1);color:#F59E0B"><i class="fas fa-briefcase"></i></div><div class="stat-value">${jobs}</div><div class="stat-label">Jobs</div></div>
                <div class="stat-card"><div class="stat-icon" style="background:rgba(139,92,246,.1);color:#8B5CF6"><i class="fas fa-file-alt"></i></div><div class="stat-value">${applications}</div><div class="stat-label">Applications</div></div>
                <div class="stat-card"><div class="stat-icon" style="background:rgba(239,68,68,.1);color:#EF4444"><i class="fas fa-video"></i></div><div class="stat-value">${interviews}</div><div class="stat-label">Interviews</div></div>
            </div>
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title"><i class="fas fa-building" style="color:#3B82F6;margin-right:8px"></i>Recent Companies</div>
                    <button class="btn-create" onclick="showSection('companies')">View All →</button>
                </div>
                <div id="recentCompanies"><div class="loader"><div class="spin"></div><p>Loading...</p></div></div>
            </div>`;
        loadRecentCompanies();
    } catch(e) {
        document.getElementById('mainContent').innerHTML = `
            <div class="access-denied">
                <div class="icon"><i class="fas fa-exclamation-triangle" style="color:#F59E0B"></i></div>
                <h2>Connection Error</h2><p>${e.message}</p>
                <a href="#" onclick="loadDashboard();return false;"><i class="fas fa-redo"></i> Retry</a>
            </div>`;
    }
}

async function loadRecentCompanies() {
    try {
        const companies = await sbQuery('companies', 'select=*&order=created_at.desc&limit=5');
        cachedCompanies = companies;
        const c = document.getElementById('recentCompanies');
        if (c) renderCompaniesTable(c, companies);
    } catch(e) {
        const c = document.getElementById('recentCompanies');
        if (c) c.innerHTML = `<p style="text-align:center;color:#EF4444;padding:20px">${e.message}</p>`;
    }
}

async function loadCompanies() {
    document.getElementById('pageTitle').textContent = 'All Companies';
    document.getElementById('mainContent').innerHTML = '<div class="loader"><div class="spin"></div><p>Loading companies...</p></div>';
    if (!checkAuth()) return;
    try {
        const companies = await sbQuery('companies', 'select=*&order=created_at.desc');
        cachedCompanies = companies;
        document.getElementById('mainContent').innerHTML = `
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title"><i class="fas fa-building" style="color:#3B82F6;margin-right:8px"></i>Companies (${companies.length})</div>
                    <span class="panel-badge">${companies.length} total</span>
                </div>
                <div id="companiesTableWrap"></div>
            </div>`;
        renderCompaniesTable(document.getElementById('companiesTableWrap'), companies);
    } catch(e) {
        document.getElementById('mainContent').innerHTML = `<p style="text-align:center;color:#EF4444;padding:40px">${e.message}</p>`;
    }
}

function renderCompaniesTable(container, companies) {
    if (!Array.isArray(companies) || companies.length === 0) {
        container.innerHTML = '<p style="text-align:center;color:#9CA3AF;padding:30px">No companies registered yet</p>';
        return;
    }
    container.innerHTML = `
        <div class="table-wrap"><table>
            <thead><tr><th>Company</th><th>Industry</th><th>Size</th><th>Plan</th><th>Registered</th></tr></thead>
            <tbody>${companies.map(c => `<tr>
                <td><strong>${esc(c.name)}</strong><br><span style="font-size:12px;color:#6B7280">${esc(c.contact_email||'')}</span></td>
                <td>${esc(c.industry||'-')}</td>
                <td style="font-size:13px">${esc(c.company_size||'-')}</td>
                <td><span class="badge badge-${getPlanBadge(c.subscription_plan)}">${esc(c.subscription_plan||'trial')}</span></td>
                <td style="font-size:13px;color:#6B7280">${formatDate(c.created_at)}</td>
            </tr>`).join('')}</tbody>
        </table></div>`;
}

async function loadUsers() {
    document.getElementById('pageTitle').textContent = 'All Users';
    document.getElementById('mainContent').innerHTML = '<div class="loader"><div class="spin"></div><p>Loading users...</p></div>';
    if (!checkAuth()) return;
    try {
        const users = await sbQuery('users', 'select=*&order=created_at.desc');
        if (Array.isArray(users) && users.length > 0) {
            document.getElementById('mainContent').innerHTML = `
                <div class="panel">
                    <div class="panel-header">
                        <div class="panel-title"><i class="fas fa-users" style="color:#10B981;margin-right:8px"></i>Users (${users.length})</div>
                        <span class="panel-badge">${users.length} total</span>
                    </div>
                    <div class="table-wrap"><table>
                        <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Joined</th></tr></thead>
                        <tbody>${users.map(u => `<tr>
                            <td><strong>${esc(u.full_name||'-')}</strong></td>
                            <td style="font-size:13px">${esc(u.email)}</td>
                            <td><span class="badge badge-${getRoleBadge(u.role)}">${esc(u.role)}</span></td>
                            <td><span class="badge ${u.is_active!==false?'badge-active':'badge-inactive'}">${u.is_active!==false?'Active':'Inactive'}</span></td>
                            <td style="font-size:13px;color:#6B7280">${formatDate(u.created_at)}</td>
                        </tr>`).join('')}</tbody>
                    </table></div>
                </div>`;
        } else {
            document.getElementById('mainContent').innerHTML = `<div class="panel"><div class="panel-header"><div class="panel-title">All Users</div></div><p style="text-align:center;color:#9CA3AF;padding:40px">No users found</p></div>`;
        }
    } catch(e) {
        document.getElementById('mainContent').innerHTML = `
            <div class="panel"><div class="panel-header"><div class="panel-title">All Users</div></div>
            <p style="text-align:center;color:#EF4444;padding:40px">${e.message}</p>
            <p style="text-align:center;color:#9CA3AF;padding-bottom:20px;font-size:13px">Add an RLS policy on the <code>users</code> table allowing <code>super_admin</code> to read all rows.</p></div>`;
    }
}

async function loadJobs() {
    document.getElementById('pageTitle').textContent = 'All Jobs';
    document.getElementById('mainContent').innerHTML = '<div class="loader"><div class="spin"></div><p>Loading jobs...</p></div>';
    if (!checkAuth()) return;
    try {
        const jobs = await sbQuery('jobs', 'select=*,companies(name)&order=created_at.desc');
        if (Array.isArray(jobs) && jobs.length > 0) {
            document.getElementById('mainContent').innerHTML = `
                <div class="panel">
                    <div class="panel-header"><div class="panel-title"><i class="fas fa-briefcase" style="color:#F59E0B;margin-right:8px"></i>Jobs (${jobs.length})</div></div>
                    <div class="table-wrap"><table>
                        <thead><tr><th>Title</th><th>Company</th><th>Location</th><th>Status</th><th>Posted</th></tr></thead>
                        <tbody>${jobs.map(j => `<tr>
                            <td><strong>${esc(j.title||'-')}</strong></td>
                            <td style="font-size:13px">${esc(j.companies?.name||j.company_name||'-')}</td>
                            <td style="font-size:13px">${esc(j.location||'-')}</td>
                            <td><span class="badge ${j.is_active?'badge-active':'badge-inactive'}">${j.is_active?'Active':'Closed'}</span></td>
                            <td style="font-size:13px;color:#6B7280">${formatDate(j.created_at)}</td>
                        </tr>`).join('')}</tbody>
                    </table></div>
                </div>`;
        } else {
            document.getElementById('mainContent').innerHTML = `<div class="panel"><div class="panel-header"><div class="panel-title">All Jobs</div></div><p style="text-align:center;color:#9CA3AF;padding:40px">No jobs posted yet</p></div>`;
        }
    } catch(e) {
        document.getElementById('mainContent').innerHTML = `<p style="text-align:center;color:#EF4444;padding:40px">${e.message}</p>`;
    }
}

// ══════════════════════════════════════════
// SETTINGS
// ══════════════════════════════════════════
function loadSettings() {
    document.getElementById('pageTitle').textContent = 'Platform Settings';
    if (!checkAuth()) return;

    const savedUrl     = localStorage.getItem('cfg_supabase_url')  || SUPABASE_URL;
    const savedKey     = localStorage.getItem('cfg_supabase_key')  || SUPABASE_ANON_KEY;
    const savedName    = localStorage.getItem('cfg_platform_name') || 'SimpaticoHR';
    const savedSupport = localStorage.getItem('cfg_support_email') || '';

    document.getElementById('mainContent').innerHTML = `

        <div class="panel">
            <div class="panel-header">
                <div class="panel-title"><i class="fas fa-plug" style="color:#10B981;margin-right:8px"></i>Database Connection</div>
                <span id="connStatus" class="conn-badge conn-wait"><i class="fas fa-circle-notch fa-spin"></i>&nbsp;Testing...</span>
            </div>
            <div class="info-row">
                <span class="info-key"><i class="fas fa-link" style="color:#6B7280;margin-right:6px"></i>Active Supabase URL</span>
                <span class="info-val">${esc(SUPABASE_URL)}</span>
            </div>
            <div class="info-row">
                <span class="info-key"><i class="fas fa-key" style="color:#6B7280;margin-right:6px"></i>Anon Key</span>
                <span class="info-val">${SUPABASE_ANON_KEY.substring(0,30)}…</span>
            </div>
            <button class="btn-ghost" style="margin-top:14px" onclick="testConnection()"><i class="fas fa-vial"></i> Re-test Connection</button>
        </div>

        <div class="panel">
            <div class="panel-header">
                <div class="panel-title"><i class="fas fa-database" style="color:#3B82F6;margin-right:8px"></i>Supabase Configuration</div>
                <span class="panel-badge">Session Override</span>
            </div>
            <p style="font-size:13px;color:#6B7280;margin-bottom:20px;line-height:1.6">
                Override connection settings for this browser session. To apply permanently, update the source files and redeploy.
            </p>
            <div class="settings-grid">
                <div class="settings-group">
                    <label><i class="fas fa-globe" style="margin-right:5px"></i>Supabase URL</label>
                    <input type="text" id="cfgUrl" class="settings-input" value="${esc(savedUrl)}" placeholder="https://api.simpaticohr.in">
                    <div class="hint">Custom domain or supabase.co project URL</div>
                </div>
                <div class="settings-group">
                    <label><i class="fas fa-key" style="margin-right:5px"></i>Anon Key</label>
                    <div class="secret-wrap">
                        <input type="password" id="cfgKey" class="settings-input" value="${esc(savedKey)}" placeholder="eyJ...">
                        <button class="eye-btn" onclick="toggleKey(this)"><i class="fas fa-eye"></i></button>
                    </div>
                    <div class="hint">Public anon key — safe for frontend use</div>
                </div>
            </div>
            <div class="settings-footer">
                <div style="display:flex;gap:10px;flex-wrap:wrap;">
                    <button class="btn-save" onclick="saveSupabaseConfig()"><i class="fas fa-save"></i> Save & Apply</button>
                    <button class="btn-ghost" onclick="resetSupabaseConfig()"><i class="fas fa-undo"></i> Reset to Default</button>
                </div>
                <span style="font-size:12px;color:#9CA3AF"><i class="fas fa-info-circle"></i> Saved to browser localStorage</span>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">
                <div class="panel-title"><i class="fas fa-building" style="color:#8B5CF6;margin-right:8px"></i>Platform Information</div>
            </div>
            <div class="settings-grid">
                <div class="settings-group">
                    <label>Platform Name</label>
                    <input type="text" id="cfgName" class="settings-input" value="${esc(savedName)}" placeholder="SimpaticoHR">
                </div>
                <div class="settings-group">
                    <label>Support Email</label>
                    <input type="email" id="cfgSupport" class="settings-input" value="${esc(savedSupport)}" placeholder="support@simpaticohr.in">
                </div>
            </div>
            <div class="settings-footer">
                <button class="btn-save" onclick="savePlatformInfo()"><i class="fas fa-save"></i> Save Info</button>
            </div>
        </div>

        <div class="panel" style="border:1.5px solid #FECACA;">
            <div class="panel-header">
                <div class="panel-title" style="color:#DC2626"><i class="fas fa-exclamation-triangle" style="margin-right:8px"></i>Danger Zone</div>
            </div>
            <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
                <div>
                    <div style="font-size:14px;font-weight:600;color:#374151">Clear All Saved Settings</div>
                    <div style="font-size:13px;color:#6B7280;margin-top:2px">Remove all overrides and revert to source defaults</div>
                </div>
                <button class="btn-danger-outline" onclick="clearAllSettings()"><i class="fas fa-trash-alt"></i> Clear Settings</button>
            </div>
        </div>
    `;
    testConnection();
}

function toggleKey(btn) {
    const inp = document.getElementById('cfgKey');
    inp.type = inp.type === 'password' ? 'text' : 'password';
    btn.innerHTML = inp.type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
}

async function testConnection() {
    const el = document.getElementById('connStatus');
    if (!el) return;
    el.className = 'conn-badge conn-wait';
    el.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i>&nbsp;Testing...';
    try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/companies?select=id&limit=1`, {
            headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
        });
        if (res.ok || res.status === 400 || res.status === 406) {
            el.className = 'conn-badge conn-ok';
            el.innerHTML = '<i class="fas fa-check-circle"></i>&nbsp;Connected';
        } else throw new Error(`HTTP ${res.status}`);
    } catch(e) {
        el.className = 'conn-badge conn-err';
        el.innerHTML = '<i class="fas fa-times-circle"></i>&nbsp;Connection Failed';
    }
}

function saveSupabaseConfig() {
    const url = document.getElementById('cfgUrl')?.value?.trim();
    const key = document.getElementById('cfgKey')?.value?.trim();
    if (!url || !key) { toast('URL and Key cannot be empty', 'error'); return; }
    if (!url.startsWith('http')) { toast('URL must start with https://', 'error'); return; }
    localStorage.setItem('cfg_supabase_url', url);
    localStorage.setItem('cfg_supabase_key', key);
    toast('✅ Config saved! Reload the page to apply.', 'success');
}

function resetSupabaseConfig() {
    if (!confirm('Reset to hardcoded defaults?')) return;
    localStorage.removeItem('cfg_supabase_url');
    localStorage.removeItem('cfg_supabase_key');
    document.getElementById('cfgUrl').value = SUPABASE_URL;
    document.getElementById('cfgKey').value = SUPABASE_ANON_KEY;
    toast('Reset to source defaults', 'info');
}

function savePlatformInfo() {
    const name    = document.getElementById('cfgName')?.value?.trim();
    const support = document.getElementById('cfgSupport')?.value?.trim();
    if (name)    localStorage.setItem('cfg_platform_name', name);
    if (support) localStorage.setItem('cfg_support_email', support);
    toast('✅ Platform info saved!', 'success');
}

function clearAllSettings() {
    if (!confirm('Clear all saved settings?')) return;
    ['cfg_supabase_url','cfg_supabase_key','cfg_platform_name','cfg_support_email'].forEach(k => localStorage.removeItem(k));
    toast('All settings cleared', 'info');
    setTimeout(() => loadSettings(), 1200);
}

// Utils
function esc(str) { return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatDate(d) {
    if (!d) return '-';
    try { return new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}); }
    catch(e) { return d; }
}
function getPlanBadge(p) { if(!p||p==='trial') return 'trial'; if(p==='premium'||p==='enterprise') return 'premium'; return 'active'; }
function getRoleBadge(r) { return {super_admin:'inactive',company_admin:'premium',hr:'active',candidate:'trial',interviewer:'active'}[r]||'trial'; }
function signOut() {
    if (confirm('Sign out?')) {
        ['simpatico_token','simpatico_user','simpatico_refresh','simpatico_company'].forEach(k=>{localStorage.removeItem(k);sessionStorage.removeItem(k);});
        window.location.href='login.html';
    }
}
function toast(msg, type='info') {
    document.querySelector('.toast')?.remove();
    const t = document.createElement('div');
    t.className = `toast toast-${type}`;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 4000);
}

loadDashboard();
</script>
