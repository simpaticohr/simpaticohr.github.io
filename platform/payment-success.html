<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful — Simpatico HR</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(160deg, #0F172A 0%, #1E293B 50%, #1E40AF 100%);
      color: white; padding: 20px;
    }
    .success-card {
      background: white; border-radius: 24px; padding: 48px 40px;
      max-width: 480px; width: 100%; text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,0.3);
      animation: slideUp 0.5s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .check-circle {
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(135deg, #10B981, #059669);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px; animation: pop 0.6s ease;
    }
    @keyframes pop {
      0% { transform: scale(0); }
      60% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    .check-circle i { color: white; font-size: 36px; }
    h1 { color: #0F172A; font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; }
    .subtitle { color: #64748B; font-size: 14px; margin-bottom: 24px; line-height: 1.6; }
    .plan-info {
      background: #F8FAFC; border-radius: 12px; padding: 16px;
      margin-bottom: 24px; border: 1px solid #E2E8F0;
    }
    .plan-info .label { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
    .plan-info .value { font-size: 18px; font-weight: 700; color: #0F172A; text-transform: capitalize; }
    .plan-info .gateway-tag {
      display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 10px;
      border-radius: 100px; margin-top: 6px;
    }
    .gateway-cashfree { background: #EEF2FF; color: #4F46E5; }
    .gateway-paddle { background: #F0FDF4; color: #059669; }
    .cta-btn {
      display: inline-block; padding: 14px 32px; background: linear-gradient(135deg, #4F46E5, #7C3AED);
      color: white; border-radius: 12px; text-decoration: none;
      font-weight: 700; font-size: 14px; transition: all 0.2s;
    }
    .cta-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(79,70,229,0.35); }
    .confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
  </style>
</head>
<body>
  <canvas class="confetti" id="confetti"></canvas>
  <div class="success-card">
    <div class="check-circle"><i class="fas fa-check"></i></div>
    <h1>Payment Successful! 🎉</h1>
    <p class="subtitle">Your subscription has been activated. All premium features are now unlocked for your organization.</p>
    <div class="plan-info">
      <div class="label">Active Plan</div>
      <div class="value" id="planName">Professional</div>
      <div id="gatewayTag"></div>
    </div>
    <a href="/dashboard/hr.html" class="cta-btn">
      <i class="fas fa-arrow-right" style="margin-right:8px"></i>Go to Dashboard
    </a>
  </div>

<script>
// Parse params
const params = new URLSearchParams(window.location.search);
const plan = params.get('plan') || 'professional';
const gateway = params.get('gateway') || 'cashfree';

document.getElementById('planName').textContent = plan.charAt(0).toUpperCase() + plan.slice(1);
const tag = document.getElementById('gatewayTag');
tag.innerHTML = `<span class="gateway-tag gateway-${gateway}"><i class="fas ${gateway === 'cashfree' ? 'fa-indian-rupee-sign' : 'fa-globe'}"></i> Paid via ${gateway === 'cashfree' ? 'Cashfree' : 'Paddle'}</span>`;

// Mini confetti effect
const canvas = document.getElementById('confetti');
const ctx2d = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const pieces = [];
const colors = ['#4F46E5','#7C3AED','#10B981','#F59E0B','#EF4444','#A5B4FC'];
for (let i = 0; i < 80; i++) {
  pieces.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height - canvas.height,
    w: Math.random() * 8 + 4,
    h: Math.random() * 6 + 3,
    color: colors[Math.floor(Math.random() * colors.length)],
    vy: Math.random() * 3 + 2,
    vx: Math.random() * 2 - 1,
    rot: Math.random() * 360,
    vr: Math.random() * 6 - 3,
  });
}
let frame = 0;
function draw() {
  ctx2d.clearRect(0, 0, canvas.width, canvas.height);
  pieces.forEach(p => {
    p.y += p.vy; p.x += p.vx; p.rot += p.vr;
    ctx2d.save();
    ctx2d.translate(p.x, p.y);
    ctx2d.rotate(p.rot * Math.PI / 180);
    ctx2d.fillStyle = p.color;
    ctx2d.globalAlpha = Math.max(0, 1 - frame / 120);
    ctx2d.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    ctx2d.restore();
  });
  frame++;
  if (frame < 150) requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
