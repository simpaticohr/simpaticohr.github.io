<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Signing in...</title></head>
<body style="font-family:Inter,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f8fafc">
<div style="text-align:center">
  <div style="width:40px;height:40px;border:3px solid #e2e8f0;border-top-color:#3b82f6;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px"></div>
  <p id="msg" style="color:#64748b">Signing you in...</p>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
<script>
const SB_URL = 'https://cvkxtsvgnynxexmemfuy.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2a3h0c3ZnbnlueGV4bWVtZnV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc0MjE2NTEsImV4cCI6MjA4Mjk5NzY1MX0.2mys8Cc-ucJ1uLThEGJubeDEg1TvfIAkW-xFsR4ecq4';

const ROLE_ROUTES = {
    hr: '../dashboard/hr.html',
    hr_manager: '../dashboard/hr.html',
    company_admin: '../dashboard/hr.html',
    interviewer: '../dashboard/hr.html',
    candidate: '../dashboard/candidate.html',
    super_admin: 'super-admin.html'
};

const TAB_ALLOWED = {
    hr: ['hr','hr_manager','company_admin','interviewer'],
    candidate: ['candidate'],
    super_admin: ['super_admin']
};

function showError(msg) {
    document.getElementById('msg').textContent = msg;
    document.querySelector('div > div').style.display = 'none';
    setTimeout(() => { window.location.href = 'login.html'; }, 3000);
}

async function init() {
    const hash = Object.fromEntries(new URLSearchParams(window.location.hash.slice(1)));
    const params = new URLSearchParams(window.location.search);
    const selectedRole = params.get('role') || 'candidate';
    const token = hash.access_token;

    if (!token) { window.location.href = 'login.html'; return; }

    // Get Supabase auth user
    const r = await fetch(SB_URL + '/auth/v1/user', {
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + token }
    });
    const authUser = await r.json();
    if (!authUser.id) { showError('Authentication failed. Redirecting...'); return; }

    // Check users table
    const ur = await fetch(SB_URL + '/rest/v1/users?email=eq.' + encodeURIComponent(authUser.email) + '&select=*&limit=1', {
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + token }
    });
    const users = await ur.json();

    let role;
    if (users && users.length > 0) {
        // Existing user — validate role matches tab
        role = users[0].role;
        const allowed = TAB_ALLOWED[selectedRole] || [];
        if (!allowed.includes(role)) {
            showError('Access denied. Your account is not a ' + selectedRole + ' account. Redirecting to login...');
            return;
        }
    } else {
        // New user — assign role based on tab
        // Block Google signup for super_admin
        if (selectedRole === 'super_admin') {
            showError('Super Admin accounts cannot be created via Google. Redirecting...');
            return;
        }
        role = selectedRole === 'hr' ? 'hr' : 'candidate';
        await fetch(SB_URL + '/rest/v1/users', {
            method: 'POST',
            headers: {
                'apikey': SB_KEY,
                'Authorization': 'Bearer ' + token,
                'Content-Type': 'application/json',
                'Prefer': 'return=representation'
            },
            body: JSON.stringify({
                name: authUser.user_metadata?.full_name || authUser.email,
                email: authUser.email,
                role,
                is_active: true,
                created_at: new Date().toISOString()
            })
        });
    }

    localStorage.setItem('simpatico_token', token);
    localStorage.setItem('simpatico_user', JSON.stringify({
        id: authUser.id,
        email: authUser.email,
        role,
        name: authUser.user_metadata?.full_name || authUser.email
    }));

    window.location.href = ROLE_ROUTES[role] || '../dashboard/hr.html';
}
init();
</script>
</body></html>
