<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Signing in...</title></head>
<body style="font-family:Inter,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f8fafc">
<div style="text-align:center">
  <div style="width:40px;height:40px;border:3px solid #e2e8f0;border-top-color:#3b82f6;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px"></div>
  <p id="msg" style="color:#64748b">Signing you in...</p>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
<script src="../js/hr-config.js"></script>
<script>
const SB_URL = window.SIMPATICO_CONFIG?.supabaseUrl;
const SB_KEY = window.SIMPATICO_CONFIG?.supabaseAnonKey;

const ROLE_ROUTES = {
    hr: '../dashboard/hr.html',
    hr_manager: '../dashboard/hr.html',
    company_admin: '../dashboard/hr.html',
    interviewer: '../dashboard/hr.html',
    candidate: '../dashboard/candidate.html',
    super_admin: 'super-admin.html'
};

const TAB_ALLOWED = {
    hr: ['hr','hr_manager','company_admin','interviewer'],
    candidate: ['candidate'],
    super_admin: ['super_admin']
};

function showError(msg) {
    document.getElementById('msg').textContent = msg;
    document.querySelector('div > div').style.display = 'none';
    setTimeout(() => { window.location.href = 'login.html'; }, 4000);
}

async function init() {
    // FIX 1: IMMEDIATELY WIPE OLD CACHE
    // This stops the new user from seeing the previous user's dashboard data
    localStorage.clear();
    sessionStorage.clear();

    const hash = Object.fromEntries(new URLSearchParams(window.location.hash.slice(1)));
    const params = new URLSearchParams(window.location.search);
    const selectedRole = params.get('role') || 'candidate';
    const token = hash.access_token;

    if (!token) { window.location.href = 'login.html'; return; }

    // Get Supabase auth user
    const r = await fetch(SB_URL + '/auth/v1/user', {
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + token }
    });
    const authUser = await r.json();
    if (!authUser.id) { showError('Authentication failed. Redirecting...'); return; }

    // Check custom users table to see if they are registered/invited
    const ur = await fetch(SB_URL + '/rest/v1/users?email=eq.' + encodeURIComponent(authUser.email) + '&select=*&limit=1', {
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + token }
    });
    const users = await ur.json();

    let role;
    if (users && users.length > 0) {
        // Existing user — validate role matches tab
        role = users[0].role;
        const allowed = TAB_ALLOWED[selectedRole] || [];
        if (!allowed.includes(role)) {
            showError('Access denied. Your account is not a ' + selectedRole + ' account. Redirecting to login...');
            return;
        }
    } else {
        // FIX 2: STRICT SAAS AUTHORIZATION FOR NEW USERS
        
        // Block Google signup for Super Admins entirely
        if (selectedRole === 'super_admin') {
            showError('Super Admin accounts cannot be created via Google. Redirecting...');
            return;
        }

        // If they are trying to log in as HR, but aren't in the database yet: DENY THEM.
        // In Enterprise SaaS, HR users must be invited by an admin first.
        if (selectedRole === 'hr') {
            showError('Access Denied: Unregistered Email. Please ask your company administrator to invite you to the platform first.');
            
            // Optional: Sign them out of Supabase auth completely so they aren't lurking as an orphaned auth user
            await fetch(SB_URL + '/auth/v1/logout', {
                method: 'POST',
                headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + token }
            });
            return; 
        }

        // If you allow OPEN signups for Candidates, let them create an account here
        if (selectedRole === 'candidate') {
            role = 'candidate';
            await fetch(SB_URL + '/rest/v1/users', {
                method: 'POST',
                headers: {
                    'apikey': SB_KEY,
                    'Authorization': 'Bearer ' + token,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=representation'
                },
                body: JSON.stringify({
                    name: authUser.user_metadata?.full_name || authUser.email,
                    email: authUser.email,
                    role: role,
                    is_active: true,
                    created_at: new Date().toISOString()
                })
            });
        }
    }

    // Finally, set the fresh tokens and route them to the dashboard
    localStorage.setItem('simpatico_token', token);
    localStorage.setItem('simpatico_user', JSON.stringify({
        id: authUser.id,
        email: authUser.email,
        role: role,
        name: authUser.user_metadata?.full_name || authUser.email
    }));

    window.location.href = ROLE_ROUTES[role] || '../dashboard/hr.html';
}
init();
</script>
</body></html>
