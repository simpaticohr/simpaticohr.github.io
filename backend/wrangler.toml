# ── ENGINE 1: EVALIS (Legacy / AI Interview Only) ──
name = "hr-api"
main = "workers/hr-api.js"
compatibility_date = "2024-09-23"

[ai]
binding = "AI"

# Bypassed temporarily to avoid R2 billing errors
# [[r2_buckets]]
# binding = "HR_BUCKET"
# bucket_name = "simpatico-hr-files"

# ─────────────────────────────────────────────────────────────
# ── ENGINE 2: SIMPATICO HR SAAS (Production Isolated) ──
# ─────────────────────────────────────────────────────────────

[env.production]
name = "simpatico-hr-ats"
main = "simpatico-ats.js"
compatibility_date = "2024-09-23"
workers_dev = true

[env.production.vars]
PLATFORM_NAME = "Simpatico HR Enterprise"
ENVIRONMENT = "production"
API_VERSION = "5.0.0-Industrial"

# ── Cloudflare AI (This Fixes the AI Assistant Tab) ──
[env.production.ai]
binding = "AI"

# ── Cron Triggers (Server-Side Automation Engine) ──
# Fires the scheduled() handler daily at 08:00 UTC
# Processes: schedule_daily, schedule_weekly, sla_breached,
#            probation_ending, birthday, work_anniversary
[env.production.triggers]
crons = ["0 8 * * *"]

# ── Vectorize (Enterprise Knowledge RAG) ──
# Bypassed temporarily because it requires a dashboard index
# [[env.production.vectorize]]
# binding = "VECTORIZE"
# index_name = "hr-knowledge"

# ── R2 Bucket (Secure Employee Vault) ──
# Bypassed temporarily to avoid R2 billing errors
# [[env.production.r2_buckets]]
# binding = "HR_BUCKET"
# bucket_name = "simpatico-hr-files"

# ── KV (Session & Analytics Cache + DLQ) ──
[[env.production.kv_namespaces]]
binding = "HR_KV"
id = "01a7d0500ff94d09b7086b56be975d0c"

# ── Payment Gateway Config ──
# Set secrets via: wrangler secret put CASHFREE_APP_ID --env production
# Required secrets:
#   CASHFREE_APP_ID        — From Cashfree dashboard
#   CASHFREE_SECRET_KEY    — From Cashfree dashboard
#   PADDLE_API_KEY         — From Paddle dashboard > Developer Tools
#   PADDLE_WEBHOOK_SECRET  — From Paddle dashboard > Notifications

# Non-secret vars:
# [env.production.vars]
# CASHFREE_ENV = "sandbox"        # "sandbox" or "production"
# PADDLE_ENV = "sandbox"          # "sandbox" or "production"
# FRONTEND_URL = "https://simpaticohr.github.io"
# WORKER_URL = "https://simpatico-hr-ats.simpaticohrconsultancy.workers.dev"