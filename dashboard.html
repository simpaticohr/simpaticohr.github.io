<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting to Dashboard...</title>
  <script>
    // Role-based dashboard routing
    const user = JSON.parse(localStorage.getItem('simpatico_user') || sessionStorage.getItem('simpatico_user') || '{}');
    const role = user.role || '';

    switch(role) {
      case 'super_admin':
      case 'superadmin':
        window.location.href = 'platform/super-admin.html';
        break;
      case 'candidate':
        window.location.href = 'dashboard/candidate.html';
        break;
      case 'interviewer':
        window.location.href = 'dashboard/interviewer.html';
        break;
      case 'hr':
      case 'admin':
      case 'hr_manager':
      case 'company_admin':
        window.location.href = 'dashboard/hr.html';
        break;
      default:
        window.location.href = 'dashboard/hr.html';
    }
  </script>
</head>
<body>
  <p>If you are not redirected automatically, please <a href="dashboard/hr.html">click here to go to the main ATS Dashboard</a>.</p>
</body>
</html>
