<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting... | Simpatico HR</title>
  <script src="js/hr-config.js"></script>
  <script>
    // GitHub Pages SPA Router
    // Handles clean URLs: /job/<slug>-<id>, /company/<slug>
    (function() {
      const path = window.location.pathname.replace(/\/$/, '');
      const segments = path.split('/').filter(Boolean);

      // /job/<slug>-<uuid>
      if (segments[0] === 'job' && segments[1]) {
        const raw = segments[1];
        // Extract UUID from end of slug (last 36 chars or after last hyphen group)
        const uuidMatch = raw.match(/([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})$/i);
        if (uuidMatch) {
          sessionStorage.setItem('_routeJobId', uuidMatch[1]);
          sessionStorage.setItem('_routeJobSlug', raw);
          window.location.replace('/job/?id=' + uuidMatch[1]);
          return;
        }
        // Fallback: treat entire segment as ID
        sessionStorage.setItem('_routeJobId', raw);
        window.location.replace('/job/?id=' + raw);
        return;
      }

      // /company/<slug-or-uuid>
      if (segments[0] === 'company' && segments[1]) {
        const slug = segments[1];
        const uuidMatch = slug.match(/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i);
        if (uuidMatch) {
          sessionStorage.setItem('_routeCompanyId', slug);
          window.location.replace('/company/?id=' + slug);
        } else {
          sessionStorage.setItem('_routeCompanySlug', slug);
          window.location.replace('/company/?slug=' + slug);
        }
        return;
      }
    })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:#0a0f1e;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .container{text-align:center;padding:60px 20px;max-width:500px}
    .icon{font-size:4rem;margin-bottom:24px;opacity:.6}
    h1{font-size:2rem;font-weight:800;background:linear-gradient(135deg,#fff,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px}
    p{color:#64748b;font-size:1rem;line-height:1.6;margin-bottom:32px}
    .btn{display:inline-flex;align-items:center;gap:8px;background:#6366f1;color:#fff;padding:14px 28px;border-radius:14px;text-decoration:none;font-weight:700;font-size:.95rem;transition:all .2s}
    .btn:hover{transform:scale(1.03);box-shadow:0 8px 24px rgba(99,102,241,.3)}
    .links{margin-top:24px;display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
    .links a{color:#6366f1;text-decoration:none;font-size:.9rem;font-weight:500}
    .links a:hover{text-decoration:underline}
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🔍</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a class="btn" href="/">← Back to Home</a>
    <div class="links">
      <a href="/jobs.html">Browse Jobs</a>
      <a href="/careers.html">Careers</a>
    </div>
  </div>
</body>
</html>
