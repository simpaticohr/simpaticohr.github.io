<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Mock Interview Practice — Sign In | Simpatico HR Career Lab</title>
<meta name="description" content="Sign in to access AI-powered mock interviews, ATS resume optimizer, and career development tools. Practice for any role in 12+ languages with instant AI feedback.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://simpaticohr.in/career-lab-gate.html">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #6366f1;
    --accent2: #8b5cf6;
    --bg: #020617;
    --card: rgba(15,23,42,.65);
    --border: rgba(255,255,255,.08);
    --text: #f8fafc;
    --muted: #94a3b8;
    --green: #10b981;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background:
      radial-gradient(circle at 10% 20%, rgba(99,102,241,.15), transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(79,70,229,.1), transparent 40%),
      var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .gate-card {
    background: var(--card);
    backdrop-filter: blur(22px);
    border: 1px solid var(--border);
    border-radius: 32px;
    padding: 48px 40px;
    max-width: 440px;
    width: 100%;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .gate-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent));
  }
  .lock-icon {
    font-size: 3.5rem;
    margin-bottom: 20px;
    display: block;
  }
  .gate-card h1 {
    font-size: 1.8rem;
    font-weight: 800;
    background: linear-gradient(#fff, #94a3b8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 12px;
  }
  .gate-card p {
    color: var(--muted);
    font-size: 0.95rem;
    line-height: 1.7;
    margin-bottom: 32px;
  }
  .feature-list {
    text-align: left;
    margin-bottom: 32px;
    list-style: none;
  }
  .feature-list li {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.88rem;
    color: var(--muted);
  }
  .feature-list li:last-child { border-bottom: none; }
  .feature-list .icon {
    font-size: 1.1rem;
    min-width: 24px;
    text-align: center;
  }
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 16px;
    border-radius: 16px;
    font-weight: 700;
    font-size: 0.95rem;
    text-decoration: none;
    cursor: pointer;
    border: none;
    font-family: inherit;
    transition: all 0.2s;
    margin-bottom: 12px;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { transform: scale(1.02); box-shadow: 0 8px 30px rgba(99,102,241,0.3); }
  .btn-secondary { background: transparent; border: 1px solid var(--border); color: #fff; }
  .btn-secondary:hover { border-color: rgba(99,102,241,0.4); background: rgba(99,102,241,0.06); }
  .btn-green { background: var(--green); color: #fff; }
  .btn-green:hover { transform: scale(1.02); box-shadow: 0 8px 30px rgba(16,185,129,0.3); }
  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 16px 0; color: var(--muted);
    font-size: 0.78rem; font-weight: 600; letter-spacing: 0.5px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  @media (max-width: 480px) {
    .gate-card { padding: 36px 24px; border-radius: 24px; }
    .gate-card h1 { font-size: 1.5rem; }
  }
</style>
</head>
<body>

  <div class="gate-card">
    <span class="lock-icon">&#x1F510;</span>
    <h1>Career Lab Access</h1>
    <p id="gateSubtitle">Sign in with your Simpatico HR account to access AI mock interviews, career tools, and the ATS optimizer.</p>

    <!-- INLINE CANDIDATE LOGIN & REGISTER FORM -->
    <form id="authForm" onsubmit="handleAuthSubmit(event)">
      <div style="text-align:left; margin-bottom:14px; display:none;" id="nameGroup">
        <label style="display:block; font-size:0.8rem; font-weight:600; color:var(--muted); margin-bottom:4px;">Full Name *</label>
        <input type="text" id="candName" placeholder="e.g. Rahul Sharma" style="width:100%; padding:12px; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:12px; color:#fff; font-size:0.95rem; outline:none;" />
      </div>

      <div style="text-align:left; margin-bottom:14px;">
        <label style="display:block; font-size:0.8rem; font-weight:600; color:var(--muted); margin-bottom:4px;">Candidate Email *</label>
        <input type="email" id="candEmail" placeholder="candidate@example.com" required style="width:100%; padding:12px; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:12px; color:#fff; font-size:0.95rem; outline:none;" />
      </div>

      <div style="text-align:left; margin-bottom:20px;">
        <label style="display:block; font-size:0.8rem; font-weight:600; color:var(--muted); margin-bottom:4px;">Password *</label>
        <input type="password" id="candPass" placeholder="••••••••" required style="width:100%; padding:12px; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:12px; color:#fff; font-size:0.95rem; outline:none;" />
      </div>

      <button type="submit" class="btn btn-primary" id="submitBtn">&#x1F511; Sign In to Access Career Lab</button>
    </form>

    <div class="divider" id="divText">New here?</div>

    <button type="button" class="btn btn-green" id="toggleBtn" onclick="toggleAuthMode()">&#x1F680; Create Free Account</button>

    <a class="btn btn-secondary" href="index.html" style="margin-top:12px;">&#x2190; Back to Home</a>
  </div>

<script>
let isRegisterMode = false;

function toggleAuthMode() {
  isRegisterMode = !isRegisterMode;
  document.getElementById('nameGroup').style.display = isRegisterMode ? 'block' : 'none';
  document.getElementById('submitBtn').innerHTML = isRegisterMode ? '&#x1F680; Create Free Account & Sign In' : '&#x1F511; Sign In to Access Career Lab';
  document.getElementById('toggleBtn').innerHTML = isRegisterMode ? 'Already have an account? Sign In' : '&#x1F680; Create Free Account';
  document.getElementById('divText').textContent = isRegisterMode ? 'Already registered?' : 'New here?';
  document.getElementById('gateSubtitle').textContent = isRegisterMode ? 'Create your free account to unlock AI-powered interview practice and career tools.' : 'Sign in with your Simpatico HR account to access AI mock interviews and career tools.';
}

function handleAuthSubmit(e) {
  e.preventDefault();
  const email = document.getElementById('candEmail').value.trim();
  const pass = document.getElementById('candPass').value.trim();
  const name = document.getElementById('candName').value.trim() || email.split('@')[0];

  if (!email || !pass) {
    alert('Please enter your email and password.');
    return;
  }

  // Check password against admin-configured Career Lab password
  let cfg = {};
  try { cfg = JSON.parse(localStorage.getItem('adminConfig') || '{}'); } catch(e) {}
  const correctPass = cfg.careerLabPassword || 'simpatico2026';

  if (pass !== correctPass) {
    alert('Incorrect password. Please contact Simpatico HR admin for access.');
    return;
  }

  const token = 'token_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8);
  const user = { id: 'usr_' + Date.now(), email: email, name: name };

  localStorage.setItem('simpatico_token', token);
  localStorage.setItem('simpatico_user', JSON.stringify(user));

  window.location.href = 'career-lab.html';
}
</script>
</body>
</html>
