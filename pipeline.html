<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pipeline | Simpatico HR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;background:#0a0f1e;color:#e2e8f0;min-height:100vh}
    .nav{backdrop-filter:blur(16px);background:rgba(10,15,30,.9);padding:1rem 6%;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.06);position:sticky;top:0;z-index:100}
    .logo{font-weight:800;font-size:1.05rem;color:#fff;text-decoration:none}.logo span{color:#6366f1}
    .nav-links{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .nav-link{color:#94a3b8;text-decoration:none;font-size:13px;font-weight:500;padding:6px 14px;border-radius:8px;transition:all .2s}
    .nav-link:hover{color:#fff;background:rgba(255,255,255,.05)}
    .nav-link.active{color:#fff;background:rgba(99,102,241,.15)}
    .container{max-width:1500px;margin:0 auto;padding:28px 20px 60px}
    .page-head{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:14px;margin-bottom:20px}
    .page-head h1{font-size:clamp(1.4rem,3vw,1.9rem);font-weight:800;background:linear-gradient(135deg,#fff,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .filter-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    select,input[type=text]{padding:9px 14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;color:#e2e8f0;font-size:.86rem;outline:none;font-family:inherit}
    select:focus,input[type=text]:focus{border-color:rgba(99,102,241,.4)}
    input[type=text]{min-width:220px}
    .btn{display:inline-flex;align-items:center;gap:6px;background:#6366f1;color:#fff;padding:9px 16px;border-radius:10px;font-weight:700;font-size:.82rem;border:none;cursor:pointer;font-family:inherit;transition:all .2s}
    .btn:hover:not(:disabled){background:#4f46e5}
    .btn:disabled{opacity:.55;cursor:not-allowed}
    .pipeline-board{display:flex;gap:12px;overflow-x:auto;padding-bottom:14px;min-height:520px}
    .pipeline-col{min-width:255px;flex:1;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:12px;transition:border-color .15s,background .15s}
    .pipeline-col.drag-over{border-color:rgba(99,102,241,.5);background:rgba(99,102,241,.05)}
    .pipeline-col-header{font-size:.82rem;font-weight:700;padding:6px 2px 10px;margin-bottom:8px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-between;align-items:center}
    .pipeline-col-count{font-size:.72rem;background:rgba(255,255,255,.08);padding:2px 8px;border-radius:8px;color:#94a3b8}
    .cand-card{background:rgba(15,23,42,.9);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:12px;margin-bottom:8px;cursor:grab;transition:all .2s}
    .cand-card:hover{border-color:rgba(99,102,241,.35);transform:translateY(-2px)}
    .cand-card.dragging{opacity:.45;cursor:grabbing}
    .cand-name{font-weight:700;font-size:.88rem;margin-bottom:2px}
    .cand-meta{font-size:.73rem;color:#64748b;margin-top:2px}
    .cand-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
    .mini-btn{padding:4px 10px;border-radius:8px;font-size:.72rem;font-weight:700;border:1px solid rgba(255,255,255,.12);background:transparent;color:#94a3b8;cursor:pointer;font-family:inherit;transition:all .15s}
    .mini-btn:hover{background:rgba(255,255,255,.07);color:#fff}
    .mini-btn.advance{border-color:rgba(16,185,129,.35);color:#34d399}
    .mini-btn.advance:hover{background:rgba(16,185,129,.12)}
    .mini-btn.reject{border-color:rgba(239,68,68,.3);color:#f87171}
    .mini-btn.reject:hover{background:rgba(239,68,68,.12)}
    .score-badge{font-weight:800;font-size:.74rem;padding:2px 9px;border-radius:8px;white-space:nowrap}
    .score-high{background:rgba(16,185,129,.14);color:#34d399}
    .score-mid{background:rgba(245,158,11,.14);color:#fbbf24}
    .score-low{background:rgba(239,68,68,.14);color:#f87171}
    .col-empty{text-align:center;padding:22px 8px;font-size:.76rem;color:#475569}
    .detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
    .detail-overlay.hidden{display:none}
    .detail-panel{background:#0f172a;border:1px solid rgba(255,255,255,.09);border-radius:18px;max-width:720px;width:100%;max-height:90vh;overflow-y:auto;padding:26px}
    .detail-panel h2{font-size:1.2rem;margin-bottom:2px}
    .detail-section{margin-top:18px}
    .detail-section h3{font-size:.78rem;text-transform:uppercase;letter-spacing:.8px;color:#64748b;margin-bottom:8px}
    .ai-summary{background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.15);border-radius:10px;padding:12px;font-size:.84rem;color:#a5b4fc;line-height:1.6}
    .stage-btns{display:flex;gap:6px;flex-wrap:wrap}
    .spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-wrap{text-align:center;width:100%;padding:70px;color:#64748b;font-size:.9rem}
  </style>
</head>
<body>
  <nav class="nav">
    <a class="logo" href="/index.html">SIMPATICO <span>HR</span></a>
    <div class="nav-links">
      <a class="nav-link" href="/dashboard/hr.html">Dashboard</a>
      <a class="nav-link active" href="/pipeline.html">Pipeline</a>
      <a class="nav-link" href="/talent.html">Talent Intelligence</a>
      <a class="nav-link" href="/ats-automation.html">Automation</a>
      <a class="nav-link" href="#" onclick="doLogout();return false;"><i class="fas fa-right-from-bracket"></i></a>
    </div>
  </nav>

  <div class="container main">
    <div class="page-head">
      <h1><i class="fas fa-diagram-project" style="-webkit-text-fill-color:#6366f1"></i> Candidate Pipeline</h1>
      <div class="filter-bar">
        <input type="text" id="searchInput" placeholder="Search candidates…" oninput="renderBoard()">
        <select id="jobFilter" onchange="loadPipeline()"><option value="">All Jobs</option></select>
        <button class="btn" onclick="loadPipeline()"><i class="fas fa-arrows-rotate"></i> Refresh</button>
      </div>
    </div>
    <div class="pipeline-board" id="board">
      <div class="loading-wrap"><span class="spinner"></span> Loading pipeline…</div>
    </div>
  </div>

  <div id="detailOverlay" class="detail-overlay hidden" onclick="if(event.target===this)closeDetail()">
    <div class="detail-panel" id="detailContent"></div>
  </div>

  <script src="js/hr-config.js"></script>
  <script src="js/shared-utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script>
    // ── Auth guard (absolute path — also safe if this page is ever embedded) ──
    if (!localStorage.getItem('simpatico_token') && !(typeof getAuthToken === 'function' && getAuthToken())) {
      location.replace('/auth/login.html');
    }

    const $ = (id) => document.getElementById(id);

    // Board stages. The AI auto-shortlist lands candidates in "interview";
    // legacy "interview_scheduled" is shown in the same column.
    const STAGES = [
      { key: 'applied',     label: 'Applied',     color: '#fbbf24' },
      { key: 'screened',    label: 'Screened',    color: '#60a5fa' },
      { key: 'shortlisted', label: 'Shortlisted', color: '#a5b4fc' },
      { key: 'interview',   label: 'Interview',   color: '#8b5cf6' },
      { key: 'offered',     label: 'Offered',     color: '#34d399' },
      { key: 'hired',       label: 'Hired',       color: '#059669' },
      { key: 'rejected',    label: 'Rejected',    color: '#f87171' }
    ];
    const STAGE_KEYS = new Set(STAGES.map(s => s.key));
    const STATUS_ALIAS = { interview_scheduled: 'interview', interviewed: 'interview' };

    let allApps = [];

    // Legacy rows store identity in name/email/ats_score; v5.0 rows use candidate_*/match_score
    const appName = (a) => a.candidate_name || a.name || '?';
    const appEmail = (a) => a.candidate_email || a.email || '';
    const appScore = (a) => a.match_score ?? a.ats_score ?? null;
    const appSummary = (a) => a.ai_summary || a.ats_summary || '';
    const appSkills = (a) => a.candidate_skills || (Array.isArray(a.ats_matched_skills) && a.ats_matched_skills.length ? a.ats_matched_skills.join(', ') : '');

    const normalizeStatus = (s) => STAGE_KEYS.has(s) ? s : (STATUS_ALIAS[s] || 'applied');
    const scoreClass = (s) => s >= 75 ? 'score-high' : s >= 50 ? 'score-mid' : 'score-low';

    async function loadPipeline() {
      const jobId = $('jobFilter').value;
      $('board').innerHTML = '<div class="loading-wrap"><span class="spinner"></span> Loading pipeline…</div>';
      try {
        const [appData, jobData] = await Promise.all([
          workerFetch('/recruitment/applications' + (jobId ? '?job_id=' + encodeURIComponent(jobId) : '')),
          workerFetch('/recruitment/jobs?status=open')
        ]);

        allApps = appData.data?.applications || [];

        const jf = $('jobFilter');
        const current = jf.value;
        jf.innerHTML = '<option value="">All Jobs</option>' + (jobData.data?.jobs || []).map(j =>
          `<option value="${escapeHtml(j.id)}" ${j.id === current ? 'selected' : ''}>${escapeHtml(j.title)}</option>`
        ).join('');

        renderBoard();
      } catch (e) {
        $('board').innerHTML = '<div class="loading-wrap">Failed to load pipeline. <button class="btn" onclick="loadPipeline()">Retry</button></div>';
        showToast(e.message, 'error');
      }
    }

    function renderBoard() {
      const search = ($('searchInput').value || '').toLowerCase();
      let filtered = allApps;
      if (search) {
        filtered = filtered.filter(a =>
          `${appName(a)} ${appEmail(a)} ${a.jobs?.title || ''}`.toLowerCase().includes(search)
        );
      }

      const grouped = {};
      STAGES.forEach(s => grouped[s.key] = []);
      filtered.forEach(a => grouped[normalizeStatus(a.status)].push(a));

      $('board').innerHTML = STAGES.map(s => `
        <div class="pipeline-col" data-stage="${s.key}" ondragover="colDragOver(event)" ondragleave="colDragLeave(event)" ondrop="colDrop(event,'${s.key}')">
          <div class="pipeline-col-header" style="color:${s.color}">
            ${s.label}
            <span class="pipeline-col-count">${grouped[s.key].length}</span>
          </div>
          ${grouped[s.key].length === 0
            ? '<div class="col-empty">No candidates</div>'
            : grouped[s.key].map(a => renderCard(a, s.key)).join('')}
        </div>
      `).join('');
    }

    function renderCard(a, stage) {
      const sc = appScore(a);
      const next = nextStage(stage);
      return `<div class="cand-card" draggable="true" ondragstart="cardDragStart(event,'${a.id}')" ondragend="cardDragEnd(event)" onclick="openDetail('${a.id}')">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
          <div class="cand-name">${escapeHtml(appName(a))}</div>
          ${sc != null ? `<span class="score-badge ${scoreClass(sc)}">${sc}</span>` : ''}
        </div>
        <div class="cand-meta">${escapeHtml(a.jobs?.title || 'N/A')}</div>
        <div class="cand-meta">${escapeHtml(appEmail(a))}</div>
        <div class="cand-actions">
          ${next && stage !== 'rejected' ? `<button class="mini-btn advance" onclick="event.stopPropagation();moveApp('${a.id}','${next}')"><i class="fas fa-arrow-right"></i> ${next}</button>` : ''}
          ${stage !== 'rejected' && stage !== 'hired' ? `<button class="mini-btn reject" onclick="event.stopPropagation();moveApp('${a.id}','rejected')"><i class="fas fa-xmark"></i></button>` : ''}
        </div>
      </div>`;
    }

    function nextStage(stage) {
      const order = STAGES.filter(s => s.key !== 'rejected').map(s => s.key);
      const i = order.indexOf(stage);
      return i >= 0 && i < order.length - 1 ? order[i + 1] : null;
    }

    // ── Drag & drop ──
    let dragId = null;
    function cardDragStart(e, id) { dragId = id; e.target.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; }
    function cardDragEnd(e) { e.target.classList.remove('dragging'); dragId = null; document.querySelectorAll('.pipeline-col').forEach(c => c.classList.remove('drag-over')); }
    function colDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
    function colDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
    function colDrop(e, stage) {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over');
      if (!dragId) return;
      const app = allApps.find(a => String(a.id) === String(dragId));
      if (app && normalizeStatus(app.status) !== stage) moveApp(dragId, stage);
    }

    // ── Stage moves (optimistic, revert on failure) ──
    async function moveApp(id, status) {
      const app = allApps.find(a => String(a.id) === String(id));
      if (!app) return;
      const prev = app.status;
      app.status = status;
      renderBoard();
      try {
        await workerFetch('/recruitment/applications/' + encodeURIComponent(id), {
          method: 'PATCH',
          body: { status }
        });
        showToast(`Moved to ${status.replace(/_/g, ' ')}`, 'success');
      } catch (e) {
        app.status = prev;
        renderBoard();
        showToast('Move failed: ' + e.message, 'error');
      }
    }

    // ── Detail modal ──
    function openDetail(id) {
      const a = allApps.find(x => String(x.id) === String(id));
      if (!a) return;
      const stage = normalizeStatus(a.status);
      const score = appScore(a);
      const summary = appSummary(a);
      const skills = appSkills(a);
      $('detailOverlay').classList.remove('hidden');
      $('detailContent').innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap">
          <div>
            <h2>${escapeHtml(appName(a))}</h2>
            <div style="color:#64748b;font-size:.84rem">${escapeHtml(appEmail(a))}</div>
            <div style="color:#a5b4fc;font-size:.88rem;font-weight:600;margin-top:4px">Applied for: ${escapeHtml(a.jobs?.title || 'N/A')}</div>
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            ${score != null ? `<span class="score-badge ${scoreClass(score)}" style="padding:6px 14px;font-size:.85rem">ATS ${score}</span>` : ''}
            <span class="score-badge" style="background:rgba(99,102,241,.14);color:#a5b4fc;padding:6px 14px;font-size:.8rem">${escapeHtml(stage.replace(/_/g, ' '))}</span>
            <button class="mini-btn reject" onclick="closeDetail()"><i class="fas fa-xmark"></i></button>
          </div>
        </div>

        ${summary ? `<div class="detail-section"><h3>AI Screening Summary</h3><div class="ai-summary">${escapeHtml(summary)}</div></div>` : ''}

        ${skills ? `<div class="detail-section"><h3>Skills</h3><div style="color:#94a3b8;font-size:.86rem">${escapeHtml(skills)}</div></div>` : ''}

        <div class="detail-section">
          <h3>Move to stage</h3>
          <div class="stage-btns">
            ${STAGES.filter(s => s.key !== stage).map(s =>
              `<button class="mini-btn ${s.key === 'rejected' ? 'reject' : ''}" onclick="moveAndClose('${a.id}','${s.key}')">${s.label}</button>`
            ).join('')}
          </div>
        </div>

        <div class="detail-section" style="color:#475569;font-size:.76rem;border-top:1px solid rgba(255,255,255,.06);padding-top:12px">
          Applied: ${a.applied_at ? new Date(a.applied_at).toLocaleString() : (a.created_at ? new Date(a.created_at).toLocaleString() : '—')}
          · Source: ${escapeHtml(a.source || 'website')}
          · <a href="/talent.html" style="color:#a5b4fc;text-decoration:none">Find similar in Talent Intelligence <i class="fas fa-arrow-up-right-from-square"></i></a>
        </div>
      `;
    }

    function closeDetail() { $('detailOverlay').classList.add('hidden'); }

    async function moveAndClose(id, status) {
      await moveApp(id, status);
      closeDetail();
    }

    loadPipeline();
  </script>
</body>
</html>
