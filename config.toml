# Default model alias for your session
default_model = "kimi-k3"

[providers.moonshot]
type = "openai-compatible"
base_url = "https://api.moonshot.ai/v1"
api_key = "env:MOONSHOT_API_KEY" # Reads from environment variable, or paste key directly

[models.kimi-k3]
provider = "moonshot"
model = "kimi-k3"
max_context_size = 1048576       # Full 1M token context window
capabilities = ["thinking", "image_in", "tool_calling"]

# Kimi K3 Runtime & Reasoning Preferences
[models.kimi-k3.parameters]
reasoning_effort = "max"         # Standard default for K3 reasoning traces
max_completion_tokens = 131072   # Default output limit (can scale up to 1048576)