<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - SimpaticoHR</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .card{background:#1e293b;border:1px solid #334155;border-radius:20px;padding:40px;width:100%;max-width:420px;margin:20px;}
  .logo{
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 20px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:#fff;
  font-weight:800;
  font-size:20px;
  padding:10px 22px;
  border-radius:999px;
  width:auto;
  height:auto;
}
    h1{text-align:center;color:#f1f5f9;font-size:1.4rem;font-weight:700;margin-bottom:8px;}
    p.sub{text-align:center;color:#94a3b8;font-size:0.88rem;margin-bottom:28px;}
    label{display:block;font-size:0.78rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;}
    .field{margin-bottom:16px;position:relative;}
    input{width:100%;padding:12px 14px;background:#0f172a;border:1px solid #334155;border-radius:10px;color:#f1f5f9;font-size:0.9rem;font-family:'Inter',sans-serif;outline:none;transition:border 0.2s;}
    input:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,0.15);}
    .btn{width:100%;padding:13px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:12px;color:#fff;font-size:0.95rem;font-weight:700;cursor:pointer;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity 0.2s;}
    .btn:hover{opacity:0.9;}
    .btn:disabled{opacity:0.5;cursor:not-allowed;}
    .alert{padding:12px 16px;border-radius:10px;font-size:0.88rem;margin-bottom:16px;display:none;}
    .alert.success{background:#064e3b;color:#6ee7b7;border:1px solid #065f46;}
    .alert.error{background:#450a0a;color:#fca5a5;border:1px solid #7f1d1d;}
    .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
  <div class="logo-icon"></div>
  <span>Simpatico<span style="color:#6366f1">HR</span></span>
</div>
  <h1>Set New Password</h1>
  <p class="sub">Enter your new password below.</p>

  <div class="alert success" id="alertSuccess">
    <i class="fas fa-check-circle"></i> Password updated! Redirecting to login...
  </div>
  <div class="alert error" id="alertError"></div>

  <div class="field">
    <label>New Password</label>
    <input type="password" id="password" placeholder="Min 8 characters">
  </div>
  <div class="field">
    <label>Confirm Password</label>
    <input type="password" id="confirmPassword" placeholder="Repeat password">
  </div>

  <button class="btn" id="submitBtn" onclick="resetPassword()">
    <i class="fas fa-lock"></i> Update Password
  </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/hr-config.js"></script>
<script src="../js/shared-utils.js"></script>
<script src="../js/supabase-client.js"></script>

<script>

async function restoreSession() {
  // ★ CRITICAL FIX: Sign out any existing session first to prevent cross-user contamination.
  // Without this, if user A is logged in and user B clicks a reset link in the same browser,
  // SimpaticoDB.auth.updateUser() would change user A's password instead of user B's.
  try { await SimpaticoDB.auth.signOut(); } catch(e) { /* may not have a session */ }

  // Clear any cached session tokens
  ['simpatico_token','simpatico_user','simpatico_refresh','simpatico_company'].forEach(k => {
    localStorage.removeItem(k);
    sessionStorage.removeItem(k);
  });

  const query = new URLSearchParams(window.location.search);
  const tokenHash = query.get("token_hash");
  const type = query.get("type");

  if (tokenHash && type === "recovery") {
    const { error } = await SimpaticoDB.auth.verifyOtp({
      token_hash: tokenHash,
      type: "recovery"
    });
    if (error) {
      showError("Invalid or expired reset link.");
    }
    return;
  }

  // fallback for hash-based tokens
  const hash = window.location.hash;
  if (hash) {
    const params = new URLSearchParams(hash.substring(1));
    const accessToken = params.get("access_token");
    const refreshToken = params.get("refresh_token");
    if (accessToken) {
      await SimpaticoDB.auth.setSession({
        access_token: accessToken,
        refresh_token: refreshToken
      });
      return;
    }
  }

  showError("Invalid or expired reset link.");
}

function showError(msg){
  const alertError = document.getElementById("alertError");
  const btn = document.getElementById("submitBtn");
  alertError.textContent = msg;
  alertError.style.display = "block";
  btn.disabled = true;
}

restoreSession();


async function resetPassword() {
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirmPassword').value;
  const btn = document.getElementById('submitBtn');
  const alertSuccess = document.getElementById('alertSuccess');
  const alertError = document.getElementById('alertError');

  alertSuccess.style.display = 'none';
  alertError.style.display = 'none';

  if (password.length < 8) {
    alertError.textContent = 'Password must be at least 8 characters.';
    alertError.style.display = 'block';
    return;
  }

  if (password !== confirm) {
    alertError.textContent = 'Passwords do not match.';
    alertError.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Updating...';

  try {
    const { error } = await SimpaticoDB.auth.updateUser({
      password: password
    });
    if (error) throw error;

    alertSuccess.style.display = 'block';

    setTimeout(() => {
      window.location.href = "/platform/login.html";
    }, 2000);

  } catch (err) {
    alertError.textContent = err.message || 'Failed to update password.';
    alertError.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-lock"></i> Update Password';
  }
}

</script>
</body>
</html>
