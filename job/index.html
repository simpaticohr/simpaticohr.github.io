<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">Job Details | Simpatico HR</title>
  <meta name="description" id="metaDesc" content="View job details and apply. AI-powered recruitment by Simpatico HR.">
  <meta name="robots" content="index, follow">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" id="ogTitle" content="Job Opening | Simpatico HR">
  <meta property="og:description" id="ogDesc" content="View this job opportunity and apply instantly.">
  <meta property="og:url" id="ogUrl" content="">
  <meta property="og:site_name" content="Simpatico HR">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" id="twTitle" content="Job Opening | Simpatico HR">
  <meta name="twitter:description" id="twDesc" content="">

  <link rel="canonical" id="canonical" href="">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <script src="../js/hr-config.js"></script>
  <style>
    :root {
      --bg: #050a18; --bg-card: #0c1225; --bg-surface: #111a33;
      --primary: #6366f1; --primary-light: #818cf8; --primary-glow: rgba(99,102,241,.15);
      --accent: #06b6d4; --success: #10b981; --warning: #f59e0b;
      --text: #e2e8f0; --text-muted: #64748b; --text-dim: #475569;
      --border: rgba(255,255,255,.06); --border-hover: rgba(99,102,241,.3);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

    /* NAV */
    .nav{backdrop-filter:blur(20px);background:rgba(5,10,24,.92);padding:14px 6%;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
    .logo{font-weight:800;font-size:1.05rem;color:#fff;text-decoration:none;display:flex;align-items:center;gap:8px}
    .logo span{color:var(--primary)}
    .nav-links{display:flex;gap:8px}
    .nav-link{color:var(--text-muted);text-decoration:none;font-size:13px;font-weight:500;padding:7px 16px;border-radius:10px;transition:all .2s}
    .nav-link:hover{color:#fff;background:rgba(255,255,255,.05)}

    /* HERO */
    .hero{background:linear-gradient(135deg,rgba(99,102,241,.12) 0%,rgba(6,182,212,.08) 50%,rgba(99,102,241,.06) 100%);border-bottom:1px solid var(--border);padding:48px 6% 40px;position:relative;overflow:hidden}
    .hero::before{content:'';position:absolute;top:-50%;right:-20%;width:600px;height:600px;background:radial-gradient(circle,rgba(99,102,241,.08) 0%,transparent 70%);pointer-events:none}
    .hero-inner{max-width:900px;margin:0 auto;position:relative}
    .breadcrumb{font-size:.82rem;color:var(--text-dim);margin-bottom:20px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
    .breadcrumb a{color:var(--primary-light);text-decoration:none;transition:color .2s}
    .breadcrumb a:hover{color:#fff}
    .company-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:12px;padding:6px 16px 6px 8px;margin-bottom:16px;font-size:.85rem;color:var(--text-muted);transition:all .2s;text-decoration:none;cursor:pointer}
    .company-badge:hover{border-color:var(--border-hover);color:#fff;background:var(--primary-glow)}
    .company-badge .co-logo{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;color:#fff}
    .hero h1{font-size:clamp(1.6rem,4vw,2.4rem);font-weight:800;background:linear-gradient(135deg,#fff 30%,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.25;margin-bottom:20px}
    .meta-grid{display:flex;flex-wrap:wrap;gap:10px}
    .meta-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;padding:8px 16px;font-size:.82rem;color:var(--text-muted);transition:all .2s}
    .meta-chip i{color:var(--primary-light);font-size:.8rem}
    .meta-chip.salary{border-color:rgba(16,185,129,.2);color:var(--success)}
    .meta-chip.salary i{color:var(--success)}

    /* ACTION BAR */
    .action-bar{max-width:900px;margin:-24px auto 0;padding:0 6%;position:relative;z-index:10;display:flex;gap:10px;flex-wrap:wrap}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:14px;font-weight:700;font-size:.92rem;text-decoration:none;border:none;cursor:pointer;transition:all .25s;font-family:inherit}
    .btn-apply{background:var(--primary);color:#fff;box-shadow:0 4px 20px rgba(99,102,241,.3)}
    .btn-apply:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(99,102,241,.4)}
    .btn-outline{background:rgba(255,255,255,.04);color:var(--text-muted);border:1px solid var(--border)}
    .btn-outline:hover{border-color:var(--border-hover);color:#fff;background:var(--primary-glow)}
    .btn-linkedin{background:#0077b5;color:#fff}
    .btn-linkedin:hover{background:#005e93}

    /* CONTENT */
    .content{max-width:900px;margin:0 auto;padding:40px 6% 60px;display:grid;grid-template-columns:1fr 300px;gap:32px}
    .main-col{}
    .side-col{position:sticky;top:80px;align-self:start}

    /* CARDS */
    .card{background:var(--bg-card);border:1px solid var(--border);border-radius:20px;overflow:hidden;margin-bottom:24px}
    .card-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
    .card-header h3{font-size:1rem;font-weight:700;color:#fff}
    .card-header i{color:var(--primary-light)}
    .card-body{padding:24px}
    .card-body.desc{font-size:.92rem;line-height:1.8;color:#94a3b8}
    .card-body.desc h1,.card-body.desc h2,.card-body.desc h3,.card-body.desc h4{color:#fff;margin:20px 0 10px;font-weight:700}
    .card-body.desc h2{font-size:1.1rem}
    .card-body.desc h3{font-size:1rem}
    .card-body.desc ul,.card-body.desc ol{padding-left:20px;margin:8px 0}
    .card-body.desc li{margin-bottom:6px}
    .card-body.desc strong{color:#cbd5e1}
    .card-body.desc p{margin-bottom:12px}
    .card-body.desc a{color:var(--primary-light)}

    /* SKILLS */
    .skills-wrap{display:flex;flex-wrap:wrap;gap:8px}
    .skill{background:var(--primary-glow);color:var(--primary-light);padding:6px 14px;border-radius:10px;font-size:.8rem;font-weight:600;border:1px solid rgba(99,102,241,.15)}

    /* SIDEBAR CARDS */
    .sidebar-card{background:var(--bg-card);border:1px solid var(--border);border-radius:18px;padding:24px;margin-bottom:20px}
    .sidebar-card h4{font-size:.88rem;font-weight:700;color:#fff;margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .sidebar-card h4 i{color:var(--primary-light);font-size:.85rem}
    .detail-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:.85rem}
    .detail-row:last-child{border-bottom:none}
    .detail-row .label{color:var(--text-dim)}
    .detail-row .value{color:var(--text);font-weight:600}

    /* RELATED JOBS */
    .related-job{display:block;padding:14px 16px;border:1px solid var(--border);border-radius:12px;margin-bottom:10px;text-decoration:none;transition:all .2s;background:transparent}
    .related-job:hover{border-color:var(--border-hover);background:var(--primary-glow);transform:translateX(4px)}
    .related-job .rj-title{color:#fff;font-weight:600;font-size:.88rem;margin-bottom:4px}
    .related-job .rj-meta{color:var(--text-dim);font-size:.78rem}

    /* APPLY CTA SIDEBAR */
    .apply-cta{background:linear-gradient(135deg,rgba(99,102,241,.1),rgba(6,182,212,.08));border:1px solid rgba(99,102,241,.2);border-radius:18px;padding:24px;text-align:center}
    .apply-cta h4{color:#fff;font-size:1rem;margin-bottom:8px}
    .apply-cta p{color:var(--text-dim);font-size:.82rem;margin-bottom:16px;line-height:1.5}
    .apply-cta .btn{width:100%;justify-content:center}

    /* POSTED DATE */
    .posted-badge{display:inline-flex;align-items:center;gap:6px;font-size:.78rem;color:var(--text-dim);background:rgba(255,255,255,.03);padding:4px 12px;border-radius:8px;margin-top:12px}
    .posted-badge i{color:var(--accent);font-size:.7rem}

    /* LOADING */
    .loading{text-align:center;padding:100px 20px}
    .spinner{width:44px;height:44px;border:3px solid rgba(99,102,241,.2);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-text{color:var(--text-dim);font-size:.9rem}

    /* ERROR */
    .error-state{text-align:center;padding:80px 20px}
    .error-icon{font-size:3.5rem;margin-bottom:20px;opacity:.5}
    .error-state h2{color:#fff;font-size:1.4rem;margin-bottom:8px}
    .error-state p{color:var(--text-dim);margin-bottom:24px}

    /* SHARE TOAST */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--bg-surface);border:1px solid var(--border);padding:12px 24px;border-radius:12px;color:var(--text);font-size:.88rem;font-weight:600;z-index:500;opacity:0;transition:all .3s;pointer-events:none}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* FOOTER */
    .footer{text-align:center;padding:32px 0;border-top:1px solid var(--border);font-size:.78rem;color:var(--text-dim)}
    .footer a{color:var(--primary-light);text-decoration:none}

    /* RESPONSIVE */
    @media(max-width:768px){
      .content{grid-template-columns:1fr;gap:20px}
      .side-col{position:static}
      .hero{padding:32px 5% 28px}
      .action-bar{padding:0 5%;margin-top:-16px}
      .content{padding:24px 5% 40px}
      .nav{padding:12px 4%}
    }
    @media(max-width:480px){
      .meta-grid{gap:6px}
      .meta-chip{padding:6px 12px;font-size:.78rem}
      .action-bar{flex-direction:column}
      .btn{width:100%;justify-content:center}
    }
  </style>
</head>
<body>

<nav class="nav">
  <a class="logo" href="/"><img src="/favicon-96x96.png" style="width:26px;height:26px;border-radius:6px;margin-right:4px">SIMPATICO <span>HR</span></a>
  <div class="nav-links">
    <a class="nav-link" href="/jobs.html">💼 All Jobs</a>
    <a class="nav-link" href="/careers.html">🏢 Careers</a>
    <a class="nav-link" href="/">Home</a>
  </div>
</nav>

<div id="pageContent">
  <div class="loading">
    <div class="spinner"></div>
    <div class="loading-text">Loading job details...</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ---------------------------------------------------------------
// CONFIG
// ---------------------------------------------------------------
const SB_URL = window.SIMPATICO_CONFIG?.supabaseUrl || 'https://cvkxtsvgnynxexmemfuy.supabase.co';
const SB_KEY = window.SIMPATICO_CONFIG?.supabaseAnonKey;
const SB_HDR = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY };

// ---------------------------------------------------------------
// GET JOB ID
// ---------------------------------------------------------------
function getJobId() {
  const params = new URLSearchParams(window.location.search);
  return params.get('id') || sessionStorage.getItem('_routeJobId') || null;
}

function slugify(text) {
  return (text || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

function getCleanJobUrl(job) {
  return `/job/${slugify(job.title)}-${job.id}`;
}

function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const days = Math.floor(diff / 86400000);
  if (days === 0) return 'Today';
  if (days === 1) return 'Yesterday';
  if (days < 7) return days + ' days ago';
  if (days < 30) return Math.floor(days / 7) + ' weeks ago';
  return Math.floor(days / 30) + ' months ago';
}

// ---------------------------------------------------------------
// MARKDOWN-LITE RENDERER
// ---------------------------------------------------------------
function renderMarkdown(text) {
  if (!text) return '<p>No description provided.</p>';
  // Strip auto-shortlist marker
  text = text.replace(/<!--\s*SIMPATICO_AUTO_SHORTLIST:\w+\s*-->/gi, '').trim();
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^\* (.+)$/gm, '<li>$1</li>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>)/g, function(m) { return '<ul>' + m + '</ul>'; })
    .replace(/<\/ul>\s*<ul>/g, '')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>')
    .replace(/^(?!<[hul])/gm, function(m) { return m ? '<p>' + m : m; });
}

// ---------------------------------------------------------------
// LOAD JOB
// ---------------------------------------------------------------
async function loadJob() {
  const jobId = getJobId();
  if (!jobId) {
    showError('No job specified', 'Please select a job from the job board.');
    return;
  }

  try {
    const res = await fetch(
      `${SB_URL}/rest/v1/jobs?id=eq.${jobId}&select=*`,
      { headers: SB_HDR }
    );
    if (!res.ok) throw new Error('Failed to fetch job');
    const jobs = await res.json();
    if (!jobs.length) {
      showError('Job not found', 'This position may have been closed or removed.');
      return;
    }
    const job = jobs[0];
    renderJob(job);
    loadRelatedJobs(job);
    injectSEO(job);
    injectJsonLD(job);
  } catch (err) {
    console.error(err);
    showError('Error loading job', err.message);
  }
}

// ---------------------------------------------------------------
// RENDER JOB
// ---------------------------------------------------------------
function renderJob(job) {
  const company = job.company_name || job.department || 'Simpatico HR';
  const location = job.location || 'Remote';
  const type = job.employment_type || job.job_type || 'Full-time';
  const level = job.level || '';
  const dept = job.department || '';
  const desc = job.description || 'Details shared during interview.';
  const salary = formatSalary(job.salary_min, job.salary_max);
  const posted = job.created_at ? timeAgo(job.created_at) : '';
  const applyUrl = `/job-apply.html?role=${encodeURIComponent(job.title)}&job_id=${job.id}`;
  const shareUrl = window.location.origin + getCleanJobUrl(job);

  let skills = [];
  const rawSkills = job.skills || job.skills_required;
  if (Array.isArray(rawSkills)) skills = rawSkills.filter(Boolean);
  else if (typeof rawSkills === 'string' && rawSkills) {
    skills = rawSkills.replace(/[\[\]"]/g, '').split(',').map(s => s.trim()).filter(Boolean);
  }

  const companyLink = job.company_id ? `/company/${slugify(company)}-${job.company_id}` : '#';

  document.getElementById('pageContent').innerHTML = `
    <section class="hero">
      <div class="hero-inner">
        <div class="breadcrumb">
          <a href="/">Home</a> <i class="fa fa-chevron-right" style="font-size:.6rem"></i>
          <a href="/jobs.html">Jobs</a> <i class="fa fa-chevron-right" style="font-size:.6rem"></i>
          <span>${job.title || 'Job Details'}</span>
        </div>
        <a class="company-badge" href="${companyLink}">
          <span class="co-logo">${company.charAt(0).toUpperCase()}</span>
          ${company}
          <i class="fa fa-arrow-right" style="font-size:.65rem;opacity:.5"></i>
        </a>
        <h1>${job.title || 'Untitled Position'}</h1>
        <div class="meta-grid">
          <span class="meta-chip"><i class="fa fa-location-dot"></i>${location}</span>
          <span class="meta-chip"><i class="fa fa-briefcase"></i>${type}</span>
          ${dept ? `<span class="meta-chip"><i class="fa fa-building"></i>${dept}</span>` : ''}
          ${level ? `<span class="meta-chip"><i class="fa fa-layer-group"></i>${level}</span>` : ''}
          ${salary ? `<span class="meta-chip salary"><i class="fa fa-indian-rupee-sign"></i>${salary}</span>` : ''}
        </div>
        ${posted ? `<div class="posted-badge"><i class="fa fa-clock"></i>Posted ${posted}</div>` : ''}
      </div>
    </section>

    <div class="action-bar">
      <a class="btn btn-apply" href="${applyUrl}"><i class="fa fa-paper-plane"></i> Apply Now</a>
      <a class="btn btn-linkedin" href="https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(shareUrl)}" target="_blank"><i class="fab fa-linkedin-in"></i> Share</a>
      <button class="btn btn-outline" onclick="copyLink('${shareUrl}')"><i class="fa fa-link"></i> Copy Link</button>
    </div>

    <div class="content">
      <div class="main-col">
        <div class="card">
          <div class="card-header"><i class="fa fa-file-lines"></i><h3>Job Description</h3></div>
          <div class="card-body desc" id="descBody">${renderMarkdown(desc)}</div>
        </div>
        ${skills.length ? `
        <div class="card">
          <div class="card-header"><i class="fa fa-code"></i><h3>Skills Required</h3></div>
          <div class="card-body">
            <div class="skills-wrap">${skills.map(s => `<span class="skill">${s}</span>`).join('')}</div>
          </div>
        </div>` : ''}
      </div>

      <div class="side-col">
        <div class="apply-cta">
          <h4>Interested in this role?</h4>
          <p>Apply now and get AI-screened instantly. Fast-track your application.</p>
          <a class="btn btn-apply" href="${applyUrl}"><i class="fa fa-paper-plane"></i> Apply Now</a>
        </div>

        <div class="sidebar-card">
          <h4><i class="fa fa-info-circle"></i> Job Details</h4>
          <div class="detail-row"><span class="label">Company</span><span class="value">${company}</span></div>
          <div class="detail-row"><span class="label">Location</span><span class="value">${location}</span></div>
          <div class="detail-row"><span class="label">Type</span><span class="value">${type}</span></div>
          ${dept ? `<div class="detail-row"><span class="label">Department</span><span class="value">${dept}</span></div>` : ''}
          ${level ? `<div class="detail-row"><span class="label">Level</span><span class="value">${level}</span></div>` : ''}
          ${salary ? `<div class="detail-row"><span class="label">Salary</span><span class="value">₹${salary}</span></div>` : ''}
          ${posted ? `<div class="detail-row"><span class="label">Posted</span><span class="value">${posted}</span></div>` : ''}
        </div>

        <div class="sidebar-card" id="relatedJobs" style="display:none">
          <h4><i class="fa fa-briefcase"></i> More from ${company}</h4>
          <div id="relatedList"></div>
        </div>
      </div>
    </div>

    <footer class="footer">
      © 2025 <a href="/">Simpatico HR Consultancy</a> • AI-Powered Recruitment Platform
    </footer>
  `;
}

function formatSalary(min, max) {
  if (!max && !min) return '';
  const fmt = v => (v / 100000).toFixed(v % 100000 === 0 ? 0 : 1);
  if (min && max) return `${fmt(min)}–${fmt(max)} LPA`;
  if (max) return `Up to ${fmt(max)} LPA`;
  return `From ${fmt(min)} LPA`;
}

// ---------------------------------------------------------------
// RELATED JOBS
// ---------------------------------------------------------------
async function loadRelatedJobs(currentJob) {
  if (!currentJob.company_id) return;
  try {
    const res = await fetch(
      `${SB_URL}/rest/v1/jobs?company_id=eq.${currentJob.company_id}&is_active=eq.true&status=in.(open,active)&id=neq.${currentJob.id}&select=id,title,location,department&order=created_at.desc&limit=5`,
      { headers: SB_HDR }
    );
    const jobs = await res.json();
    if (!jobs.length) return;

    document.getElementById('relatedJobs').style.display = 'block';
    document.getElementById('relatedList').innerHTML = jobs.map(j => `
      <a class="related-job" href="${getCleanJobUrl(j)}">
        <div class="rj-title">${j.title}</div>
        <div class="rj-meta">${j.location || 'Remote'} • ${j.department || 'General'}</div>
      </a>
    `).join('');
  } catch (e) { console.warn('Related jobs:', e); }
}

// ---------------------------------------------------------------
// SEO
// ---------------------------------------------------------------
const LOCATION_COUNTRY_MAP = {
  'india':'IN','kochi':'IN','mumbai':'IN','bangalore':'IN','bengaluru':'IN','hyderabad':'IN',
  'chennai':'IN','delhi':'IN','pune':'IN','kolkata':'IN','ahmedabad':'IN','jaipur':'IN',
  'noida':'IN','gurgaon':'IN','gurugram':'IN','perinthalmanna':'IN','kerala':'IN',
  'usa':'US','new york':'US','san francisco':'US','california':'US','texas':'US','chicago':'US',
  'uk':'GB','london':'GB','manchester':'GB','birmingham':'GB',
  'uae':'AE','dubai':'AE','abu dhabi':'AE','sharjah':'AE',
  'singapore':'SG','canada':'CA','toronto':'CA','australia':'AU','sydney':'AU','melbourne':'AU',
  'germany':'DE','berlin':'DE','france':'FR','paris':'FR','japan':'JP','tokyo':'JP',
  'saudi arabia':'SA','riyadh':'SA','qatar':'QA','doha':'QA','oman':'OM','bahrain':'BH','kuwait':'KW',
};

function detectCountry(location) {
  if (!location) return 'IN';
  const loc = location.toLowerCase().trim();
  for (const [key, code] of Object.entries(LOCATION_COUNTRY_MAP)) {
    if (loc.includes(key)) return code;
  }
  return 'IN'; // Default
}

function isRemoteJob(location) {
  return (location || '').toLowerCase().includes('remote');
}

function injectSEO(job) {
  const company = job.company_name || job.department || 'Simpatico HR';
  const location = job.location || 'Remote';
  const title = `${job.title} at ${company} — ${location} | Simpatico HR`;
  const desc = (job.description || '').substring(0, 160).replace(/[*#_\n]/g, '').replace(/<!--[\s\S]*?-->/g, '') + '...';
  const url = window.location.origin + getCleanJobUrl(job);
  const country = detectCountry(location);

  document.title = title;
  document.getElementById('pageTitle').textContent = title;
  document.getElementById('metaDesc')?.setAttribute('content', desc);
  document.getElementById('ogTitle')?.setAttribute('content', title);
  document.getElementById('ogDesc')?.setAttribute('content', desc);
  document.getElementById('ogUrl')?.setAttribute('content', url);
  document.getElementById('twTitle')?.setAttribute('content', title);
  document.getElementById('twDesc')?.setAttribute('content', desc);
  document.getElementById('canonical')?.setAttribute('href', url);

  // Geo meta tags for global SEO
  const geoMeta = [
    { name: 'geo.region', content: country },
    { name: 'geo.placename', content: location },
    { name: 'ICBM', content: '' }, // Would need lat/lng
    { name: 'og:locale', content: country === 'IN' ? 'en_IN' : country === 'US' ? 'en_US' : country === 'GB' ? 'en_GB' : country === 'AE' ? 'en_AE' : 'en' }
  ];
  geoMeta.forEach(m => {
    if (!m.content) return;
    const el = document.createElement('meta');
    el.setAttribute(m.name.startsWith('og:') ? 'property' : 'name', m.name);
    el.setAttribute('content', m.content);
    document.head.appendChild(el);
  });
}

function injectJsonLD(job) {
  const company = job.company_name || job.department || 'Simpatico HR';
  const location = job.location || 'Remote';
  const country = detectCountry(location);
  const remote = isRemoteJob(location);

  // validThrough: 60 days from posting, or 90 days from now
  const posted = job.created_at ? new Date(job.created_at) : new Date();
  const validThrough = new Date(posted.getTime() + 60 * 86400000).toISOString();

  const schema = {
    "@context": "https://schema.org/",
    "@type": "JobPosting",
    "title": job.title,
    "description": (job.description || '').replace(/<!--[\s\S]*?-->/g, ''),
    "datePosted": job.created_at,
    "validThrough": validThrough,
    "employmentType": (job.employment_type || 'FULL_TIME').toUpperCase().replace(/[- ]/g, '_'),
    "hiringOrganization": {
      "@type": "Organization",
      "name": company,
      "sameAs": window.location.origin,
      "logo": window.location.origin + '/favicon-96x96.png'
    },
    "jobLocation": {
      "@type": "Place",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": remote ? '' : location,
        "addressRegion": remote ? '' : location,
        "addressCountry": country
      }
    },
    "directApply": true,
    "url": window.location.origin + getCleanJobUrl(job)
  };

  // Remote job requirements (Google for Jobs requires this)
  if (remote) {
    schema.jobLocationType = "TELECOMMUTE";
    schema.applicantLocationRequirements = {
      "@type": "Country",
      "name": country
    };
  }

  // Industry from department
  if (job.department) {
    schema.industry = job.department;
  }

  // Experience level mapping
  if (job.level) {
    const expMap = {
      'Fresher': 'ENTRY_LEVEL', 'Junior': 'ENTRY_LEVEL',
      'Mid-Level': 'MID_LEVEL', 'Senior': 'SENIOR', 'Lead': 'DIRECTOR'
    };
    schema.experienceRequirements = expMap[job.level] || 'MID_LEVEL';
  }

  // Salary (Google requires currency)
  if (job.salary_min || job.salary_max) {
    schema.baseSalary = {
      "@type": "MonetaryAmount",
      "currency": country === 'US' ? 'USD' : country === 'GB' ? 'GBP' : country === 'AE' ? 'AED' : country === 'SG' ? 'SGD' : country === 'AU' ? 'AUD' : country === 'CA' ? 'CAD' : 'INR',
      "value": {
        "@type": "QuantitativeValue",
        "minValue": job.salary_min || 0,
        "maxValue": job.salary_max || job.salary_min,
        "unitText": "YEAR"
      }
    };
  }

  // Skills as qualifications
  const skills = job.skills || job.skills_required || [];
  if (skills.length) {
    schema.skills = Array.isArray(skills) ? skills.join(', ') : skills;
  }

  const el = document.createElement('script');
  el.type = 'application/ld+json';
  el.textContent = JSON.stringify(schema);
  document.head.appendChild(el);
}

function showError(title, msg) {
  document.getElementById('pageContent').innerHTML = `
    <div class="error-state">
      <div class="error-icon">📋</div>
      <h2>${title}</h2>
      <p>${msg}</p>
      <a class="btn btn-apply" href="/jobs.html"><i class="fa fa-search"></i> Browse All Jobs</a>
    </div>`;
}

function copyLink(url) {
  navigator.clipboard.writeText(url).then(() => {
    const t = document.getElementById('toast');
    t.textContent = '🔗 Link copied to clipboard!';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
