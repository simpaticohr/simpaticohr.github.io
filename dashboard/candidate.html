<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Portal • Simpatico HR</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #020617;
            --surface: rgba(15, 23, 42, 0.7);
            --surface-hover: rgba(30, 41, 59, 0.8);
            --border: rgba(255, 255, 255, 0.08);
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.2);
            --accent: #8b5cf6;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --warning: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            color: var(--text);
            display: flex; 
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(139, 92, 246, 0.05) 0%, transparent 40%);
        }
        
        .sidebar { 
            width: 280px; 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            display: flex; 
            flex-direction: column; 
            position: fixed; 
            height: 100vh; 
            z-index: 100; 
        }
        
        .brand { 
            padding: 32px 24px; 
            display: flex; 
            align-items: center; 
            gap: 12px;
            border-bottom: 1px solid var(--border);
        }
        
        .logo-icon { 
            width: 40px; height: 40px; 
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; 
            color: white; font-weight: 800; font-size: 1.2rem;
            box-shadow: 0 4px 12px var(--primary-glow);
        }

        .brand-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; }
        .brand-text span { color: var(--primary); }
        .brand-subtitle { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; margin-top: 2px; }

        .nav-section { padding: 24px 12px; flex: 1; }
        .nav-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; padding: 12px 16px; font-weight: 700; }
        
        .nav-item { 
            padding: 12px 16px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            color: var(--text-muted); 
            text-decoration: none; 
            font-size: 0.9rem; 
            font-weight: 500;
            cursor: pointer; 
            transition: all 0.3s; 
            border-radius: 12px;
            margin-bottom: 4px;
        }
        
        .nav-item:hover, .nav-item.active { 
            background: rgba(255, 255, 255, 0.05); 
            color: var(--text); 
        }
        
        .nav-item.active {
            background: var(--primary-glow);
            color: var(--primary);
            border: 1px solid rgba(99, 102, 241, 0.2);
        }
        
        .nav-item i { width: 20px; font-size: 1rem; }
        
        .main { margin-left: 280px; flex: 1; display: flex; flex-direction: column; }
        
        .topbar { 
            background: rgba(2, 6, 23, 0.8); 
            backdrop-filter: blur(20px);
            padding: 20px 40px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border); 
            position: sticky; 
            top: 0; 
            z-index: 50; 
        }
        
        .topbar h1 { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; }
        
        .user-profile { display: flex; align-items: center; gap: 12px; }
        .avatar { 
            width: 40px; height: 40px; 
            border-radius: 12px; 
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 800;
            box-shadow: 0 4px 12px var(--primary-glow);
        }
        
        .content { padding: 40px; max-width: 1200px; margin: 0 auto; width: 100%; }
        
        .tab-content { display: none; animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .tab-content.active { display: block; }
        
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 40px; }
        .stat-card { 
            background: var(--surface); 
            border: 1px solid var(--border);
            padding: 24px; 
            border-radius: 20px; 
            display: flex; 
            align-items: center; 
            gap: 20px; 
            transition: all 0.3s;
        }
        .stat-card:hover { transform: translateY(-5px); border-color: rgba(99, 102, 241, 0.3); background: var(--surface-hover); }
        
        .stat-icon { 
            width: 56px; height: 56px; 
            border-radius: 16px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 1.4rem;
        }
        
        .stat-card h3 { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; }
        .stat-card p { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        
        .panel { 
            background: var(--surface); 
            border-radius: 24px; 
            border: 1px solid var(--border); 
            margin-bottom: 32px; 
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        
        .panel-header { 
            padding: 24px 30px; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
        }
        
        .panel-header h5 { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .panel-body { padding: 30px; }
        
        .job-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 16px;
            transition: all 0.3s;
        }
        .job-card:hover { border-color: var(--primary); background: rgba(99, 102, 241, 0.05); }
        
        .badge { padding: 6px 14px; border-radius: 100px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge-success { background: rgba(16, 185, 129, 0.15); color: var(--success); }
        .badge-primary { background: var(--primary-glow); color: var(--primary); }
        .badge-warning { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
        
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-state i { font-size: 3rem; margin-bottom: 16px; opacity: 0.2; color: var(--primary); }
        
        .btn {
            padding: 12px 24px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary { 
            background: linear-gradient(135deg, var(--primary), var(--accent)); 
            color: white;
            box-shadow: 0 4px 15px var(--primary-glow);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px var(--primary-glow); opacity: 0.9; }
        
        .btn-outline { 
            background: transparent; 
            border: 1px solid var(--border); 
            color: var(--text); 
        }
        .btn-outline:hover { background: rgba(255, 255, 255, 0.05); border-color: var(--primary); }

        .loader-wrap { display: flex; justify-content: center; align-items: center; padding: 40px; }
        .loader { width: 30px; height: 30px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="brand">
        <div class="logo-icon">S</div>
        <div>
            <div class="brand-text">Simpatico<span>HR</span></div>
            <div class="brand-subtitle">Candidate Portal</div>
        </div>
    </div>
    <div class="nav-section">
        <div class="nav-label">Overview</div>
        <a class="nav-item active" onclick="switchTab('dashboard', this)"><i class="fas fa-th-large"></i> Dashboard</a>
        <a class="nav-item" onclick="switchTab('jobs', this)"><i class="fas fa-briefcase"></i> Explore Jobs</a>
        <a class="nav-item" onclick="switchTab('applications', this)"><i class="fas fa-file-alt"></i> My Applications</a>
        <a class="nav-item" onclick="switchTab('interviews', this)"><i class="fas fa-video"></i> Interviews</a>
    </div>
    <div style="padding: 20px; border-top: 1px solid var(--border);">
        <a class="nav-item" onclick="signOut()" style="color:#ef4444;"><i class="fas fa-sign-out-alt"></i> Sign Out</a>
    </div>
</aside>

<div class="main">
    <div class="topbar">
        <h1 id="pageTitle">Dashboard</h1>
        <div class="user-profile">
            <div class="avatar" id="userInitials">C</div>
            <div>
                <div style="font-size:0.9rem; font-weight:700;" id="userName">Candidate</div>
                <div style="font-size:0.75rem; color:var(--text-muted);" id="userRoleBadge">Candidate</div>
            </div>
        </div>
    </div>

    <div class="content">
        <div id="tab-dashboard" class="tab-content active">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon" style="background:rgba(99, 102, 241, 0.1); color:var(--primary);"><i class="fas fa-paper-plane"></i></div>
                    <div><h3 id="statApps">0</h3><p>Applied</p></div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background:rgba(16, 185, 129, 0.1); color:var(--success);"><i class="fas fa-check-circle"></i></div>
                    <div><h3 id="statShort">0</h3><p>Shortlisted</p></div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background:rgba(139, 92, 246, 0.1); color:var(--accent);"><i class="fas fa-video"></i></div>
                    <div><h3 id="statIntv">0</h3><p>Interviews</p></div>
                </div>
            </div>
            <div class="panel">
                <div class="panel-header">
                    <h5><i class="fas fa-calendar-alt"></i> Upcoming Interviews</h5>
                </div>
                <div class="panel-body" id="upcomingInterviews">
                    <div class="loader-wrap"><div class="loader"></div></div>
                </div>
            </div>
        </div>

        <div id="tab-jobs" class="tab-content">
            <div class="panel">
                <div class="panel-header"><h5><i class="fas fa-search"></i> Available Positions</h5></div>
                <div class="panel-body" id="jobsList">
                    <div class="loader-wrap"><div class="loader"></div></div>
                </div>
            </div>
        </div>

        <div id="tab-applications" class="tab-content">
            <div class="panel">
                <div class="panel-header"><h5><i class="fas fa-history"></i> My Applications</h5></div>
                <div class="panel-body" id="applicationsList">
                    <div class="loader-wrap"><div class="loader"></div></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/hr-config.js"></script>
<script src="../js/shared-utils.js"></script>
<script src="../js/supabase-client.js"></script>

<script>
const user = JSON.parse(localStorage.getItem('simpatico_user') || '{}');
const candidateEmail = user.email || '';

function initUI() {
    const name = user.full_name || user.name || 'Candidate';
    document.getElementById('userName').textContent = name;
    document.getElementById('userInitials').textContent = name.charAt(0).toUpperCase();
    loadDashboardData();
}

async function loadDashboardData() {
    if (!window.SimpaticoDB) return setTimeout(loadDashboardData, 500);
    try {
        const { data: jobs } = await window.SimpaticoDB.from('jobs').select('*').eq('status', 'open');
        const { data: apps } = await window.SimpaticoDB.from('job_applications').select('*, jobs(*)').eq('candidate_email', candidateEmail);
        const { data: intvs } = await window.SimpaticoDB.from('interviews').select('*').eq('candidate_email', candidateEmail).order('created_at', { ascending: false });

        document.getElementById('statApps').textContent = apps?.length || 0;
        document.getElementById('statShort').textContent = apps?.filter(a => a.status === 'shortlisted').length || 0;
        document.getElementById('statIntv').textContent = intvs?.length || 0;

        renderJobs(jobs, apps);
        renderApplications(apps);
        renderInterviews(intvs);
    } catch (err) { console.error(err); }
}

function renderJobs(jobs, apps) {
    const container = document.getElementById('jobsList');
    if (!jobs?.length) {
        container.innerHTML = '<div class="empty-state"><p>No jobs found.</p></div>';
        return;
    }
    const appliedIds = apps?.map(a => a.job_id) || [];
    container.innerHTML = jobs.map(job => `
        <div class="job-card">
            <h3>${job.title}</h3>
            <p style="color:var(--text-muted); margin: 8px 0;">${job.location || 'Remote'} • ${job.employment_type || 'Full-time'}</p>
            <div style="margin-top:16px;">
                ${appliedIds.includes(job.id) 
                    ? '<button class="btn btn-outline" disabled>Applied</button>'
                    : `<button class="btn btn-primary" onclick="window.location.href='/job-apply.html?job_id=${job.id}'">Apply</button>`
                }
            </div>
        </div>
    `).join('');
}

function renderApplications(apps) {
    const container = document.getElementById('applicationsList');
    if (!apps?.length) {
        container.innerHTML = '<div class="empty-state"><p>No applications yet.</p></div>';
        return;
    }
    container.innerHTML = apps.map(app => `
        <div style="padding:16px; border:1px solid var(--border); border-radius:12px; margin-bottom:12px; display:flex; justify-content:space-between;">
            <div>
                <strong>${app.jobs?.title || 'Position'}</strong>
                <div style="font-size:0.8rem; color:var(--text-muted);">Applied: ${new Date(app.created_at).toLocaleDateString()}</div>
            </div>
            <span class="badge badge-primary" style="text-transform:capitalize;">${app.status || 'Pending'}</span>
        </div>
    `).join('');
}

function renderInterviews(intvs) {
    const container = document.getElementById('upcomingInterviews');
    if (!intvs?.length) {
        container.innerHTML = '<div class="empty-state"><p>No upcoming interviews.</p></div>';
        return;
    }
    container.innerHTML = intvs.map(intv => `
        <div style="padding:16px; border:1px solid var(--border); border-radius:12px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center;">
            <div>
                <strong>${intv.interview_role || 'General'} Interview</strong>
                <div style="font-size:0.8rem; color:var(--text-muted);">Generated: ${new Date(intv.created_at).toLocaleDateString()}</div>
            </div>
            ${intv.status !== 'completed' ? `<a href="${intv.token ? '/interview/ready.html?token=' + intv.token : '#'}" class="btn btn-primary btn-sm" style="padding:8px 16px;">Join Now</a>` : '<span class="badge badge-success">Completed</span>'}
        </div>
    `).join('');
}

function switchTab(tabId, el) {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + tabId).classList.add('active');
    document.getElementById('pageTitle').textContent = el.textContent.trim();
}

function signOut() {
    localStorage.clear();
    window.location.href = '/platform/login.html';
}

initUI();
</script>
</body>
</html>
