<style>
    /* Employee Module Specific Styles */
    .emp-avatar {
        width: 36px; height: 36px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-weight: 600; color: #fff; font-size: 0.85rem; flex-shrink: 0;
    }
    .emp-name-cell {
        display: flex; align-items: center; gap: 12px;
    }
    .emp-name-text {
        display: flex; flex-direction: column;
    }
    .emp-name-text strong { color: var(--text-primary); font-size: 0.9rem; }
    .emp-name-text small { color: var(--text-secondary); font-size: 0.75rem; }
    
    /* Dark Theme Modal (Matching your screenshot) */
    .dark-modal .modal-content {
        background: #0f172a;
        color: #f8fafc;
        border: 1px solid #1e293b;
        border-radius: 16px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .dark-modal .modal-header {
        border-bottom: 1px solid #1e293b;
        padding: 20px 24px;
    }
    .dark-modal .modal-title { color: #f8fafc; font-size: 1.1rem; font-weight: 600; }
    .dark-modal .btn-close { filter: invert(1) grayscale(100%) brightness(200%); opacity: 0.5; }
    .dark-modal .form-group label { color: #94a3b8; font-size: 0.8rem; margin-bottom: 6px; }
    .dark-modal .form-control-custom {
        background: #1e293b; border: 1px solid #334155; color: #f8fafc;
    }
    .dark-modal .form-control-custom:focus {
        border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
    }
    .dark-modal .modal-footer {
        border-top: none; padding: 20px 24px; display: flex; gap: 12px; justify-content: flex-end;
    }
    .dark-modal .btn-cancel {
        background: transparent; border: 1px solid #334155; color: #cbd5e1;
        padding: 8px 16px; border-radius: 8px; font-size: 0.85rem; font-weight: 500; transition: 0.2s;
    }
    .dark-modal .btn-cancel:hover { background: #1e293b; color: #fff; }
    .dark-modal .btn-save {
        background: #0ea5e9; color: #fff; border: none;
        padding: 8px 20px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; transition: 0.2s;
    }
    .dark-modal .btn-save:hover { background: #0284c7; }
</style>

<div class="hr-main">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
        <div class="d-flex gap-2">
            <select class="form-control-custom" style="width: auto; padding: 6px 12px; font-size: 0.85rem;" id="empFilterDept" onchange="window.filterEmployees()">
                <option value="">All Departments</option>
                <option>Engineering</option>
                <option>Design</option>
                <option>Marketing</option>
                <option>Sales</option>
                <option>HR</option>
            </select>
        </div>
        <div class="d-flex gap-2">
            <button class="btn-outline-custom"><i class="fas fa-file-export"></i> Export</button>
            <button class="btn-primary-custom" onclick="window.openAddEmployeeModal()">
                <i class="fas fa-user-plus"></i> Add Employee
            </button>
        </div>
    </div>

    <div class="stats-grid mb-4">
        <div class="stat-card">
            <div class="stat-icon" style="background:#e0e7ff; color:#6366f1;"><i class="fas fa-users"></i></div>
            <div class="stat-info">
                <h3 id="statTotalEmployees">0</h3>
                <p>Total Employees</p>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon" style="background:#dcfce7; color:#16a34a;"><i class="fas fa-user-check"></i></div>
            <div class="stat-info">
                <h3 id="statActiveEmployees">0</h3>
                <p>Active</p>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon" style="background:#fef3c7; color:#d97706;"><i class="fas fa-user-clock"></i></div>
            <div class="stat-info">
                <h3 id="statOnboarding">0</h3>
                <p>Onboarding</p>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-body" style="padding: 0;">
            <div class="table-responsive">
                <table class="data-table" id="employeesTable">
                    <thead>
                        <tr>
                            <th>Employee</th>
                            <th>Role & Department</th>
                            <th>Type</th>
                            <th>Start Date</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="employeesTableBody">
                        </tbody>
                </table>
            </div>
            <div id="empEmptyState" class="empty-state" style="display:none; padding: 60px 20px;">
                <i class="fas fa-users-slash" style="font-size:3rem; color:#cbd5e1; margin-bottom:16px;"></i>
                <h5>No Employees Found</h5>
                <p style="color:var(--text-secondary); font-size:0.9rem;">Add your first employee to start building your directory.</p>
                <button class="btn-primary-custom mt-3" onclick="window.openAddEmployeeModal()">
                    <i class="fas fa-plus"></i> Add Employee
                </button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade dark-modal" id="addEmployeeModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add New Employee</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" style="padding: 24px;">
                <form id="addEmployeeForm" onsubmit="window.saveEmployee(event)">
                    <div class="row">
                        <div class="col-md-6 form-group">
                            <label>First Name *</label>
                            <input type="text" class="form-control-custom" id="empFirstName" required>
                        </div>
                        <div class="col-md-6 form-group">
                            <label>Last Name *</label>
                            <input type="text" class="form-control-custom" id="empLastName" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Work Email *</label>
                        <input type="email" class="form-control-custom" id="empEmail" required>
                    </div>
                    <div class="row mt-3">
                        <div class="col-md-6 form-group">
                            <label>Department</label>
                            <select class="form-control-custom" id="empDept">
                                <option value="Select">Select</option>
                                <option value="Engineering">Engineering</option>
                                <option value="Design">Design</option>
                                <option value="Marketing">Marketing</option>
                                <option value="Sales">Sales</option>
                                <option value="HR">HR</option>
                            </select>
                        </div>
                        <div class="col-md-6 form-group">
                            <label>Job Title</label>
                            <input type="text" class="form-control-custom" id="empTitle" placeholder="e.g. Software Engineer">
                        </div>
                    </div>
                    <div class="row mt-3">
                        <div class="col-md-6 form-group">
                            <label>Start Date</label>
                            <input type="date" class="form-control-custom" id="empStartDate">
                        </div>
                        <div class="col-md-6 form-group">
                            <label>Employment Type</label>
                            <select class="form-control-custom" id="empType">
                                <option value="Full-time">Full-time</option>
                                <option value="Part-time">Part-time</option>
                                <option value="Contract">Contract</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group mt-3">
                        <label>Location</label>
                        <input type="text" class="form-control-custom" id="empLocation">
                    </div>
                    <div class="form-group mt-3">
                        <label>Manager</label>
                        <select class="form-control-custom" id="empManager">
                            <option value="No manager">No manager</option>
                        </select>
                    </div>
                </form>
            </div>
           <div class="modal-footer">
                <button type="button" class="btn-cancel" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn-save" onclick="window.saveEmployee(event)">Save Employee</button>
            </div>
        </div>
    </div>
</div>

<script>
// =========================================================================
// EMPLOYEES MODULE JS
// =========================================================================

// Initialize Employee Data Array if it doesn't exist
if (!window.appData) window.appData = window.DataStore ? window.DataStore.get() : { employees: [] };
if (!window.appData.employees) window.appData.employees = [];

// Random colors for avatars
var avatarColors = ['#4f46e5', '#0ea5e9', '#10b981', '#f59e0b', '#ec4899', '#8b5cf6', '#ef4444'];

window.renderEmployeesTable = function() {
    var tbody = document.getElementById('employeesTableBody');
    var emptyState = document.getElementById('empEmptyState');
    var table = document.getElementById('employeesTable');
    
    if (!tbody) return;

    var filterDept = document.getElementById('empFilterDept')?.value || '';
    var emps = window.appData.employees;

    // Filter Logic
    if (filterDept) {
        emps = emps.filter(e => e.department === filterDept);
    }

    // Safely Update Stats
    var totalEl = document.getElementById('statTotalEmployees');
    if (totalEl) totalEl.textContent = window.appData.employees.length;
    
    var activeEl = document.getElementById('statActiveEmployees');
    if (activeEl) activeEl.textContent = window.appData.employees.filter(e => e.status !== 'Inactive').length;
    
    var onbEl = document.getElementById('statOnboarding');
    if (onbEl) onbEl.textContent = window.appData.employees.filter(e => e.status === 'Onboarding').length;

    // Render Logic
    if (emps.length === 0) {
        tbody.innerHTML = '';
        if (emptyState) emptyState.style.display = 'block';
        if (table) table.style.display = 'none';
        return;
    }

    if (emptyState) emptyState.style.display = 'none';
    if (table) table.style.display = 'table';

    var html = '';
    emps.forEach((emp, idx) => {
        var fName = emp.firstName || emp.first_name || '';
        var lName = emp.lastName || emp.last_name || '';
        var initials = (fName.charAt(0) + lName.charAt(0)).toUpperCase() || 'EM';

        var color = avatarColors[idx % avatarColors.length];
        var fullName = (fName + ' ' + lName).trim() || 'Unnamed Employee';
        var statusColor = emp.status === 'Active' ? 'active' : (emp.status === 'Onboarding' ? 'pending' : 'closed');

        html += `
            <tr>
                <td>
                    <div class="emp-name-cell">
                        <div class="emp-avatar" style="background: ${color}">${initials}</div>
                        <div class="emp-name-text">
                            <strong>${window.escapeHtml ? window.escapeHtml(fullName) : fullName}</strong>
                            <small>${window.escapeHtml ? window.escapeHtml(emp.email || '') : (emp.email || '')}</small>
                        </div>
                    </div>
                </td>
                <td>
                    <div style="font-weight:500; font-size:0.85rem;">${emp.jobTitle || '—'}</div>
                    <div style="font-size:0.75rem; color:var(--text-secondary);">${emp.department || '—'}</div>
                </td>
                <td style="font-size:0.85rem;">${emp.type || '—'}</td>
                <td style="font-size:0.85rem; color:var(--text-secondary);">${emp.startDate ? new Date(emp.startDate).toLocaleDateString() : '—'}</td>
                <td><span class="status-badge ${statusColor}">${emp.status || 'Active'}</span></td>
                <td>
                    <button class="btn-sm-action view" title="View Profile"><i class="fas fa-eye"></i></button>
                    <button class="btn-sm-action edit" title="Edit"><i class="fas fa-pen"></i></button>
                    <button class="btn-sm-action delete" title="Remove" onclick="window.deleteEmployee('${emp.id}')"><i class="fas fa-trash"></i></button>
                </td>
            </tr>
        `;
    });
    
    tbody.innerHTML = html;
};

// 🔥 FIX 2: Prevent multiple Bootstrap modal instances from getting stuck
window.openAddEmployeeModal = function() {
    document.getElementById('addEmployeeForm').reset();
    var modalEl = document.getElementById('addEmployeeModal');
    var modal = bootstrap.Modal.getInstance(modalEl) || new bootstrap.Modal(modalEl);
    modal.show();
};

window.saveEmployee = function(e) {
    if (e) e.preventDefault();
    
    // 🔥 FIX 3: Manually trigger form validation since we bypassed the standard submit
    var form = document.getElementById('addEmployeeForm');
    if (!form.checkValidity()) {
        form.reportValidity();
        return;
    }
    
    // Safely extract values from the modal
    var newEmp = {
        id: 'emp_' + Date.now(),
        firstName: document.getElementById('empFirstName').value.trim(),
        lastName: document.getElementById('empLastName').value.trim(),
        email: document.getElementById('empEmail').value.trim(),
        department: document.getElementById('empDept').value,
        jobTitle: document.getElementById('empTitle').value.trim(),
        startDate: document.getElementById('empStartDate').value,
        type: document.getElementById('empType').value,
        location: document.getElementById('empLocation').value.trim(),
        manager: document.getElementById('empManager').value,
        status: 'Active',
        createdAt: new Date().toISOString()
    };

    // Add to DataStore defensively
    if (window.DataStore) {
        window.DataStore.update(data => {
            if (!data.employees) data.employees = [];
            if (!data.stats) data.stats = {}; // Prevent crashes if stats is missing
            data.employees.push(newEmp);
            data.stats.totalEmployees = data.employees.length;
        });
        window.appData = window.DataStore.get();
    } else {
        window.appData.employees.push(newEmp);
    }

    window.renderEmployeesTable();
    
    // 🔥 FIX 4: Bulletproof Modal Close
    var modalEl = document.getElementById('addEmployeeModal');
    var modal = bootstrap.Modal.getInstance(modalEl);
    if (modal) {
        modal.hide();
    } else {
        // Hard-hide fallback if Bootstrap fails
        modalEl.classList.remove('show');
        modalEl.style.display = 'none';
        document.body.classList.remove('modal-open');
        var backdrop = document.querySelector('.modal-backdrop');
        if (backdrop) backdrop.remove();
    }
    
    if (window.showToast) window.showToast('✅ Employee added successfully!');
};

window.deleteEmployee = function(id) {
    if (!confirm('Are you sure you want to remove this employee?')) return;
    
    if (window.DataStore) {
        window.DataStore.update(data => {
            data.employees = (data.employees || []).filter(e => e.id !== id);
            if (!data.stats) data.stats = {};
            data.stats.totalEmployees = data.employees.length;
        });
        window.appData = window.DataStore.get();
    } else {
        window.appData.employees = window.appData.employees.filter(e => e.id !== id);
    }
    
    window.renderEmployeesTable();
    if (window.showToast) window.showToast('🗑️ Employee removed.');
};

window.filterEmployees = function() {
    window.renderEmployeesTable();
};

// Listen for the custom SPA load event from hr.html to trigger rendering
window.addEventListener('SimpaticoSPA', function() {
    window.renderEmployeesTable();
});

// Run once immediately in case it loads directly
window.renderEmployeesTable();
</script>
