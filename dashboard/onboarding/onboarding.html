<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onboarding — Simpatico HR</title>
<link rel="stylesheet" href="../hr-modules.css">
<style>
:root{--p:#4f46e5;--ok:#10b981;--warn:#f59e0b;--err:#ef4444;--bg:#f1f5f9;--card:#fff;--bdr:#e2e8f0;--txt:#1e293b;--dim:#64748b;--r:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt)}
body.emb .hr-sidebar,body.emb .hr-topbar{display:none!important}
.wrap{padding:24px;max-width:1200px;margin:0 auto}
.ph{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.pt{font-size:1.5rem;font-weight:800}.ps{font-size:.85rem;color:var(--dim);margin-top:3px}
.btn{padding:9px 18px;border-radius:8px;border:none;font-size:.88rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:inherit;transition:.2s}
.bp{background:var(--p);color:#fff}.bp:hover{opacity:.9}
.bg2{background:transparent;color:var(--dim);border:1.5px solid var(--bdr)}.bg2:hover{background:var(--bg)}
.sr{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px}
.sc{background:var(--card);border-radius:var(--r);padding:16px;border:1px solid var(--bdr);box-shadow:0 1px 3px rgba(0,0,0,.05)}
.sc .lb{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);margin-bottom:4px}
.sc .vl{font-size:1.8rem;font-weight:800}
.ob-list{display:grid;gap:16px}
.ob-card{background:var(--card);border-radius:var(--r);border:1px solid var(--bdr);padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.ob-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;gap:12px;flex-wrap:wrap}
.ob-name{font-weight:700;font-size:1rem}
.ob-role{font-size:.82rem;color:var(--dim);margin-top:2px}
.ob-pct{font-size:1.3rem;font-weight:800;color:var(--p)}
.prog-bar{height:8px;background:var(--bdr);border-radius:4px;overflow:hidden;margin-bottom:14px}
.prog-fill{height:100%;border-radius:4px;transition:width .4s}
.tasks{display:grid;gap:8px}
.task{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;background:var(--bg);border:1px solid var(--bdr);font-size:.85rem}
.task.done{opacity:.6;text-decoration:line-through}
.task .ck{width:20px;height:20px;border-radius:50%;border:2px solid var(--bdr);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;font-size:.8rem;transition:.2s}
.task .ck.on{background:var(--ok);border-color:var(--ok);color:#fff}
.task .cat{font-size:.72rem;padding:2px 8px;border-radius:10px;background:#dbeafe;color:#1d4ed8;flex-shrink:0}
.ls2{text-align:center;padding:60px 20px;color:var(--dim)}
.ls2 svg{width:48px;height:48px;opacity:.2;margin-bottom:12px}
.ls2 h5{color:var(--txt);margin-bottom:6px}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px}
.mo.on{display:flex}
.mb{background:var(--card);border-radius:16px;padding:26px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:mIn .2s}
@keyframes mIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.mh h3{font-size:1.05rem;font-weight:700}
.mx{background:none;border:none;cursor:pointer;font-size:1.3rem;color:var(--dim);line-height:1}
.fg{margin-bottom:12px}
.fl{display:block;font-size:.82rem;font-weight:600;margin-bottom:5px}
.fi{width:100%;padding:9px 12px;border:1.5px solid var(--bdr);border-radius:8px;font-size:.88rem;outline:none;font-family:inherit;background:var(--card);color:var(--txt);transition:.2s}
.fi:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.mf{display:flex;justify-content:flex-end;gap:10px;margin-top:16px;padding-top:14px;border-top:1px solid var(--bdr)}
.tc{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--card);border-radius:10px;padding:12px 16px;box-shadow:0 8px 24px rgba(0,0,0,.15);font-size:.88rem;font-weight:500;border-left:4px solid var(--ok);animation:tIn .3s;max-width:360px}
.toast.er{border-left-color:var(--err)}
@keyframes tIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="tc" id="tc"></div>
<div class="wrap">
  <div class="ph">
    <div><div class="pt">Onboarding</div><div class="ps">Track new employee onboarding progress</div></div>
    <button class="btn bp" onclick="openStart()">＋ Start Onboarding</button>
  </div>
  <div class="sr">
    <div class="sc"><div class="lb">Total Records</div><div class="vl" id="s1">—</div></div>
    <div class="sc"><div class="lb">In Progress</div><div class="vl" id="s2">—</div></div>
    <div class="sc"><div class="lb">Completed</div><div class="vl" id="s3">—</div></div>
    <div class="sc"><div class="lb">Pending Tasks</div><div class="vl" id="s4">—</div></div>
  </div>
  <div class="ob-list" id="list"><div class="ls2"><p>Loading…</p></div></div>
</div>

<div class="mo" id="mo">
  <div class="mb">
    <div class="mh"><h3>Start Employee Onboarding</h3><button class="mx" onclick="cm()">✕</button></div>
    <div class="fg"><label class="fl">Employee ID *</label><input class="fi" id="emp-id2" placeholder="Employee UUID or ID"></div>
    <div class="fg"><label class="fl">Start Date *</label><input class="fi" id="start-d" type="date"></div>
    <div class="fg"><label class="fl">Template (optional)</label><input class="fi" id="tmpl" placeholder="Template ID"></div>
    <div class="mf">
      <button class="btn bg2" onclick="cm()">Cancel</button>
      <button class="btn bp" id="sb" onclick="doStart()">Start Onboarding</button>
    </div>
  </div>
</div>

<script src="../../js/hr-config.js"></script>
<script src="../../js/shared-utils.js"></script>
<script src="../../js/supabase-client.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
var SB  = window.SIMPATICO_CONFIG?.supabaseUrl;
var KEY = window.SIMPATICO_CONFIG?.supabaseAnonKey;
var TENANT = (window.SIMPATICO_CONFIG && window.SIMPATICO_CONFIG.tenantId) || 'default';
if(window.self!==window.top)document.body.classList.add('emb');

function hdr(ex){var h={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','X-Tenant-ID':TENANT};if(ex)Object.assign(h,ex);return h;}
async function get(qs){var r=await fetch(SB+'/rest/v1/'+qs,{headers:hdr()});var d=await r.json();if(!r.ok)throw new Error((d&&d.message)||r.statusText);return Array.isArray(d)?d:[];}
async function post(t,b){var r=await fetch(SB+'/rest/v1/'+t,{method:'POST',headers:hdr({'Prefer':'return=representation'}),body:JSON.stringify(b)});var d=await r.json();if(!r.ok)throw new Error((d&&d.message)||r.statusText);return d;}
async function patch(t,id,b){var r=await fetch(SB+'/rest/v1/'+t+'?id=eq.'+id,{method:'PATCH',headers:hdr({'Prefer':'return=representation'}),body:JSON.stringify(b)});var d=await r.json();if(!r.ok)throw new Error((d&&d.message)||r.statusText);return d;}

var records=[],tasks=[];
window.addEventListener('DOMContentLoaded',load);

async function load(){
  el('list').innerHTML='<div class="ls2"><p>Loading…</p></div>';
  try{
    records=await get('onboarding_records?select=*,employees(first_name,last_name,job_title)&order=created_at.desc&limit=50');
    tasks=await get('onboarding_tasks?select=*&order=due_date.asc&limit=500');
    render();
  }catch(e){
    el('list').innerHTML='<div class="ls2"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><h5>Could not load onboarding data</h5><p style="font-size:.83rem">'+e.message+'</p></div>';
  }
}

function render(){
  var inProg=records.filter(function(r){return r.stage==='in_progress';}).length;
  var done=records.filter(function(r){return r.stage==='completed';}).length;
  var pending=tasks.filter(function(t){return t.status==='pending';}).length;
  tx('s1',records.length);tx('s2',inProg);tx('s3',done);tx('s4',pending);
  if(!records.length){el('list').innerHTML='<div class="ls2"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><h5>No onboarding records</h5><p>Start onboarding for a new employee.</p><button class="btn bp" style="margin-top:14px" onclick="openStart()">＋ Start Onboarding</button></div>';return;}
  el('list').innerHTML=records.map(function(r){
    var emp=r.employees||{};
    var nm=((emp.first_name||'')+'  '+(emp.last_name||'')).trim()||'Employee '+r.employee_id;
    var myTasks=tasks.filter(function(t){return t.onboarding_record_id===r.id;});
    var pct=r.completion_pct||0;
    var color=pct===100?'var(--ok)':pct>=50?'var(--warn)':'var(--p)';
    return '<div class="ob-card">'
      +'<div class="ob-head"><div><div class="ob-name">'+nm+'</div><div class="ob-role">'+(emp.job_title||'New Employee')+'</div></div><div class="ob-pct">'+pct+'%</div></div>'
      +'<div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%;background:'+color+'"></div></div>'
      +'<div class="tasks">'+myTasks.slice(0,8).map(function(t){
        return '<div class="task'+(t.status==='completed'?' done':'')+'"><div class="ck'+(t.status==='completed'?' on':'')+'" onclick="toggle(\''+t.id+'\',\''+r.id+'\',\''+t.status+'\')">'+
          (t.status==='completed'?'✓':'')+'</div><span style="flex:1">'+t.title+'</span><span class="cat">'+t.category+'</span>'+
          (t.due_date?'<span style="font-size:.72rem;color:var(--dim)">'+t.due_date+'</span>':'')+'</div>';
      }).join('')
      +(myTasks.length>8?'<div style="font-size:.8rem;color:var(--dim);padding:4px 12px;">…and '+(myTasks.length-8)+' more tasks</div>':'')
      +'</div></div>';
  }).join('');
}

async function toggle(taskId,recId,currentStatus){
  var newStatus=currentStatus==='completed'?'pending':'completed';
  try{
    await patch('onboarding_tasks',taskId,{status:newStatus});
    await load();
  }catch(e){toast('Update failed: '+e.message,'er');}
}

function openStart(){
  el('emp-id2').value='';el('start-d').value=new Date().toISOString().split('T')[0];el('tmpl').value='';
  el('mo').classList.add('on');
}
function cm(){el('mo').classList.remove('on');}

async function doStart(){
  var empId=(el('emp-id2').value||'').trim();
  var startd=(el('start-d').value||'').trim();
  if(!empId||!startd){toast('Employee ID and start date are required.','er');return;}
  el('sb').disabled=true;el('sb').textContent='Starting…';
  try{
    var WORKER=(window.SIMPATICO_CONFIG&&window.SIMPATICO_CONFIG.workerUrl)||'https://simpatico-hr-ats.simpaticohrconsultancy.workers.dev';
    var r=await fetch(WORKER+'/onboarding/start',{method:'POST',headers:{'Content-Type':'application/json','X-Tenant-ID':TENANT},body:JSON.stringify({employee_id:empId,start_date:startd,template_id:el('tmpl').value||null})});
    var d=await r.json();
    if(!r.ok||!d.success)throw new Error(d.error&&d.error.message||'Failed');
    toast('✅ Onboarding started! '+d.data.tasks_created+' tasks created.');
    cm();await load();
  }catch(e){toast('Error: '+e.message,'er');}
  finally{el('sb').disabled=false;el('sb').textContent='Start Onboarding';}
}

function el(id){return document.getElementById(id);}
function tx(id,v){var e=el(id);if(e)e.textContent=v;}
function toast(msg,type){var c=el('tc'),t=document.createElement('div');t.className='toast'+(type?' '+type:'');t.textContent=msg;c.appendChild(t);setTimeout(function(){t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(function(){t.parentNode&&t.parentNode.removeChild(t);},300);},5000);}
el('mo').addEventListener('click',function(e){if(e.target===el('mo'))cm();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')cm();});
</script>
</body>
</html>
