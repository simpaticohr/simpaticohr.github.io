<!DOCTYPE html> 
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simpatico HR Module</title>
  
  <link rel="stylesheet" href="../hr-modules.css"> 
  <style>
    /* Add any page-specific CSS here (like the course-card styles for training) */
  </style>

  <script>
    if (window.self !== window.top) {
      document.addEventListener("DOMContentLoaded", function() {
        var shell = document.querySelector(".hr-shell");
        if (shell) {
          shell.style.gridTemplateColumns = "1fr";
          shell.style.gridTemplateRows = "1fr";
        }
        var topbar = document.querySelector(".hr-topbar");
        if (topbar) topbar.style.display = "none";
        var sidebar = document.querySelector(".hr-sidebar");
        if (sidebar) sidebar.style.display = "none";
        var main = document.querySelector(".hr-main");
        if (main) {
          main.style.gridColumn = "1";
          main.style.padding = "20px";
        }
      });
    }
  </script>
</head>
<body>
<div class="hr-shell">
  <main class="hr-main">
    <div class="hr-page-header">
      <div class="hr-page-title">Performance Management
        <small>Reviews, goals, and growth tracking</small>
      </div>
      <div class="hr-page-actions">
        <button class="hr-btn hr-btn-primary" onclick="alert('Start Review feature coming soon!')">Start Review Cycle</button>
      </div>
    </div>

    <div class="hr-stats-grid">
      <div class="hr-stat-card" style="--card-accent:#00c4ff">
        <div class="label">Active Cycles</div><div class="value" id="stat-cycles">0</div>
        <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
      </div>
      <div class="hr-stat-card" style="--card-accent:#10b981">
        <div class="label">Avg Score</div><div class="value" id="stat-avg-score">--</div>
        <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></div>
      </div>
      <div class="hr-stat-card" style="--card-accent:#f59e0b">
        <div class="label">Pending Reviews</div><div class="value" id="stat-pending">0</div>
        <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
      </div>
    </div>

    <div class="hr-tabs" id="perf-tabs">
      <button class="hr-tab active" onclick="window.switchPerfTab(this, 'tab-reviews')">Reviews</button>
      <button class="hr-tab" onclick="window.switchPerfTab(this, 'tab-goals')">Goals</button>
    </div>

    <div id="tab-reviews">
      <div id="reviews-list" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px">
        <div style="padding:40px; text-align:center; color:#64748b; grid-column: 1 / -1;">Loading performance reviews...</div>
      </div>
    </div>

    <div id="tab-goals" style="display:none;">
        <div class="hr-table-wrap">
          <table class="hr-table">
            <thead><tr><th>Employee ID</th><th>Goal</th><th>Period</th><th>Progress</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="goals-tbody">
              <tr><td colspan="6" style="text-align:center;padding:40px;color:#64748b">Loading goals...</td></tr>
            </tbody>
          </table>
        </div>
    </div>
  </main>
</div>

<div class="hr-toast-container" id="toasts"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/hr-config.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/performance.js"></script>
</body>
</html>
