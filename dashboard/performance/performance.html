<!DOCTYPE html> 
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Performance | Simpatico HR</title>
  <style>
    /* Base Styles */
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f1f5f9; color: #1e293b; margin: 0; padding: 20px; }
    svg { width: 1em; height: 1em; }
    .hr-page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .hr-page-title { font-size: 1.5rem; font-weight: 700; }
    .hr-page-title small { display: block; font-size: 0.85rem; color: #64748b; font-weight: 400; margin-top: 4px; }
    .hr-stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .hr-stat-card { background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; position: relative; overflow: hidden; }
    .hr-stat-card .label { font-size: 0.85rem; color: #64748b; margin-bottom: 8px; font-weight: 500; }
    .hr-stat-card .value { font-size: 1.8rem; font-weight: 700; color: #1e293b; margin-bottom: 8px; }
    .hr-stat-card .icon { position: absolute; right: -10px; bottom: -10px; width: 80px; height: 80px; opacity: 0.1; color: var(--card-accent, #4f46e5); }
    .hr-stat-card .icon svg { width: 100%; height: 100%; }
    .hr-tabs { display: flex; gap: 0; border-bottom: 2px solid #e2e8f0; margin-bottom: 20px; }
    .hr-tab { padding: 10px 20px; background: transparent; border: none; border-bottom: 2px solid transparent; cursor: pointer; font-weight: 500; color: #64748b; margin-bottom: -2px; }
    .hr-tab.active { color: #4f46e5; border-bottom-color: #4f46e5; }
    .hr-btn { padding: 8px 16px; border-radius: 8px; font-weight: 500; cursor: pointer; border: none; font-size: 0.88rem; transition: 0.2s; }
    .hr-btn-primary { background: #4f46e5; color: white; }
    .hr-btn-primary:hover { background: #3730a3; }
    .review-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; cursor: pointer; }
  </style>
</head>
<body>
<div class="hr-shell">
  <main class="hr-main">
    <div class="hr-page-header">
      <div class="hr-page-title">Performance Management
        <small>Reviews, goals, and growth tracking</small>
      </div>
      <div class="hr-page-actions">
        <button class="hr-btn hr-btn-primary" onclick="alert('Start Review feature coming soon!')">Start Review Cycle</button>
      </div>
    </div>

    <div class="hr-stats-grid">
      <div class="hr-stat-card" style="--card-accent:#00c4ff">
        <div class="label">Active Cycles</div><div class="value" id="stat-cycles">1</div>
        <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
      </div>
      <div class="hr-stat-card" style="--card-accent:#10b981">
        <div class="label">Avg Score</div><div class="value" id="stat-avg-score">85%</div>
        <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></div>
      </div>
    </div>

    <div class="hr-tabs" id="perf-tabs">
      <button class="hr-tab active">Reviews</button>
      <button class="hr-tab">Goals</button>
    </div>

    <div id="tab-reviews">
      <div id="reviews-list" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px">
        <div class="review-card">
          <div style="font-weight:bold; margin-bottom:10px;">Q1 Performance Review</div>
          <p style="color:#64748b; font-size:14px;">All reviews are currently up to date.</p>
        </div>
      </div>
    </div>
  </main>
</div>
</body>
</html>
