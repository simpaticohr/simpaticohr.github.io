<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payroll — Simpatico HR</title>
<link rel="stylesheet" href="../hr-modules.css">
<style>
:root{--p:#4f46e5;--ok:#10b981;--warn:#f59e0b;--err:#ef4444;--bg:#f1f5f9;--card:#fff;--bdr:#e2e8f0;--txt:#1e293b;--dim:#64748b;--r:12px}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt)}
body.emb .hr-sidebar,body.emb .hr-topbar{display:none!important}
.wrap{padding:24px;max-width:1200px;margin:0 auto}
.ph{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.pt{font-size:1.5rem;font-weight:800}.ps{font-size:.85rem;color:var(--dim);margin-top:3px}
.ar{display:flex;gap:10px;flex-wrap:wrap}
.btn{padding:9px 18px;border-radius:8px;border:none;font-size:.88rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:inherit;transition:.2s}
.bp{background:var(--p);color:#fff}.bp:hover{opacity:.9}.bg2{background:transparent;color:var(--dim);border:1.5px solid var(--bdr)}.bg2:hover{background:var(--bg)}
.sr{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.sc{background:var(--card);border-radius:var(--r);padding:18px;border:1px solid var(--bdr);box-shadow:0 1px 3px rgba(0,0,0,.05);position:relative;overflow:hidden}
.sc .lb{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);margin-bottom:6px}
.sc .vl{font-size:1.6rem;font-weight:800}
.sc .bar{position:absolute;bottom:0;left:0;right:0;height:3px}
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--bdr);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05);margin-bottom:20px}
.card-h{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-bottom:1px solid var(--bdr)}
.card-h h5{font-size:.95rem;font-weight:700}
.card-b{padding:20px}
table{width:100%;border-collapse:collapse}
table thead th{background:var(--bg);padding:10px 16px;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);text-align:left;white-space:nowrap}
table tbody td{padding:11px 16px;border-bottom:1px solid var(--bdr);font-size:.88rem;vertical-align:middle}
table tbody tr:last-child td{border-bottom:none}
table tbody tr:hover{background:#f8fafc}
.bg{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:600}
.bgc{background:#d1fae5;color:#065f46}.bgp{background:#dbeafe;color:#1d4ed8}.bgr{background:#fee2e2;color:#991b1b}
.bs{padding:5px 10px;border-radius:6px;border:none;cursor:pointer;font-size:.78rem;font-weight:600;transition:.2s;background:#dbeafe;color:#1d4ed8}
.bs:hover{opacity:.8}
.es{text-align:center;padding:50px 20px;color:var(--dim)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px}
.mo.on{display:flex}
.mb{background:var(--card);border-radius:16px;padding:26px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:mIn .2s}
@keyframes mIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.mh h3{font-size:1.05rem;font-weight:700}.mx{background:none;border:none;cursor:pointer;font-size:1.3rem;color:var(--dim);line-height:1}
.fg{margin-bottom:12px}.fl{display:block;font-size:.82rem;font-weight:600;margin-bottom:5px}
.fi{width:100%;padding:9px 12px;border:1.5px solid var(--bdr);border-radius:8px;font-size:.88rem;outline:none;font-family:inherit;background:var(--card);color:var(--txt);transition:.2s}
.fi:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.mf{display:flex;justify-content:flex-end;gap:10px;margin-top:16px;padding-top:14px;border-top:1px solid var(--bdr)}
.eb{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:10px 14px;font-size:.83rem;color:#991b1b;margin-bottom:12px;display:none}
.eb.on{display:block}
.tc{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--card);border-radius:10px;padding:12px 16px;box-shadow:0 8px 24px rgba(0,0,0,.15);font-size:.88rem;font-weight:500;border-left:4px solid var(--ok);animation:tIn .3s;max-width:360px}
.toast.er{border-left-color:var(--err)}
@keyframes tIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="tc" id="tc"></div>
<div class="wrap">
  <div class="ph">
    <div><div class="pt">Payroll</div><div class="ps">Manage payroll runs and payslips</div></div>
    <div class="ar">
      <button class="btn bg2" onclick="openCalc()">🧮 Calculate Payroll</button>
      <button class="btn bp" onclick="openRun()">▶ Run Payroll</button>
    </div>
  </div>
  <div class="sr">
    <div class="sc"><div class="lb">Total Runs</div><div class="vl" id="sr1">—</div><div class="bar" style="background:#4f46e5"></div></div>
    <div class="sc"><div class="lb">Last Run</div><div class="vl" id="sr2" style="font-size:1rem">—</div><div class="bar" style="background:#10b981"></div></div>
    <div class="sc"><div class="lb">Last Net Total</div><div class="vl" id="sr3">—</div><div class="bar" style="background:#f59e0b"></div></div>
    <div class="sc"><div class="lb">Employees Paid</div><div class="vl" id="sr4">—</div><div class="bar" style="background:#0ea5e9"></div></div>
  </div>
  <div class="card">
    <div class="card-h"><h5>Payroll Runs</h5></div>
    <div class="card-b"><div id="runs-area"><div class="es">Loading…</div></div></div>
  </div>
</div>

<div class="mo" id="mo-run">
  <div class="mb">
    <div class="mh"><h3 id="mo-title">Run Payroll</h3><button class="mx" onclick="cm('mo-run')">✕</button></div>
    <div class="eb" id="run-err"></div>
    <div class="fg"><label class="fl">Period (YYYY-MM) *</label><input class="fi" id="run-period" placeholder="2025-03"></div>
    <div class="fg"><label class="fl">Pay Date *</label><input class="fi" id="run-date" type="date"></div>
    <div class="fg"><label class="fl">Notes</label><input class="fi" id="run-notes" placeholder="Optional notes"></div>
    <div class="mf">
      <button class="btn bg2" onclick="cm('mo-run')">Cancel</button>
      <button class="btn bp" id="run-btn" onclick="doRun()">Run Payroll</button>
    </div>
  </div>
</div>

<script src="../../js/hr-config.js"></script>
<script src="../../js/shared-utils.js"></script>
<script src="../../js/supabase-client.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
var SB  = window.SIMPATICO_CONFIG?.supabaseUrl;
var KEY = window.SIMPATICO_CONFIG?.supabaseAnonKey;
var TENANT = (window.SIMPATICO_CONFIG && window.SIMPATICO_CONFIG.tenantId) || 'default';
var WORKER = (window.SIMPATICO_CONFIG && window.SIMPATICO_CONFIG.workerUrl) || 'https://simpatico-hr-ats.simpaticohrconsultancy.workers.dev';
if(window.self!==window.top)document.body.classList.add('emb');

function hdr(ex){var h={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','X-Tenant-ID':TENANT};if(ex)Object.assign(h,ex);return h;}
async function get(qs){var r=await fetch(SB+'/rest/v1/'+qs,{headers:hdr()});var d=await r.json();if(!r.ok)throw new Error((d&&d.message)||r.statusText);return Array.isArray(d)?d:[];}
function fmt(n){return '₹'+(Number(n)||0).toLocaleString('en-IN');}
function fmtD(s){if(!s)return'—';try{return new Date(s+'T00:00:00').toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}catch(e){return s;}}

window.addEventListener('DOMContentLoaded',load);
async function load(){
  try{
    var runs=await get('payroll_runs?select=*&order=created_at.desc&limit=24');
    tx('sr1',runs.length);
    if(runs.length){
      var last=runs[0];
      tx('sr2',last.period||'—');
      tx('sr3',fmt(last.total_net));
      tx('sr4',(last.employee_count||0)+' employees');
    }
    if(!runs.length){el('runs-area').innerHTML='<div class="es"><p>No payroll runs yet. Click "Run Payroll" to process your first payroll.</p></div>';return;}
    el('runs-area').innerHTML='<div style="overflow-x:auto"><table><thead><tr><th>Period</th><th>Pay Date</th><th>Employees</th><th>Gross</th><th>Net</th><th>Status</th><th>Actions</th></tr></thead><tbody>'+
      runs.map(function(r){
        var st=r.status||'—';
        var bc=st==='completed'?'bgc':st==='processing'?'bgp':'bgr';
        return '<tr><td><strong>'+x(r.period||'—')+'</strong></td><td>'+fmtD(r.pay_date)+'</td><td>'+(r.employee_count||0)+'</td><td>'+fmt(r.total_gross)+'</td><td style="font-weight:700;color:var(--ok)">'+fmt(r.total_net)+'</td><td><span class="bg '+bc+'">'+x(st)+'</span></td><td><button class="bs" onclick="sendAll(\''+x(S(r.period))+'\')">Send Payslips</button></td></tr>';
      }).join('')+'</tbody></table></div>';
  }catch(e){el('runs-area').innerHTML='<div class="es">'+e.message+'</div>';}
}

async function sendAll(period){
  if(!confirm('Send all payslips for '+period+'?'))return;
  try{
    var r=await fetch(WORKER+'/payroll/payslips/send-all',{method:'POST',headers:hdr(),body:JSON.stringify({period:period})});
    var d=await r.json();
    if(!r.ok||!d.success)throw new Error(d.error&&d.error.message||'Failed');
    toast('✅ Payslips sent: '+d.data.succeeded+' of '+d.data.total);
  }catch(e){toast('Error: '+e.message,'er');}
}

function openCalc(){
  var p=prompt('Enter period to calculate (YYYY-MM):',new Date().toISOString().slice(0,7));
  if(!p)return;
  fetch(WORKER+'/payroll/calculate',{method:'POST',headers:hdr(),body:JSON.stringify({period:p})})
    .then(function(r){return r.json();})
    .then(function(d){
      if(!d.success)throw new Error(d.error&&d.error.message||'Failed');
      var t=d.data.totals;
      alert('Payroll calculation for '+p+':\nEmployees: '+(t.count||0)+'\nGross: ₹'+(t.gross||0).toLocaleString('en-IN')+'\nNet: ₹'+(t.net||0).toLocaleString('en-IN'));
    }).catch(function(e){toast('Calc error: '+e.message,'er');});
}

function openRun(){
  el('run-period').value=new Date().toISOString().slice(0,7);
  el('run-date').value=new Date().toISOString().split('T')[0];
  el('run-notes').value='';
  el('run-err').classList.remove('on');
  el('mo-run').classList.add('on');
}

async function doRun(){
  var period=(el('run-period').value||'').trim();
  var payDate=(el('run-date').value||'').trim();
  if(!period||!payDate){showErr('run-err','Period and pay date are required.');return;}
  el('run-btn').disabled=true;el('run-btn').textContent='Processing…';
  try{
    var r=await fetch(WORKER+'/payroll/run',{method:'POST',headers:hdr(),body:JSON.stringify({period:period,pay_date:payDate,notes:el('run-notes').value||null})});
    var d=await r.json();
    if(!r.ok||!d.success)throw new Error(d.error&&d.error.message||'Failed');
    toast('✅ Payroll run complete! Net: ₹'+((d.data.totals.net||0).toLocaleString('en-IN')));
    cm('mo-run');await load();
  }catch(e){showErr('run-err',e.message);}
  finally{el('run-btn').disabled=false;el('run-btn').textContent='Run Payroll';}
}

function cm(id){el(id).classList.remove('on');}
function showErr(id,m){var e=el(id);e.textContent=m;e.classList.add('on');}
function el(id){return document.getElementById(id);}
function tx(id,v){var e=el(id);if(e)e.textContent=v;}
function S(v){return String(v==null?'':v);}
function x(s){return S(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg,type){var c=el('tc'),t=document.createElement('div');t.className='toast'+(type?' '+type:'');t.textContent=msg;c.appendChild(t);setTimeout(function(){t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(function(){t.parentNode&&t.parentNode.removeChild(t);},300);},5000);}
document.addEventListener('keydown',function(e){if(e.key==='Escape'){cm('mo-run');}});
</script>
</body>
</html>
