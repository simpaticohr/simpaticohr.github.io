<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Ops — Simpatico HR</title>
<link rel="stylesheet" href="../hr-modules.css">
<style>
:root{--p:#4f46e5;--ok:#10b981;--warn:#f59e0b;--err:#ef4444;--bg:#f1f5f9;--card:#fff;--bdr:#e2e8f0;--txt:#1e293b;--dim:#64748b;--r:12px}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt)}
body.emb .hr-sidebar,body.emb .hr-topbar{display:none!important}
.wrap{padding:24px;max-width:1200px;margin:0 auto}
.ph{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.pt{font-size:1.5rem;font-weight:800}.ps{font-size:.85rem;color:var(--dim);margin-top:3px}
.btn{padding:9px 18px;border-radius:8px;border:none;font-size:.88rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:inherit;transition:.2s}
.bp{background:var(--p);color:#fff}.bp:hover{opacity:.9}.bg2{background:transparent;color:var(--dim);border:1.5px solid var(--bdr)}.bg2:hover{background:var(--bg)}
.tabs{display:flex;border-bottom:2px solid var(--bdr);margin-bottom:20px}
.tab{padding:10px 20px;cursor:pointer;font-size:.9rem;font-weight:500;color:var(--dim);border-bottom:2px solid transparent;margin-bottom:-2px;background:none;border-top:none;border-left:none;border-right:none;transition:.2s;font-family:inherit}
.tab.on{color:var(--p);border-bottom-color:var(--p)}
.tp{display:none}.tp.on{display:block}
.sr{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:20px}
.sc{background:var(--card);border-radius:var(--r);padding:16px;border:1px solid var(--bdr);box-shadow:0 1px 3px rgba(0,0,0,.05)}
.sc .lb{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);margin-bottom:4px}
.sc .vl{font-size:1.8rem;font-weight:800}
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--bdr);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.card-h{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-bottom:1px solid var(--bdr)}
.card-h h5{font-size:.95rem;font-weight:700}
table{width:100%;border-collapse:collapse}
table thead th{background:var(--bg);padding:10px 16px;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);text-align:left;white-space:nowrap}
table tbody td{padding:11px 16px;border-bottom:1px solid var(--bdr);font-size:.88rem;vertical-align:middle}
table tbody tr:last-child td{border-bottom:none}
table tbody tr:hover{background:#f8fafc}
.bg{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:600}
.bg-pend{background:#fef3c7;color:#92400e}.bg-appr{background:#d1fae5;color:#065f46}.bg-rej{background:#fee2e2;color:#991b1b}
.bs{padding:5px 9px;border-radius:6px;border:none;cursor:pointer;font-size:.78rem;font-weight:600;transition:.2s}
.bsa{background:#d1fae5;color:#065f46}.bsr{background:#fee2e2;color:#991b1b}.bs:hover{opacity:.8}
.es{text-align:center;padding:50px 20px;color:var(--dim)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px}
.mo.on{display:flex}
.mb{background:var(--card);border-radius:16px;padding:26px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:mIn .2s}
@keyframes mIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.mh h3{font-size:1.05rem;font-weight:700}.mx{background:none;border:none;cursor:pointer;font-size:1.3rem;color:var(--dim);line-height:1}
.fg{margin-bottom:12px}.fl{display:block;font-size:.82rem;font-weight:600;margin-bottom:5px}
.fi{width:100%;padding:9px 12px;border:1.5px solid var(--bdr);border-radius:8px;font-size:.88rem;outline:none;font-family:inherit;background:var(--card);color:var(--txt);transition:.2s}
.fi:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mf{display:flex;justify-content:flex-end;gap:10px;margin-top:16px;padding-top:14px;border-top:1px solid var(--bdr)}
.eb{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:10px 14px;font-size:.83rem;color:#991b1b;margin-bottom:12px;display:none}
.eb.on{display:block}
.tc{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--card);border-radius:10px;padding:12px 16px;box-shadow:0 8px 24px rgba(0,0,0,.15);font-size:.88rem;font-weight:500;border-left:4px solid var(--ok);animation:tIn .3s;max-width:360px}
.toast.er{border-left-color:var(--err)}
@keyframes tIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="tc" id="tc"></div>
<div class="wrap">
  <div class="ph">
    <div><div class="pt">HR Operations</div><div class="ps">Leave requests, attendance & HR tasks</div></div>
    <button class="btn bp" onclick="openLeave()">＋ Request Leave</button>
  </div>
  <div class="sr">
    <div class="sc"><div class="lb">Pending</div><div class="vl" id="s1">—</div></div>
    <div class="sc"><div class="lb">Approved</div><div class="vl" id="s2">—</div></div>
    <div class="sc"><div class="lb">Rejected</div><div class="vl" id="s3">—</div></div>
    <div class="sc"><div class="lb">Total Days</div><div class="vl" id="s4">—</div></div>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="switchTab('leaves',this)">Leave Requests</button>
    <button class="tab" onclick="switchTab('balance',this)">Leave Balance</button>
  </div>
  <div class="tp on" id="tp-leaves">
    <div class="card">
      <div class="card-h"><h5>All Leave Requests</h5>
        <select id="lf" onchange="loadLeaves()" style="padding:6px 10px;border:1.5px solid var(--bdr);border-radius:7px;font-size:.83rem;outline:none;cursor:pointer">
          <option value="">All Status</option><option value="pending">Pending</option><option value="approved">Approved</option><option value="rejected">Rejected</option>
        </select>
      </div>
      <div id="leaves-area"><div class="es">Loading…</div></div>
    </div>
  </div>
  <div class="tp" id="tp-balance">
    <div class="card">
      <div class="card-h"><h5>Leave Balance</h5></div>
      <div id="balance-area"><div class="es">Enter employee ID to check balance</div></div>
    </div>
    <div style="padding:16px 0;display:flex;gap:10px;align-items:center">
      <input class="fi" id="bal-emp" placeholder="Employee ID" style="max-width:280px">
      <button class="btn bp" onclick="loadBalance()">Check Balance</button>
    </div>
  </div>
</div>

<div class="mo" id="mo">
  <div class="mb">
    <div class="mh"><h3>Request Leave</h3><button class="mx" onclick="cm()">✕</button></div>
    <div class="eb" id="lerr"></div>
    <div class="fg"><label class="fl">Employee ID *</label><input class="fi" id="le" placeholder="Your employee UUID"></div>
    <div class="fg"><label class="fl">Leave Type *</label>
      <select class="fi" id="lt"><option value="annual">Annual</option><option value="sick">Sick</option><option value="maternity">Maternity</option><option value="paternity">Paternity</option><option value="unpaid">Unpaid</option><option value="comp_off">Comp Off</option></select>
    </div>
    <div class="fr">
      <div class="fg"><label class="fl">From Date *</label><input class="fi" id="lf2" type="date"></div>
      <div class="fg"><label class="fl">To Date *</label><input class="fi" id="lt2" type="date"></div>
    </div>
    <div class="fg"><label class="fl">Reason</label><input class="fi" id="lr" placeholder="Brief reason (optional)"></div>
    <div class="mf">
      <button class="btn bg2" onclick="cm()">Cancel</button>
      <button class="btn bp" id="lbtn" onclick="submitLeave()">Submit Request</button>
    </div>
  </div>
</div>

<script src="../../js/hr-config.js"></script>
<script>
var API = window.SIMPATICO_CONFIG?.workerUrl;
var TENANT = (window.SIMPATICO_CONFIG && window.SIMPATICO_CONFIG.tenantId) || 'default';
if(window.self!==window.top)document.body.classList.add('emb');

function hdr(ex){
  var h={'Content-Type':'application/json','X-Tenant-ID':TENANT};
  if(ex)Object.assign(h,ex);
  return h;
}

async function apiCall(path, method='GET', body=null){
  var opts = { method, headers: hdr() };
  if(body) opts.body = JSON.stringify(body);
  var r = await fetch(API + path, opts);
  var d = await r.json();
  if(!r.ok) throw new Error((d&&d.error)||d.message||r.statusText);
  return d;
}

function fmtD(s){if(!s)return'—';try{return new Date(s+'T00:00:00').toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}catch(e){return s;}}
function x(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function el(id){return document.getElementById(id);}
function tx(id,v){var e=el(id);if(e)e.textContent=v;}

window.addEventListener('DOMContentLoaded',loadLeaves);

async function loadLeaves(){
  var st=el('lf').value||'';
  var path = '/leave' + (st ? '?status='+st : '');
  el('leaves-area').innerHTML='<div class="es">Loading…</div>';
  try{
    var data = await apiCall(path);
    var pend=data.filter(function(d){return d.status==='pending';}).length;
    var appr=data.filter(function(d){return d.status==='approved';}).length;
    var rej=data.filter(function(d){return d.status==='rejected';}).length;
    var days=data.reduce(function(s,d){return s+(d.days||0);},0);
    tx('s1',pend);tx('s2',appr);tx('s3',rej);tx('s4',days);
    if(!data.length){el('leaves-area').innerHTML='<div class="es"><p>No leave requests found.</p></div>';return;}
    el('leaves-area').innerHTML='<div style="overflow-x:auto"><table><thead><tr><th>Employee</th><th>Type</th><th>From</th><th>To</th><th>Days</th><th>Status</th><th>Actions</th></tr></thead><tbody>'+
      data.map(function(r){
        var emp=r.employees||{};
        var nm=((emp.first_name||'')+'  '+(emp.last_name||'')).trim()||'—';
        var st=r.status||'—';
        var bc=st==='approved'?'bg-appr':st==='rejected'?'bg-rej':'bg-pend';
        return '<tr><td><strong>'+x(nm)+'</strong></td><td>'+x((r.leave_type||'').replace('_',' '))+'</td><td>'+fmtD(r.from_date)+'</td><td>'+fmtD(r.to_date)+'</td><td>'+x(r.days||1)+'</td><td><span class="bg '+bc+'">'+x(st)+'</span></td><td style="white-space:nowrap">'+
          (st==='pending'?'<button class="bs bsa" onclick="decide(\''+x(r.id)+'\',\'approved\')">Approve</button> <button class="bs bsr" onclick="decide(\''+x(r.id)+'\',\'rejected\')">Reject</button>':'—')+'</td></tr>';
      }).join('')+'</tbody></table></div>';
  }catch(e){el('leaves-area').innerHTML='<div class="es">'+x(e.message)+'</div>';}
}

async function decide(id,decision){
  if(!confirm(decision==='approved'?'Approve this leave request?':'Reject this leave request?'))return;
  try{
    await apiCall('/leave/'+id+'/'+decision, 'PATCH');
    toast('✅ Leave '+decision); await loadLeaves();
  }catch(e){toast('Error: '+e.message,'er');}
}

async function loadBalance(){
  var empId=(el('bal-emp').value||'').trim();
  if(!empId){toast('Enter an employee ID','er');return;}
  el('balance-area').innerHTML='<div class="es">Loading…</div>';
  try{
    var data = await apiCall('/leave/balances?employee_id='+encodeURIComponent(empId));
    if(!data.length){el('balance-area').innerHTML='<div class="es"><p>No leave balance found for this employee.</p></div>';return;}
    el('balance-area').innerHTML='<div style="overflow-x:auto"><table><thead><tr><th>Leave Type</th><th>Entitled</th><th>Used</th><th>Remaining</th></tr></thead><tbody>'+
      data.map(function(b){
        return '<tr><td>'+x((b.leave_type||'').replace('_',' '))+'</td><td>'+x(b.entitled||0)+'</td><td>'+x(b.used||0)+'</td><td style="font-weight:700;color:var(--ok)">'+x((b.entitled||0)-(b.used||0))+'</td></tr>';
      }).join('')+'</tbody></table></div>';
  }catch(e){el('balance-area').innerHTML='<div class="es">'+x(e.message)+'</div>';}
}

function switchTab(name,btn){
  document.querySelectorAll('.tp').forEach(function(t){t.classList.remove('on');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  el('tp-'+name).classList.add('on'); btn.classList.add('on');
}

function openLeave(){
  el('le').value='';el('lr').value='';el('lt').value='annual';
  var today=new Date().toISOString().split('T')[0];
  el('lf2').value=today;el('lt2').value=today;
  el('lerr').classList.remove('on');
  el('mo').classList.add('on');
}
function cm(){el('mo').classList.remove('on');}

async function submitLeave(){
  var emp=(el('le').value||'').trim(),lt=el('lt').value,fd=el('lf2').value,td=el('lt2').value,reason=(el('lr').value||'').trim();
  if(!emp||!lt||!fd||!td){var e=el('lerr');e.textContent='All required fields must be filled.';e.classList.add('on');return;}
  if(new Date(td)<new Date(fd)){var e=el('lerr');e.textContent='To date must be after from date.';e.classList.add('on');return;}
  el('lbtn').disabled=true;el('lbtn').textContent='Submitting…';
  try{
    await apiCall('/leave', 'POST', {
      employee_id: emp,
      leave_type: lt,
      from_date: fd,
      to_date: td,
      reason: reason || null,
      tenant_id: TENANT
    });
    toast('✅ Leave request submitted!');cm();await loadLeaves();
  }catch(e){var er=el('lerr');er.textContent=e.message;er.classList.add('on');}
  finally{el('lbtn').disabled=false;el('lbtn').textContent='Submit Request';}
}

function toast(msg,type){if(window.showToast){window.showToast(msg,type);return;}var c=el('tc');if(!c)return;var t=document.createElement('div');t.className='toast'+(type?' '+type:'');t.textContent=msg;c.appendChild(t);setTimeout(function(){t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(function(){t.parentNode&&t.parentNode.removeChild(t);},300);},5000);}
el('mo').addEventListener('click',function(e){if(e.target===el('mo'))cm();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')cm();});
</script>
</body>
</html>
