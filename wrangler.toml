# wrangler.toml — Simpatico HR Worker
# Place in project root alongside workers/hr-api.js
# Deploy with: npx wrangler deploy workers/hr-api.js

name            = "hr-api"
main            = "workers/hr-api.js"
compatibility_date = "2024-09-23"
account_id      = "YOUR_CF_ACCOUNT_ID"

# ── Cloudflare AI ──
[ai]
binding = "AI"

# ── Vectorize (semantic HR knowledge search) ──
[[vectorize]]
binding    = "VECTORIZE"
index_name = "hr-knowledge"

# ── R2 Bucket (employee docs, payslips, policies) ──
[[r2_buckets]]
binding     = "HR_BUCKET"
bucket_name = "simpatico-hr-files"

# ── KV (sessions, cache) ──
[[kv_namespaces]]
binding = "HR_KV"
id      = "YOUR_KV_NAMESPACE_ID"

# ── Secrets (set via: npx wrangler secret put SECRET_NAME) ──
# SUPABASE_URL
# SUPABASE_SERVICE_KEY
# RESEND_API_KEY

# ── Routes ──
[[routes]]
pattern = "hr-api.YOUR_SUBDOMAIN.workers.dev/*"
zone_name = "YOUR_DOMAIN.com"

# ── Create Vectorize index ──
# Run once:  npx wrangler vectorize create hr-knowledge --dimensions=384 --metric=cosine
