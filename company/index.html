<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">Company Careers | Simpatico HR</title>
  <meta name="description" id="metaDesc" content="Explore open positions and join our team. Powered by Simpatico HR.">
  <meta property="og:type" content="website">
  <meta property="og:title" id="ogTitle" content="Careers | Simpatico HR">
  <meta property="og:description" id="ogDesc" content="">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <script src="../js/hr-config.js"></script>
  <style>
    :root {
      --bg:#050a18;--bg-card:#0c1225;--bg-surface:#111a33;
      --primary:#6366f1;--primary-light:#818cf8;--primary-glow:rgba(99,102,241,.15);
      --accent:#06b6d4;--success:#10b981;
      --text:#e2e8f0;--text-muted:#64748b;--text-dim:#475569;
      --border:rgba(255,255,255,.06);--border-hover:rgba(99,102,241,.3);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

    /* NAV */
    .nav{backdrop-filter:blur(20px);background:rgba(5,10,24,.92);padding:14px 6%;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
    .logo{font-weight:800;font-size:1.05rem;color:#fff;text-decoration:none;display:flex;align-items:center;gap:8px}
    .logo span{color:var(--primary)}
    .nav-links{display:flex;gap:8px}
    .nav-link{color:var(--text-muted);text-decoration:none;font-size:13px;font-weight:500;padding:7px 16px;border-radius:10px;transition:all .2s}
    .nav-link:hover{color:#fff;background:rgba(255,255,255,.05)}

    /* HERO BANNER */
    .hero{position:relative;padding:60px 6% 50px;text-align:center;overflow:hidden;border-bottom:1px solid var(--border)}
    .hero::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(99,102,241,.15) 0%,rgba(6,182,212,.1) 40%,rgba(139,92,246,.08) 100%);z-index:0}
    .hero::after{content:'';position:absolute;top:-40%;left:50%;transform:translateX(-50%);width:800px;height:800px;background:radial-gradient(circle,rgba(99,102,241,.12) 0%,transparent 60%);z-index:0}
    .hero-inner{position:relative;z-index:1;max-width:700px;margin:0 auto}
    .co-avatar{width:72px;height:72px;border-radius:18px;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:800;color:#fff;margin:0 auto 20px;box-shadow:0 8px 30px rgba(99,102,241,.25)}
    .co-avatar img{width:100%;height:100%;border-radius:18px;object-fit:cover}
    .hero h1{font-size:clamp(1.8rem,5vw,2.8rem);font-weight:800;background:linear-gradient(135deg,#fff 30%,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px;line-height:1.2}
    .hero .subtitle{color:var(--text-muted);font-size:1.05rem;max-width:500px;margin:0 auto 24px;line-height:1.6}
    .stats-row{display:flex;justify-content:center;gap:28px;flex-wrap:wrap}
    .stat{text-align:center}
    .stat-num{font-size:1.6rem;font-weight:800;color:var(--primary-light)}
    .stat-label{font-size:.72rem;color:var(--text-dim);margin-top:2px;text-transform:uppercase;letter-spacing:1px}

    /* FILTERS */
    .filters-bar{max-width:900px;margin:0 auto;padding:24px 6%;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .search-box{flex:1;min-width:200px;position:relative}
    .search-box i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-dim)}
    .search-box input{width:100%;padding:12px 14px 12px 40px;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:.9rem;outline:none;font-family:inherit;transition:border .2s}
    .search-box input:focus{border-color:var(--border-hover)}
    .search-box input::placeholder{color:var(--text-dim)}
    .filter-select{padding:12px 16px;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;color:var(--text-muted);font-size:.85rem;font-family:inherit;outline:none;cursor:pointer;min-width:140px}
    .filter-select:focus{border-color:var(--border-hover)}
    .filter-select option{background:var(--bg-surface)}

    /* JOB LIST */
    .jobs-container{max-width:900px;margin:0 auto;padding:0 6% 60px}
    .jobs-count{font-size:.85rem;color:var(--text-dim);margin-bottom:16px;font-weight:500}

    .job-card{background:var(--bg-card);border:1px solid var(--border);border-radius:18px;padding:24px;margin-bottom:14px;transition:all .3s;cursor:pointer;text-decoration:none;display:block}
    .job-card:hover{border-color:var(--border-hover);transform:translateY(-3px);box-shadow:0 12px 40px rgba(99,102,241,.08)}
    .job-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;gap:12px}
    .job-title{font-size:1.1rem;font-weight:700;color:#fff;margin-bottom:4px}
    .job-dept{font-size:.78rem;color:var(--primary-light);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
    .job-arrow{width:36px;height:36px;border-radius:10px;background:var(--primary-glow);display:flex;align-items:center;justify-content:center;color:var(--primary-light);flex-shrink:0;transition:all .2s}
    .job-card:hover .job-arrow{background:var(--primary);color:#fff}
    .job-meta{display:flex;gap:16px;flex-wrap:wrap}
    .job-meta-item{display:flex;align-items:center;gap:5px;font-size:.82rem;color:var(--text-muted)}
    .job-meta-item i{color:var(--text-dim);font-size:.75rem}
    .job-skills{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}
    .job-skill{background:rgba(99,102,241,.08);color:var(--primary-light);padding:3px 10px;border-radius:6px;font-size:.72rem;font-weight:600}

    /* EMPTY */
    .empty{text-align:center;padding:60px 20px;color:var(--text-dim)}
    .empty-icon{font-size:3rem;margin-bottom:12px;opacity:.4}

    /* LOADING */
    .loading{text-align:center;padding:80px 20px}
    .spinner{width:40px;height:40px;border:3px solid rgba(99,102,241,.2);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* FOOTER */
    .footer{text-align:center;padding:32px 6%;border-top:1px solid var(--border);font-size:.78rem;color:var(--text-dim)}
    .footer a{color:var(--primary-light);text-decoration:none}
    .powered{display:inline-flex;align-items:center;gap:6px;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:8px 16px;margin-top:12px;font-size:.75rem;color:var(--text-dim)}
    .powered img{height:16px;border-radius:3px}
    .powered a{color:var(--primary-light);font-weight:600;text-decoration:none}

    @media(max-width:768px){
      .hero{padding:40px 5% 32px}
      .filters-bar{padding:16px 5%;flex-direction:column}
      .search-box{min-width:100%}
      .jobs-container{padding:0 5% 40px}
      .stats-row{gap:16px}
    }
  </style>
</head>
<body>

<nav class="nav">
  <a class="logo" href="/"><img src="/favicon-96x96.png" style="width:26px;height:26px;border-radius:6px;margin-right:4px">SIMPATICO <span>HR</span></a>
  <div class="nav-links">
    <a class="nav-link" href="/jobs.html">💼 All Jobs</a>
    <a class="nav-link" href="/">Home</a>
  </div>
</nav>

<div id="pageContent">
  <div class="loading">
    <div class="spinner"></div>
    <div style="color:var(--text-dim);font-size:.9rem">Loading company portal...</div>
  </div>
</div>

<script>
const SB_URL = window.SIMPATICO_CONFIG?.supabaseUrl || 'https://cvkxtsvgnynxexmemfuy.supabase.co';
const SB_KEY = window.SIMPATICO_CONFIG?.supabaseAnonKey;
const SB_HDR = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY };

let allJobs = [];
let companyData = {};

function getCompanyId() {
  const p = new URLSearchParams(window.location.search);
  return p.get('id') || p.get('company_id') || sessionStorage.getItem('_routeCompanyId') || null;
}

function slugify(t) { return (t||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); }
function getJobUrl(job) { return `/job/${slugify(job.title)}-${job.id}`; }
function timeAgo(d) {
  const days = Math.floor((Date.now()-new Date(d).getTime())/86400000);
  if(days===0)return 'Today';if(days===1)return 'Yesterday';
  if(days<7)return days+' days ago';if(days<30)return Math.floor(days/7)+' weeks ago';
  return Math.floor(days/30)+' months ago';
}

async function init() {
  const companyId = getCompanyId();
  if (!companyId) {
    document.getElementById('pageContent').innerHTML = `<div class="empty" style="padding:100px 20px"><div class="empty-icon">🏢</div><h3 style="color:#fff;margin-bottom:8px">Company Not Found</h3><p>No company ID was specified.</p><a href="/jobs.html" style="color:var(--primary-light);font-weight:600;text-decoration:none;margin-top:16px;display:inline-block">← Browse All Jobs</a></div>`;
    return;
  }

  try {
    // Fetch jobs for this company
    const res = await fetch(
      `${SB_URL}/rest/v1/jobs?company_id=eq.${companyId}&is_active=eq.true&status=in.(open,active)&select=id,title,department,location,employment_type,level,skills,skills_required,salary_min,salary_max,description,created_at&order=created_at.desc`,
      { headers: SB_HDR }
    );
    if (!res.ok) throw new Error('Failed to load jobs');
    allJobs = await res.json();

    // Try to get company name from jobs or fetch company record
    const companyName = allJobs[0]?.company_name || 'Simpatico HR Consultancy';
    companyData = { id: companyId, name: companyName };

    // Try fetching company details
    try {
      const cRes = await fetch(`${SB_URL}/rest/v1/companies?id=eq.${companyId}&select=*`, { headers: SB_HDR });
      const companies = await cRes.json();
      if (companies.length) {
        companyData = { ...companyData, ...companies[0] };
      }
    } catch(e) {}

    renderPage();
    injectSEO();
  } catch (err) {
    console.error(err);
    document.getElementById('pageContent').innerHTML = `<div class="empty" style="padding:100px 20px"><div class="empty-icon">⚠️</div><h3 style="color:#fff;margin-bottom:8px">Error</h3><p>${err.message}</p></div>`;
  }
}

function renderPage() {
  const name = companyData.name || 'Company';
  const desc = companyData.description || `Explore open positions at ${name}. Apply and get AI-screened instantly.`;
  const logo = companyData.logo_url || null;
  const departments = [...new Set(allJobs.map(j => j.department).filter(Boolean))];
  const locations = [...new Set(allJobs.map(j => j.location).filter(Boolean))];

  document.getElementById('pageContent').innerHTML = `
    <section class="hero">
      <div class="hero-inner">
        <div class="co-avatar" id="coAvatar">${logo ? `<img src="${logo}" alt="${name}">` : name.charAt(0).toUpperCase()}</div>
        <h1 id="heroTitle">Join ${name}</h1>
        <p class="subtitle">${desc}</p>
        <div class="stats-row">
          <div class="stat"><div class="stat-num" id="statJobs">${allJobs.length}</div><div class="stat-label">Open Roles</div></div>
          <div class="stat"><div class="stat-num">${departments.length || 1}</div><div class="stat-label">Departments</div></div>
          <div class="stat"><div class="stat-num">${locations.length || 1}</div><div class="stat-label">Locations</div></div>
        </div>
      </div>
    </section>

    <div class="filters-bar">
      <div class="search-box">
        <i class="fa fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search roles, skills, locations...">
      </div>
      <select class="filter-select" id="filterDept" onchange="filterJobs()">
        <option value="">All Departments</option>
        ${departments.map(d => `<option value="${d}">${d}</option>`).join('')}
      </select>
      <select class="filter-select" id="filterLoc" onchange="filterJobs()">
        <option value="">All Locations</option>
        ${locations.map(l => `<option value="${l}">${l}</option>`).join('')}
      </select>
    </div>

    <div class="jobs-container">
      <div class="jobs-count" id="jobsCount">${allJobs.length} open position${allJobs.length!==1?'s':''}</div>
      <div id="jobsList"></div>
    </div>

    <footer class="footer">
      <div class="powered">
        <img src="/favicon-96x96.png" alt="Simpatico HR">
        Powered by <a href="https://simpaticohr.in" target="_blank">Simpatico HR</a> • AI-Powered Recruitment
      </div>
    </footer>
  `;

  document.getElementById('searchInput').addEventListener('input', debounce(filterJobs, 300));
  renderJobs(allJobs);
}

function renderJobs(jobs) {
  const el = document.getElementById('jobsList');
  document.getElementById('jobsCount').textContent = `${jobs.length} open position${jobs.length!==1?'s':''}`;

  if (!jobs.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📂</div><h3 style="color:#fff;margin-bottom:8px">No matching positions</h3><p>Try different search terms or check back soon.</p></div>`;
    return;
  }

  el.innerHTML = jobs.map(job => {
    const loc = job.location || 'Remote';
    const type = job.employment_type || 'Full-time';
    const dept = job.department || '';
    const posted = job.created_at ? timeAgo(job.created_at) : '';
    let skills = [];
    const raw = job.skills || job.skills_required;
    if (Array.isArray(raw)) skills = raw.filter(Boolean);
    else if (typeof raw === 'string' && raw) skills = raw.replace(/[\[\]"]/g,'').split(',').map(s=>s.trim()).filter(Boolean);

    return `<a class="job-card" href="${getJobUrl(job)}">
      <div class="job-top">
        <div>
          ${dept ? `<div class="job-dept">${dept}</div>` : ''}
          <div class="job-title">${job.title}</div>
        </div>
        <div class="job-arrow"><i class="fa fa-arrow-right"></i></div>
      </div>
      <div class="job-meta">
        <span class="job-meta-item"><i class="fa fa-location-dot"></i>${loc}</span>
        <span class="job-meta-item"><i class="fa fa-briefcase"></i>${type}</span>
        ${job.level ? `<span class="job-meta-item"><i class="fa fa-layer-group"></i>${job.level}</span>` : ''}
        ${posted ? `<span class="job-meta-item"><i class="fa fa-clock"></i>${posted}</span>` : ''}
      </div>
      ${skills.length ? `<div class="job-skills">${skills.slice(0,6).map(s=>`<span class="job-skill">${s}</span>`).join('')}</div>` : ''}
    </a>`;
  }).join('');
}

function filterJobs() {
  const q = (document.getElementById('searchInput')?.value || '').toLowerCase();
  const dept = document.getElementById('filterDept')?.value || '';
  const loc = document.getElementById('filterLoc')?.value || '';

  let filtered = allJobs;
  if (q) filtered = filtered.filter(j =>
    (j.title||'').toLowerCase().includes(q) ||
    (j.department||'').toLowerCase().includes(q) ||
    (j.location||'').toLowerCase().includes(q) ||
    (j.description||'').toLowerCase().includes(q)
  );
  if (dept) filtered = filtered.filter(j => j.department === dept);
  if (loc) filtered = filtered.filter(j => j.location === loc);
  renderJobs(filtered);
}

function debounce(fn, ms) { let t; return function(...a) { clearTimeout(t); t = setTimeout(() => fn.apply(this, a), ms); }; }

function injectSEO() {
  const name = companyData.name || 'Company';
  const title = `Careers at ${name} — ${allJobs.length} Open Positions | Simpatico HR`;
  document.title = title;
  document.getElementById('ogTitle')?.setAttribute('content', title);
  document.getElementById('ogDesc')?.setAttribute('content', `Browse ${allJobs.length} open positions at ${name}. Apply and get AI-screened instantly.`);
}

init();
</script>
</body>
</html>
