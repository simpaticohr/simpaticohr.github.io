<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Apply | Simpatico HR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <script src="js/hr-config.js"></script>
<script src="js/shared-utils.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --primary: #002d5a; --accent: #0062ff; --light: #f4f7fa; --white: #fff; --text: #1e293b; --muted: #64748b; }
    body { font-family: 'Poppins', system-ui; background: var(--light); color: var(--text); margin: 0; padding: 0; }
    .container { max-width: 500px; margin: 60px auto; padding: 20px; }
    .card { background: var(--white); border-radius: 20px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    h1 { font-size: 1.5rem; font-weight: 800; color: var(--primary); margin-bottom: 8px; }
    p.sub { font-size: 0.9rem; color: var(--muted); margin-bottom: 24px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; }
    input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; font-size: 0.95rem; font-family: inherit; }
    input:focus { outline: none; border-color: var(--accent); }
    .btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.2s; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,45,90,0.2); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .status { margin-top: 15px; font-size: 0.85rem; text-align: center; font-weight: 500; }
    .success-box { display: none; text-align: center; }
    .success-box i { font-size: 3rem; color: #10b981; margin-bottom: 15px; }
  </style>
</head>
<body>
<div class="container">
  <div class="card" id="formCard">
    <h1 id="jobTitle">Join Our Team</h1>
    <p class="sub">Complete the form below to apply</p>
    <form id="applyForm">
      <div class="form-group"><label>Full Name</label><input type="text" id="candName" required placeholder="John Doe"></div>
      <div class="form-group"><label>Email Address</label><input type="email" id="candEmail" required placeholder="john@example.com"></div>
      <div class="form-group"><label>Resume/CV (PDF)</label><input type="file" id="resumeFile" accept=".pdf" required></div>
      <button type="submit" class="btn" id="submitBtn">Submit Application</button>
      <div id="status" class="status"></div>
    </form>
  </div>
  <div class="card success-box" id="successBox">
    <i class="fas fa-check-circle"></i>
    <h1>Application Sent!</h1>
    <p class="sub">Thank you for applying. Our recruitment team will review your profile and get back to you shortly.</p>
    <a href="jobs.html" class="btn" style="text-decoration:none; display:inline-block">View More Jobs</a>
  </div>
</div>

<script>
let currentJobId = new URLSearchParams(window.location.search).get('job_id');

async function init() {
  if (!window.SIMPATICO_CONFIG) return setTimeout(init, 300);
  if (currentJobId) {
    try {
      const { data } = await window.SimpaticoDB.from('jobs').select('title').eq('id', currentJobId).single();
      if (data) document.getElementById('jobTitle').textContent = 'Apply for ' + data.title;
    } catch(e) { console.warn('Job title fetch failed:', e); }
  }
}

// Extract text from a PDF file for AI resume parsing
async function extractPDFText(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = function() {
      try {
        const text = reader.result;
        // Basic text extraction from PDF binary — extract readable ASCII runs
        const ascii = [];
        for (let i = 0; i < text.length; i++) {
          const code = text.charCodeAt(i);
          if (code >= 32 && code <= 126) ascii.push(text[i]);
          else if (ascii.length > 0 && ascii[ascii.length - 1] !== ' ') ascii.push(' ');
        }
        const extracted = ascii.join('').replace(/\s+/g, ' ').trim();
        // Return first 3000 chars to stay within AI token limits
        resolve(extracted.length > 50 ? extracted.substring(0, 3000) : '');
      } catch(e) {
        resolve('');
      }
    };
    reader.onerror = () => resolve('');
    reader.readAsBinaryString(file);
  });
}

document.getElementById('applyForm').onsubmit = async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const status = document.getElementById('status');
  btn.disabled = true;
  btn.textContent = 'Submitting...';
  status.style.color = '';
  
  try {
    const name = document.getElementById('candName').value.trim();
    const email = document.getElementById('candEmail').value.trim();
    const file = document.getElementById('resumeFile').files[0];
    
    if (!name) throw new Error('Please enter your name');
    if (!email) throw new Error('Please enter your email');
    if (!file) throw new Error('Please upload a resume');
    if (file.size > 5 * 1024 * 1024) throw new Error('Resume must be under 5MB');

    // 1. Extract resume text for AI scoring
    status.textContent = 'Analyzing resume...';
    const resumeText = await extractPDFText(file);

    // 2. Convert file to base64 for Worker upload
    status.textContent = 'Uploading resume...';
    const base64 = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = () => reject(new Error('File read failed'));
      reader.readAsDataURL(file);
    });

    // 3. Submit via Worker API (triggers duplicate check, AI scoring, auto-actions, emails)
    status.textContent = 'Submitting application...';
    const cfg = window.SIMPATICO_CONFIG || {};
    const workerUrl = cfg.workerUrl || 'https://simpatico-hr-ats.simpaticohrconsultancy.workers.dev';
    const tenantId = cfg.tenantId || 'SIMP_PRO_MAIN';

    const resp = await fetch(workerUrl + '/recruitment/applications', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Tenant-ID': tenantId
      },
      body: JSON.stringify({
        job_id: currentJobId,
        candidate_name: name,
        candidate_email: email,
        resume_text: resumeText || null,
        resume_base64: base64,
        resume_filename: file.name,
        source: 'Careers Page'
      })
    });

    const result = await resp.json();

    // Handle duplicate application (HTTP 409)
    if (resp.status === 409 || result.duplicate) {
      status.textContent = 'You have already applied to this position. Check your email for updates.';
      status.style.color = '#f59e0b';
      btn.disabled = false;
      btn.textContent = 'Submit Application';
      return;
    }

    if (!resp.ok) {
      throw new Error(result.error?.message || 'Application submission failed');
    }
    
    document.getElementById('formCard').style.display = 'none';
    document.getElementById('successBox').style.display = 'block';
  } catch (err) {
    status.textContent = 'Error: ' + err.message;
    status.style.color = '#ef4444';
    btn.disabled = false;
    btn.textContent = 'Submit Application';
  }
};

init();
</script>
</body>
</html>
